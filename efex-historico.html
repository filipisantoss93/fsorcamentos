<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#07111f"><title>Histórico Efex | FS Orçamentos</title><meta name="description" content="Histórico de análises realizadas pelo Efex."><link rel="stylesheet" href="/style.css?v=20260713"><link rel="stylesheet" href="/assets/css/efex.css?v=20260713-history"><link rel="icon" type="image/png" href="/favicon.png"><style>.efex-history-head{display:flex;justify-content:space-between;gap:16px;align-items:center}.efex-history-actions{display:flex;gap:8px;flex-wrap:wrap}.efex-history-toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px}.efex-history-toolbar input{width:100%;min-height:46px;padding:10px 13px;border:1px solid var(--border);border-radius:10px;background:#07172a;color:#fff;font-size:16px}.efex-history-list{display:grid;gap:10px}.efex-history-item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;padding:16px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(145deg,#0c1d35,#07111f)}.efex-history-item h2{margin:0 0 6px;font-size:18px}.efex-history-meta{color:var(--muted);font-size:12px}.efex-history-symptom{margin:10px 0 0;color:#dce8f5;line-height:1.45}.efex-history-item-actions{display:flex;gap:7px;align-items:start;flex-wrap:wrap;justify-content:flex-end}.efex-history-empty{text-align:center;padding:38px 20px;color:var(--muted)}.efex-history-detail{display:none}.efex-history-detail.active{display:block}.efex-history-detail-grid{display:grid;gap:10px}.efex-history-detail .efex-block{overflow:auto}.efex-history-fav{font-size:22px;line-height:1}.efex-history-loading{padding:30px;text-align:center;color:var(--muted)}@media(max-width:650px){.efex-history-head{align-items:flex-start;flex-direction:column}.efex-history-toolbar{grid-template-columns:1fr}.efex-history-item{grid-template-columns:1fr}.efex-history-item-actions{justify-content:flex-start}.efex-history-item-actions .efex-btn{flex:1}.efex-history-head h1{margin-bottom:0}}</style></head><body><div id="header-container"></div><main class="efex-page"><section class="efex-card efex-history-head"><div><span class="efex-tag">Efex IA</span><h1>Histórico de análises</h1><p class="efex-note">Consulte diagnósticos anteriores sem consumir novos créditos.</p></div><div class="efex-history-actions"><a class="efex-btn primary" href="/efex.html">Nova análise</a></div></section><section class="efex-card"><div class="efex-history-toolbar"><input id="efex-history-search" type="search" placeholder="Buscar por veículo, cliente, sintoma ou diagnóstico"><button id="efex-history-favorites" type="button" class="efex-btn secondary">☆ Favoritos</button></div></section><section id="efex-history-list" class="efex-history-list"><div class="efex-card efex-history-loading">Carregando histórico...</div></section><section id="efex-history-detail" class="efex-card efex-history-detail"><div class="efex-history-head"><div><span class="efex-tag">Análise salva</span><h1 id="efex-history-detail-title">Diagnóstico</h1><p id="efex-history-detail-meta" class="efex-note"></p></div><div class="efex-history-actions"><button id="efex-history-close" type="button" class="efex-btn secondary">Voltar ao histórico</button><button id="efex-history-reuse" type="button" class="efex-btn primary">Nova análise baseada nesta</button></div></div><div id="efex-history-detail-content" class="efex-history-detail-grid"></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/config.js"></script><script src="/auth.js"></script><script src="/carregar-menu.js"></script><script src="/assets/js/efex-historico.js?v=20260713-1"></script></body></html>

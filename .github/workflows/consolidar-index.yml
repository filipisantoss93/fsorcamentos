name: Consolidar index e home premium

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/consolidar-index.yml'

permissions:
  contents: write

jobs:
  consolidar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Consolidar index e CSS global
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          index = Path('index.html')
          style = Path('style.css')
          i = index.read_text(encoding='utf-8')
          s = style.read_text(encoding='utf-8')

          # Remove o CSS inline completo da home.
          i = re.sub(r'\s*<style>.*?</style>\s*', '\n', i, count=1, flags=re.S|re.I)

          # Corrige textos e elimina estilos inline simples.
          i = i.replace('acompanhe aprovaçã.', 'acompanhe aprovações.')
          i = i.replace('<h2 style="margin:0">', '<h2>')
          i = i.replace('<h2 style="margin:0 0 12px">', '<h2>')
          i = i.replace(' class="home-btn secondary" style="min-height:46px;padding:10px 14px"', ' class="home-btn secondary compact"')
          i = i.replace('<strong style="font-size:14px">', '<strong>')

          # Remove ui.js, não usado na home.
          i = i.replace('<script src="config.js"></script><script src="auth.js"></script><script src="ui.js"></script><script src="planos.js"></script>', '<script src="config.js"></script><script src="auth.js"></script><script src="planos.js"></script>')

          # Home começa oculta até resolver a sessão.
          i = i.replace('<main id="home-publica" class="home home-publica">', '<main id="home-publica" class="home home-publica home-pendente">')
          i = i.replace('<main id="home-premium" class="home home-premium">', '<main id="home-premium" class="home home-premium home-pendente">')

          # Inclui Efex na home pública.
          anchor = '<section class="section-card fluxo"><span class="home-tag">Para quem é</span>'
          efex = '''<section class="home-efex section-card">
        <div class="home-efex-copy">
          <span class="home-tag premium-tag">Exclusivo Premium</span>
          <h2>Efex, o copiloto inteligente da oficina</h2>
          <p>Organize sintomas, hipóteses, testes, imagens e orçamento em um fluxo técnico mais rápido e profissional.</p>
          <a href="/efex.html" class="home-btn premium compact"><div><strong>Conhecer o Efex</strong><span>Abrir especialistas automotivos</span></div></a>
        </div>
        <img src="/efex-img.JPG" alt="Efex, copiloto inteligente da oficina" class="home-efex-image">
      </section>
      '''
          if anchor in i and 'class="home-efex section-card"' not in i:
              i = i.replace(anchor, efex + anchor)

          # Reorganiza home Premium e adiciona Efex.
          old_hero = '<section class="premium-hero"><div class="premium-hello"><span class="premium-selo">✦ Premium ativo</span><h1 id="premium-saudacao">Olá!</h1><p>Seu painel inicial rápido para criar, acompanhar e transformar orçamentos aprovados em caixa.</p></div><div class="premium-hero-acao"><a href="/gerador.html" class="home-btn primary"><div><strong>Gerar orçamento</strong><span>Começar agora</span></div></a></div></section>'
          new_hero = '<section class="premium-hero"><div class="premium-hello"><span class="premium-selo">Premium ativo</span><h1 id="premium-saudacao">Olá!</h1><p>Centralize orçamento, diagnóstico, aprovação e caixa em um único fluxo de trabalho.</p></div><div class="premium-hero-acao"><a href="/gerador.html" class="home-btn primary compact"><div><strong>Novo orçamento</strong><span>Começar agora</span></div></a><a href="/efex.html" class="home-btn premium compact"><div><strong>Abrir Efex</strong><span>Diagnóstico com IA</span></div></a></div></section>'
          i = i.replace(old_hero, new_hero)

          old_grid = '<div class="premium-grid"><a class="shortcut-card destaque" href="/gerador.html"><span class="shortcut-icon">📄</span><strong>Gerar orçamento</strong><span>Criar PDF ou link</span></a><a class="shortcut-card" href="/orcamentos.html"><span class="shortcut-icon">☷</span><strong>Orçamentos</strong><span>Status e pagamentos</span></a><a class="shortcut-card" href="/fluxo-caixa.html"><span class="shortcut-icon">▤</span><strong>Caixa</strong><span>Entradas e saídas</span></a><a class="shortcut-card" href="/dashboard.html"><span class="shortcut-icon">▥</span><strong>Relatórios</strong><span>Números principais</span></a><a class="shortcut-card" href="/forum.html"><span class="shortcut-icon">💬</span><strong>Fórum</strong><span>Comunidade</span></a><a class="shortcut-card" href="/painel.html"><span class="shortcut-icon">⚙</span><strong>Painel</strong><span>Perfil e empresa</span></a></div>'
          new_grid = '<div class="premium-grid premium-actions-grid"><a class="shortcut-card destaque" href="/gerador.html"><span class="shortcut-icon">＋</span><strong>Novo orçamento</strong><span>Criar PDF ou link profissional</span></a><a class="shortcut-card premium-card" href="/efex.html"><span class="shortcut-icon">IA</span><strong>Abrir Efex</strong><span>Diagnóstico e rascunho inteligente</span></a><a class="shortcut-card" href="/orcamentos.html"><span class="shortcut-icon">OS</span><strong>Orçamentos</strong><span>Status e pagamentos</span></a><a class="shortcut-card" href="/fluxo-caixa.html"><span class="shortcut-icon">R$</span><strong>Caixa</strong><span>Entradas, saídas e saldo</span></a><a class="shortcut-card secondary-action" href="/dashboard.html"><span class="shortcut-icon">↗</span><strong>Relatórios</strong><span>Indicadores da operação</span></a><a class="shortcut-card secondary-action" href="/painel.html"><span class="shortcut-icon">⚙</span><strong>Configurações</strong><span>Perfil e empresa</span></a></div>'
          i = i.replace(old_grid, new_grid)

          # Validação Premium pela assinatura real, sem flash da home pública.
          i = i.replace("if(!session?.user){return}", "if(!session?.user){$('home-publica')?.classList.remove('home-pendente');return}")
          i = i.replace("const plano=norm(perfil.plano||localStorage.getItem('usuario_plano')||session.user.user_metadata?.plano);\n        if(plano!=='premium')return;", "let assinatura=null;try{const r=await _supabase.from('assinaturas').select('plano,status,expira_em').eq('usuario_id',session.user.id).maybeSingle();if(!r.error)assinatura=r.data}catch(e){}const status=norm(assinatura?.status);const expira=assinatura?.expira_em?new Date(assinatura.expira_em).getTime():Infinity;const premium=norm(assinatura?.plano)==='premium'&&['ativo','pago','teste_gratis'].includes(status)&&expira>=Date.now();if(!premium){$('home-publica')?.classList.remove('home-pendente');return}")
          i = i.replace("$('home-publica')?.classList.add('oculta');\n        $('home-premium')?.classList.add('ativo');", "$('home-publica')?.classList.add('oculta');$('home-publica')?.classList.remove('home-pendente');\n        $('home-premium')?.classList.add('ativo');$('home-premium')?.classList.remove('home-pendente');")

          # Corrige variáveis e regras globais conflitantes na origem.
          s = s.replace('--body-brown: #ffffff;', '--body-brown: var(--fs-bg);')
          s = s.replace('--body-gray: #ffffff;', '--body-gray: var(--fs-bg);')
          s = s.replace('background:rgba(255,255,255,.97) !important;', 'background:rgba(4,14,34,.97) !important;', 1)
          s = s.replace('background:rgba(255,255,255,.98); color:var(--fs-text); border:1px solid var(--fs-border);', 'background:#081a3a; color:var(--fs-text); border:1px solid var(--fs-border);', 1)
          s = s.replace('background:#081a3a !important; }\n.contador-notificacoes', 'background:#ffffff !important; }\n.contador-notificacoes', 1)
          s = s.replace('{ background:#123d2b; color:var(--fs-text) !important;', '{ background:var(--fs-card); color:var(--fs-text) !important;', 1)

          start = '/* === HOME FS ORCAMENTOS CONSOLIDADA === */'
          end = '/* === FIM HOME FS ORCAMENTOS CONSOLIDADA === */'
          s = re.sub(re.escape(start)+r'.*?'+re.escape(end), '', s, flags=re.S)
          css = r'''
/* === HOME FS ORCAMENTOS CONSOLIDADA === */
.home-pendente{visibility:hidden;min-height:60vh}.home{width:min(1160px,calc(100% - 24px));margin:0 auto;padding:24px 0 54px;display:grid;gap:22px;color:var(--fs-text)}.home-premium{display:none}.home-premium.ativo{display:grid}.home-publica.oculta{display:none!important}
.home-hero,.premium-hero,.section-card,.preview-card,.benefits,.plano,.shortcut-card,.dash-card,.caixa-item,.orcamento-mini{background:linear-gradient(145deg,#0b2148,#071934);border:1px solid var(--fs-border);border-radius:6px;color:var(--fs-text);box-shadow:0 12px 30px rgba(0,0,0,.18)}
.home-hero{position:relative;overflow:hidden;padding:48px 54px 34px;border-top:3px solid var(--fs-gold);background:radial-gradient(circle at 88% 8%,rgba(246,196,67,.12),transparent 32%),linear-gradient(145deg,#0b2148,#06142f)}.home-hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,20,47,.98),rgba(6,20,47,.76));pointer-events:none}.home-hero>*{position:relative;z-index:1}
.home-tag,.premium-selo{display:inline-flex;align-items:center;width:max-content;gap:8px;padding:7px 10px;border-radius:4px;background:rgba(246,196,67,.12);border:1px solid rgba(246,196,67,.55);color:var(--fs-gold);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}.premium-selo,.premium-tag{background:#123d2b;border-color:#278b53;color:#8ff0b0}
.hero-title{max-width:820px;margin:18px 0 0;font-size:clamp(36px,5.4vw,64px);line-height:1.02;letter-spacing:-.05em;color:#fff}.hero-title .blue,.hero-title .dot{color:var(--fs-gold)}.hero-sub{max-width:760px;margin:18px 0 0;color:var(--fs-muted);font-size:clamp(17px,2.2vw,24px);line-height:1.45}.hero-sub strong{color:#fff}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}.home-btn{display:inline-flex;align-items:center;gap:12px;min-height:50px;padding:12px 16px;border:1px solid var(--fs-border);border-radius:5px;background:#0b2148;color:#fff;text-decoration:none;font-weight:700;box-shadow:none;transition:.18s ease}.home-btn:hover{transform:translateY(-1px);border-color:var(--fs-gold)}.home-btn svg{width:26px;height:26px}.home-btn strong{display:block;font-size:16px}.home-btn span{display:block;margin-top:2px;color:var(--fs-muted);font-size:12px;font-weight:500}.home-btn.primary{background:var(--fs-gold);color:#14243a;border-color:var(--fs-gold)}.home-btn.primary span{color:#4b3a08}.home-btn.secondary{background:#0b2148;color:#fff}.home-btn.premium{background:#166534;color:#fff;border-color:#22c55e}.home-btn.premium span{color:#bbf7d0}.home-btn.compact{min-height:46px;padding:10px 14px}
.preview-card{margin-top:30px;overflow:hidden}.preview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;background:#06142f;border-bottom:1px solid var(--fs-border)}.preview-title{display:flex;align-items:center;gap:10px;color:#fff;font-size:19px;font-weight:700}.preview-title .mini-icon{display:grid;place-items:center;width:32px;height:32px;border-radius:4px;background:rgba(246,196,67,.12);color:var(--fs-gold)}.organized{padding:5px 8px;border-radius:4px;background:#123d2b;color:#8ff0b0;font-size:12px;font-weight:700}.preview-body{padding:20px}.item-row{display:grid;grid-template-columns:auto auto 1fr auto;gap:12px;align-items:center;padding:10px 0}.round-icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#172746;color:var(--fs-gold)}.round-icon.green{background:#123d2b;color:#8ff0b0}.item-name,.price{color:#fff;font-size:17px}.dashes{border-bottom:1px dashed var(--fs-border)}.total-box{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:12px;padding:15px;border:1px solid rgba(246,196,67,.45);border-radius:5px;background:#081a3a}.total-label{font-size:17px}.total-value{font-size:clamp(27px,5vw,38px);color:var(--fs-gold)}.generate-btn{display:flex;align-items:center;justify-content:center;gap:10px;min-height:52px;margin-top:12px;border-radius:5px;background:var(--fs-gold);color:#14243a;text-decoration:none;font-weight:700}.generate-btn strong{font-size:17px}.generate-btn span{display:block;font-size:12px;color:#4b3a08}
.benefits,.resumo,.planos,.premium-grid,.caixa-resumo{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.benefit,.section-card,.plano,.shortcut-card,.dash-card,.caixa-item{padding:18px}.benefit{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center}.benefit-icon,.shortcut-icon{width:40px;height:40px;border-radius:5px;display:grid;place-items:center;background:#172746;color:var(--fs-gold)}.benefit-icon.green,.premium-card .shortcut-icon{background:#123d2b;color:#8ff0b0}.benefit strong,.section-card h2,.section-card h3,.plano h2{color:#fff}.benefit p,.section-card p,.plano li,.premium-section-head p,.shortcut-card span,.dash-card span,.dash-card small,.caixa-item span{color:var(--fs-muted)}
.fluxo-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}.passo{padding:14px;border:1px solid var(--fs-border);border-radius:5px;background:#081a3a;color:#fff}.plano.premium{border-color:#278b53}.plano.premium h2,.plano.premium .preco{color:#8ff0b0}.preco{font-size:32px;color:#fff;margin:8px 0}.home-efex{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:24px;align-items:center;overflow:hidden}.home-efex-image{width:100%;max-height:250px;object-fit:contain}.home-efex-copy{display:grid;gap:12px}
.premium-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:center;padding:24px;border-top:3px solid #22c55e}.premium-hello h1{margin:8px 0;color:#fff}.premium-hello p{margin:0;color:var(--fs-muted)}.premium-hero-acao{display:flex;flex-wrap:wrap;gap:10px}.premium-section{display:grid;gap:12px}.premium-section-head{display:flex;align-items:end;justify-content:space-between;gap:12px}.premium-section-head h2{margin:0;color:#fff}.premium-section-head p{margin:4px 0 0}.premium-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.shortcut-card{text-decoration:none;min-height:112px}.shortcut-card.destaque{border-color:var(--fs-gold)}.shortcut-card.premium-card{border-color:#278b53}.shortcut-card strong,.dash-card strong,.caixa-item strong,.orcamento-mini strong{display:block;color:#fff;font-size:18px}.shortcut-card span{font-size:12px}.dash-card{min-height:104px;border-left:4px solid var(--fs-gold)}.dash-card.ok{border-left-color:#22c55e}.dash-card.warn{border-left-color:var(--fs-gold)}.premium-lista{display:grid;gap:8px}.orcamento-mini{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;text-decoration:none}.orcamento-mini span span{display:block;margin-top:3px;color:var(--fs-muted);font-size:12px}.mini-status{padding:4px 7px;border-radius:4px;background:#172746;color:#fff;font-size:11px;font-style:normal}.mini-status.aprovado{background:#123d2b;color:#8ff0b0}.mini-status.recusado{background:#451a1a;color:#fecaca}.caixa-resumo{grid-template-columns:repeat(3,minmax(0,1fr))}.caixa-item.saldo{border-color:#278b53}.premium-loading{padding:18px;border:1px dashed var(--fs-border);border-radius:5px;color:var(--fs-muted);background:#081a3a}
.modal-login-overlay{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;background:rgba(2,8,23,.82);z-index:30000;padding:18px;overflow:auto}.modal-login-box{width:min(430px,100%);background:#081a3a;border:1px solid var(--fs-border);border-radius:6px;padding:20px;margin:30px auto;position:relative}.btn-fechar-login{position:absolute;right:12px;top:12px;width:34px;height:34px;border:1px solid var(--fs-border);border-radius:4px;background:#0b2148;color:#fff}.auth-logo-box{text-align:center;margin:-20px -20px 14px;padding:24px 20px;background:#06142f;border-bottom:2px solid var(--fs-gold);color:#fff}.auth-logo-text{font-size:24px;color:#fff}.auth-logo-box p{color:var(--fs-muted)}.auth-campo-index{display:grid;gap:5px;margin-bottom:10px}.auth-campo-index label{color:#fff;font-size:12px;font-weight:700}.auth-campo-index input{min-height:42px;padding:9px 10px;border:1px solid var(--fs-border);border-radius:4px;background:#0b2148;color:#fff}.btn-principal-index{width:100%;min-height:44px;border:1px solid var(--fs-gold);border-radius:4px;background:var(--fs-gold);color:#14243a;font-weight:700}.auth-alternar-index{text-align:center;margin-top:12px}.auth-alternar-index a,footer.home-footer a{color:var(--fs-gold)}footer.home-footer{text-align:center;padding:24px;color:var(--fs-muted)}.oculto{display:none!important}#btn-flutuante-gerador-global{display:none!important}
@media(max-width:820px){.home-hero{padding:34px 24px 26px}.benefits,.resumo,.planos,.premium-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.fluxo-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.home-efex,.premium-hero{grid-template-columns:1fr}.home-efex-image{max-height:210px}.premium-hero-acao{justify-content:flex-start}}
@media(max-width:560px){.home{width:min(100% - 14px,1160px);padding-top:10px}.home-hero{padding:26px 16px 20px}.hero-title{font-size:34px}.hero-sub{font-size:16px}.benefits,.resumo,.planos,.premium-grid,.caixa-resumo{grid-template-columns:1fr}.hero-actions,.premium-hero-acao{display:grid}.home-btn{width:100%}.item-row{grid-template-columns:auto 1fr auto}.dashes{display:none}.organized{display:none}.preview-body{padding:14px}.total-box{align-items:flex-start;flex-direction:column}.premium-section-head{align-items:flex-start;flex-direction:column}.orcamento-mini{align-items:flex-start;flex-direction:column}.home-efex-image{max-height:180px}}
/* === FIM HOME FS ORCAMENTOS CONSOLIDADA === */
'''
          s += '\n' + css + '\n'

          index.write_text(i, encoding='utf-8')
          style.write_text(s, encoding='utf-8')
          Path('.github/workflows/consolidar-index.yml').unlink(missing_ok=True)
          PY

      - name: Commitar consolidação
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidar index e home Premium" || exit 0
          git push

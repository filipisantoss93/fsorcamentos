name: Consolidar home publica e premium

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/consolidar-home.yml'

permissions:
  contents: write

jobs:
  consolidar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Consolidar index, header e tema global
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          index = Path('index.html')
          style = Path('style.css')
          header = Path('header.html')

          i = index.read_text(encoding='utf-8')
          s = style.read_text(encoding='utf-8')
          h = header.read_text(encoding='utf-8')

          # Remove o CSS visual local da home. O layout passa a existir em style.css.
          i = re.sub(r'\s*<style>.*?</style>\s*', '\n', i, count=1, flags=re.S|re.I)

          # Remove estilos inline simples do HTML da home.
          i = i.replace('<h2 style="margin:0">', '<h2>')
          i = i.replace('<h2 style="margin:0 0 12px">', '<h2>')
          i = i.replace(' class="home-btn secondary" style="min-height:46px;padding:10px 14px"', ' class="home-btn secondary compact"')
          i = i.replace('<strong style="font-size:14px">', '<strong>')
          i = i.replace('acompanhe aprovaçã.', 'acompanhe aprovações.')

          # Inclui o Efex como recurso comercial da home pública.
          alvo = '<section class="section-card fluxo"><span class="home-tag">Para quem é</span>'
          secao_efex = '''<section class="home-efex section-card">
        <div class="home-efex-copy">
          <span class="home-tag premium-tag">Exclusivo Premium</span>
          <h2>Efex, o copiloto inteligente da oficina</h2>
          <p>Organize sintomas, hipóteses, testes, imagens e orçamento em um fluxo técnico mais rápido e profissional.</p>
          <div class="home-efex-actions">
            <a href="/efex.html" class="home-btn premium"><div><strong>Conhecer o Efex</strong><span>Abrir especialistas automotivos</span></div></a>
          </div>
        </div>
        <img src="/assets/efex-home.svg?v=b74d5cc" alt="Efex, copiloto inteligente da oficina" class="home-efex-image">
      </section>
      '''
          if alvo in i and 'class="home-efex section-card"' not in i:
              i = i.replace(alvo, secao_efex + alvo)

          # Reorganiza atalhos Premium e inclui Efex como ação principal.
          old_grid = '''<div class="premium-grid"><a class="shortcut-card destaque" href="/gerador.html"><span class="shortcut-icon">📄</span><strong>Gerar orçamento</strong><span>Criar PDF ou link</span></a><a class="shortcut-card" href="/orcamentos.html"><span class="shortcut-icon">☷</span><strong>Orçamentos</strong><span>Status e pagamentos</span></a><a class="shortcut-card" href="/fluxo-caixa.html"><span class="shortcut-icon">▤</span><strong>Caixa</strong><span>Entradas e saídas</span></a><a class="shortcut-card" href="/dashboard.html"><span class="shortcut-icon">▥</span><strong>Relatórios</strong><span>Números principais</span></a><a class="shortcut-card" href="/forum.html"><span class="shortcut-icon">💬</span><strong>Fórum</strong><span>Comunidade</span></a><a class="shortcut-card" href="/painel.html"><span class="shortcut-icon">⚙</span><strong>Painel</strong><span>Perfil e empresa</span></a></div>'''
          new_grid = '''<div class="premium-grid premium-actions-grid"><a class="shortcut-card destaque" href="/gerador.html"><span class="shortcut-icon" aria-hidden="true">＋</span><strong>Novo orçamento</strong><span>Criar PDF ou link profissional</span></a><a class="shortcut-card premium-card" href="/efex.html"><span class="shortcut-icon" aria-hidden="true">AI</span><strong>Abrir Efex</strong><span>Diagnóstico e rascunho inteligente</span></a><a class="shortcut-card" href="/orcamentos.html"><span class="shortcut-icon" aria-hidden="true">OS</span><strong>Orçamentos</strong><span>Status e pagamentos</span></a><a class="shortcut-card" href="/fluxo-caixa.html"><span class="shortcut-icon" aria-hidden="true">R$</span><strong>Caixa</strong><span>Entradas, saídas e saldo</span></a><a class="shortcut-card secondary-action" href="/dashboard.html"><span class="shortcut-icon" aria-hidden="true">↗</span><strong>Relatórios</strong><span>Indicadores da operação</span></a><a class="shortcut-card secondary-action" href="/painel.html"><span class="shortcut-icon" aria-hidden="true">⚙</span><strong>Configurações</strong><span>Perfil e empresa</span></a></div>'''
          if old_grid in i:
              i = i.replace(old_grid, new_grid)

          # Hero Premium com duas ações principais.
          old_hero = '<section class="premium-hero"><div class="premium-hello"><span class="premium-selo">✦ Premium ativo</span><h1 id="premium-saudacao">Olá!</h1><p>Seu painel inicial rápido para criar, acompanhar e transformar orçamentos aprovados em caixa.</p></div><div class="premium-hero-acao"><a href="/gerador.html" class="home-btn primary"><div><strong>Gerar orçamento</strong><span>Começar agora</span></div></a></div></section>'
          new_hero = '<section class="premium-hero"><div class="premium-hello"><span class="premium-selo">Premium ativo</span><h1 id="premium-saudacao">Olá!</h1><p>Centralize orçamento, diagnóstico, aprovação e caixa em um único fluxo de trabalho.</p></div><div class="premium-hero-acao"><a href="/gerador.html" class="home-btn primary compact"><div><strong>Novo orçamento</strong><span>Começar agora</span></div></a><a href="/efex.html" class="home-btn premium compact"><div><strong>Abrir Efex</strong><span>Diagnóstico com IA</span></div></a></div></section>'
          if old_hero in i:
              i = i.replace(old_hero, new_hero)

          # Remove ui.js da home: não é usado neste documento.
          i = i.replace('<script src="config.js"></script><script src="auth.js"></script><script src="ui.js"></script><script src="planos.js"></script>', '<script src="config.js"></script><script src="auth.js"></script><script src="planos.js"></script>')

          # Home começa oculta até a sessão ser resolvida, evitando flash da versão pública.
          i = i.replace('<main id="home-publica" class="home home-publica">', '<main id="home-publica" class="home home-publica home-pendente">')
          i = i.replace('<main id="home-premium" class="home home-premium">', '<main id="home-premium" class="home home-premium home-pendente">')

          # Atualiza a lógica de inicialização e valida assinatura real.
          i = i.replace("if(!session?.user){return}", "if(!session?.user){$('home-publica')?.classList.remove('home-pendente');return}")
          i = i.replace("const plano=norm(perfil.plano||localStorage.getItem('usuario_plano')||session.user.user_metadata?.plano);\n        if(plano!=='premium')return;", "let assinatura=null;try{const r=await _supabase.from('assinaturas').select('plano,status,expira_em').eq('usuario_id',session.user.id).maybeSingle();if(!r.error)assinatura=r.data}catch(e){}const status=norm(assinatura?.status);const expira=assinatura?.expira_em?new Date(assinatura.expira_em).getTime():Infinity;const premium=norm(assinatura?.plano)==='premium'&&['ativo','pago','teste_gratis'].includes(status)&&expira>=Date.now();if(!premium){$('home-publica')?.classList.remove('home-pendente');return}")
          i = i.replace("$('home-publica')?.classList.add('oculta');\n        $('home-premium')?.classList.add('ativo');", "$('home-publica')?.classList.add('oculta');$('home-publica')?.classList.remove('home-pendente');\n        $('home-premium')?.classList.add('ativo');$('home-premium')?.classList.remove('home-pendente');")

          # Remove toda a folha de sobrescrita indevida de header.html.
          h = re.sub(r'<style id="fs-tema-compacto-ajustes-finais">.*?</style>\s*', '', h, count=1, flags=re.S|re.I)

          # Remove versão anterior do CSS específico da home e grava a nova versão consolidada.
          marker_ini = '/* === HOME FS ORCAMENTOS CONSOLIDADA === */'
          marker_fim = '/* === FIM HOME FS ORCAMENTOS CONSOLIDADA === */'
          s = re.sub(re.escape(marker_ini)+r'.*?'+re.escape(marker_fim), '', s, flags=re.S)

          # Corrige diretamente regras globais conflitantes.
          s = s.replace('--body-brown: #ffffff;', '--body-brown: var(--fs-bg);')
          s = s.replace('--body-gray: #ffffff;', '--body-gray: var(--fs-bg);')
          s = s.replace('.main-header { width:100%; margin:0; background:rgba(255,255,255,.97) !important;', '.main-header { width:100%; margin:0; background:rgba(4,14,34,.97) !important;')
          s = s.replace('background:rgba(255,255,255,.98); color:var(--fs-text); border:1px solid var(--fs-border);', 'background:#081a3a; color:var(--fs-text); border:1px solid var(--fs-border);')
          s = s.replace('.menu-mobile-btn span { display:block; width:22px; height:3px; border-radius:3px; background:#081a3a !important; }', '.menu-mobile-btn span { display:block; width:22px; height:3px; border-radius:3px; background:#ffffff !important; }')
          s = s.replace(' { background:#123d2b; color:var(--fs-text) !important;', ' { background:var(--fs-card); color:var(--fs-text) !important;')

          home_css = r'''
/* === HOME FS ORCAMENTOS CONSOLIDADA === */
.home-pendente{visibility:hidden;min-height:60vh}
.home{width:min(1160px,calc(100% - 24px));margin:0 auto;padding:24px 0 54px;display:grid;gap:22px;color:var(--fs-text)}
.home-premium{display:none}.home-premium.ativo{display:grid}.home-publica.oculta{display:none!important}
.home-hero,.premium-hero,.section-card,.preview-card,.benefits,.plano,.shortcut-card,.dash-card,.caixa-item,.orcamento-mini{background:linear-gradient(145deg,#0b2148,#071934);border:1px solid var(--fs-border);border-radius:6px;color:var(--fs-text);box-shadow:0 12px 30px rgba(0,0,0,.18)}
.home-hero{position:relative;overflow:hidden;padding:48px 54px 34px;border-top:3px solid var(--fs-gold);background:radial-gradient(circle at 88% 8%,rgba(246,196,67,.12),transparent 32%),linear-gradient(145deg,#0b2148,#06142f)}
.home-hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,20,47,.98),rgba(6,20,47,.76));pointer-events:none}.home-hero>*{position:relative;z-index:1}
.home-tag,.premium-selo{display:inline-flex;align-items:center;width:max-content;gap:8px;padding:7px 10px;border-radius:4px;background:rgba(246,196,67,.12);border:1px solid rgba(246,196,67,.55);color:var(--fs-gold);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.premium-selo,.premium-tag{background:#123d2b;border-color:#278b53;color:#8ff0b0}
.hero-title{max-width:820px;margin:18px 0 0;font-size:clamp(36px,5.4vw,64px);line-height:1.02;letter-spacing:-.05em;color:#fff}.hero-title .blue,.hero-title .dot{color:var(--fs-gold)}
.hero-sub{max-width:760px;margin:18px 0 0;color:var(--fs-muted);font-size:clamp(17px,2.2vw,24px);line-height:1.45}.hero-sub strong{color:#fff}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}.home-btn{display:inline-flex;align-items:center;gap:12px;min-height:50px;padding:12px 16px;border:1px solid var(--fs-border);border-radius:5px;background:#0b2148;color:#fff;text-decoration:none;font-weight:700;box-shadow:none;transition:.18s ease}.home-btn:hover{transform:translateY(-1px);border-color:var(--fs-gold)}.home-btn svg{width:26px;height:26px}.home-btn strong{display:block;font-size:16px}.home-btn span{display:block;margin-top:2px;color:var(--fs-muted);font-size:12px;font-weight:500}.home-btn.primary{background:var(--fs-gold);color:#14243a;border-color:var(--fs-gold)}.home-btn.primary span{color:#4b3a08}.home-btn.secondary{background:#0b2148;color:#fff}.home-btn.premium{background:#166534;color:#fff;border-color:#22c55e}.home-btn.premium span{color:#bbf7d0}.home-btn.compact{min-height:46px;padding:10px 14px}
.preview-card{margin-top:32px;overflow:hidden}.preview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;background:#06142f;border-bottom:1px solid var(--fs-border)}.preview-title{display:flex;align-items:center;gap:10px;color:#fff;font-size:19px;font-weight:700}.preview-title .mini-icon{display:grid;place-items:center;width:32px;height:32px;border-radius:4px;background:rgba(246,196,67,.12);color:var(--fs-gold)}.organized{padding:5px 8px;border-radius:4px;background:#123d2b;color:#8ff0b0;font-size:12px;font-weight:700}.preview-body{padding:20px}.item-row{display:grid;grid-template-columns:auto auto 1fr auto;gap:12px;align-items:center;padding:11px 0}.round-icon{width:40px;height:40px;border-radius:5px;display:grid;place-items:center;background:#102d61;color:var(--fs-gold)}.round-icon.green{background:#123d2b;color:#8ff0b0}.round-icon svg{width:21px;height:21px}.item-name,.price,.total-label,.total-value{color:#fff}.item-name{font-size:18px}.price{font-size:18px}.dashes{border-bottom:1px dashed #355783}.total-box{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;margin-top:12px;padding:16px;border:1px solid rgba(246,196,67,.4);border-radius:5px;background:#0c234b}.total-value{font-size:clamp(28px,5vw,44px)}.generate-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:54px;margin-top:12px;border-radius:5px;background:var(--fs-gold);color:#14243a;text-decoration:none;font-weight:800}.generate-btn span{display:block;color:#4b3a08;font-size:12px}.generate-btn svg{width:24px;height:24px}
.benefits{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));overflow:hidden}.benefit{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:18px;border-right:1px solid var(--fs-border)}.benefit:last-child{border-right:0}.benefit-icon{width:42px;height:42px;border-radius:5px;display:grid;place-items:center;background:#102d61;color:var(--fs-gold)}.benefit-icon.green{background:#123d2b;color:#8ff0b0}.benefit strong{color:#fff}.benefit p{margin:3px 0 0;color:var(--fs-muted);font-size:13px}
.resumo{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.section-card{padding:22px}.section-card h2,.section-card h3{margin:0 0 8px;color:#fff}.section-card p{margin:0;color:var(--fs-muted);line-height:1.55}.fluxo-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-top:14px}.passo{padding:13px;border:1px solid var(--fs-border);border-radius:5px;background:#0c234b;color:#fff;font-weight:650}
.home-efex{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:24px;align-items:center;border-color:#278b53;background:radial-gradient(circle at 88% 12%,rgba(34,197,94,.12),transparent 34%),linear-gradient(145deg,#0b2148,#071934)}.home-efex-copy h2{margin:12px 0 8px}.home-efex-actions{margin-top:18px}.home-efex-image{width:100%;max-height:220px;object-fit:contain;filter:drop-shadow(0 14px 20px rgba(0,0,0,.28))}
.planos{display:grid;grid-template-columns:1fr 1fr;gap:14px}.plano{padding:22px}.plano h2{margin:0;color:#fff}.plano .preco{margin:9px 0;color:var(--fs-gold);font-size:32px}.plano ul{color:var(--fs-muted)}.plano.premium{border-color:#278b53;border-top:3px solid #22c55e}.plano.premium .preco{color:#8ff0b0}
.modal-login-overlay{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;background:rgba(0,5,17,.86);z-index:30000;padding:18px;overflow:auto}.modal-login-box{width:min(430px,100%);margin:30px auto;padding:20px;border:1px solid var(--fs-border);border-radius:6px;background:#081a3a;color:#fff}.btn-fechar-login{position:absolute;right:12px;top:12px;width:34px;height:34px;border:1px solid var(--fs-border);border-radius:4px;background:#0b2148;color:#fff}.auth-logo-box{text-align:center;margin:-20px -20px 14px;padding:22px;background:#06142f;border-bottom:2px solid var(--fs-gold);border-radius:6px 6px 0 0}.auth-campo-index{display:grid;gap:5px;margin-bottom:10px}.auth-campo-index label{color:var(--fs-muted);font-size:12px;font-weight:700}.auth-campo-index input{min-height:42px;padding:9px 10px;border:1px solid var(--fs-border);border-radius:4px;background:#05142e;color:#fff}.btn-principal-index{width:100%;min-height:44px;border:1px solid var(--fs-gold);border-radius:4px;background:var(--fs-gold);color:#14243a;font-weight:800}.auth-alternar-index{text-align:center;margin-top:12px}.auth-alternar-index a{color:var(--fs-gold)}
.premium-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center;padding:24px;background:radial-gradient(circle at 88% 10%,rgba(34,197,94,.10),transparent 28%),linear-gradient(145deg,#0b2148,#06142f);border-top:3px solid #22c55e}.premium-hello h1{margin:10px 0 6px;color:#fff;font-size:clamp(28px,4.4vw,42px)}.premium-hello p{margin:0;color:var(--fs-muted)}.premium-hero-acao{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.premium-layout,.premium-section{display:grid;gap:12px}.premium-section-head{display:flex;align-items:end;justify-content:space-between;gap:12px}.premium-section-head h2{margin:0;color:#fff;font-size:21px}.premium-section-head p{margin:3px 0 0;color:var(--fs-muted);font-size:13px}
.premium-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.shortcut-card,.dash-card{position:relative;min-height:112px;padding:16px;text-decoration:none;overflow:hidden}.shortcut-card{display:grid;align-content:start}.shortcut-card:hover{border-color:var(--fs-gold)}.shortcut-card.destaque{background:#102d61;border-color:var(--fs-gold)}.shortcut-card.premium-card{background:#123d2b;border-color:#278b53}.shortcut-icon{display:grid;place-items:center;width:34px;height:34px;margin-bottom:12px;border-radius:4px;background:#102d61;color:var(--fs-gold);font-size:13px;font-weight:800}.premium-card .shortcut-icon{background:#166534;color:#dcfce7}.shortcut-card strong{color:#fff;font-size:16px}.shortcut-card span:not(.shortcut-icon){margin-top:4px;color:var(--fs-muted);font-size:12px}.dash-card{display:grid;align-content:center;border-left:3px solid var(--fs-gold)}.dash-card.ok{border-left-color:#22c55e}.dash-card.warn{border-left-color:#f6c443}.dash-card span,.dash-card small{color:var(--fs-muted)}.dash-card strong{margin:5px 0;color:#fff;font-size:25px}
.premium-lista{display:grid;gap:8px}.orcamento-mini{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:13px;text-decoration:none}.orcamento-mini strong{display:block;color:#fff}.orcamento-mini span span{display:block;margin-top:3px;color:var(--fs-muted);font-size:12px}.mini-status{padding:4px 7px;border-radius:4px;background:#102d61;color:#fff;font-size:10px;font-style:normal;text-transform:uppercase}.mini-status.aprovado{background:#123d2b;color:#8ff0b0}.mini-status.recusado{background:#351725;color:#fca5a5}.caixa-resumo{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.caixa-item{padding:14px}.caixa-item span{display:block;color:var(--fs-muted);font-size:12px}.caixa-item strong{display:block;margin-top:4px;color:#fff;font-size:20px}.caixa-item.saldo{border-color:#278b53}.premium-loading{padding:18px;border:1px dashed var(--fs-border);border-radius:5px;background:#071934;color:var(--fs-muted);text-align:center}
.home-footer{text-align:center;padding:22px;color:var(--fs-muted)}.home-footer a{color:var(--fs-gold)}
@media(max-width:860px){.home-hero{padding:34px 24px 24px}.benefits,.resumo,.planos,.premium-grid{grid-template-columns:1fr 1fr}.home-efex{grid-template-columns:1fr 170px}.premium-hero{grid-template-columns:1fr}.premium-hero-acao{justify-content:flex-start}}
@media(max-width:560px){.home{width:min(100% - 14px,1160px);padding-top:10px;gap:14px}.home-hero{padding:26px 17px 18px}.hero-title{font-size:34px}.hero-sub{font-size:15px}.hero-actions{display:grid}.home-btn{width:100%}.preview-card{margin-top:22px}.preview-head{padding:13px}.preview-body{padding:14px}.item-row{grid-template-columns:auto 1fr auto}.dashes{display:none}.benefits,.resumo,.planos,.premium-grid,.caixa-resumo{grid-template-columns:1fr}.benefit{border-right:0;border-bottom:1px solid var(--fs-border)}.benefit:last-child{border-bottom:0}.fluxo-grid{grid-template-columns:1fr 1fr}.home-efex{grid-template-columns:1fr}.home-efex-image{max-height:160px}.premium-actions-grid{grid-template-columns:1fr 1fr}.premium-section-head{align-items:start;flex-direction:column}.orcamento-mini{grid-template-columns:1fr}.premium-hero-acao{display:grid}.organized{display:none}}
/* === FIM HOME FS ORCAMENTOS CONSOLIDADA === */
'''
          s = s.rstrip() + '\n\n' + home_css.strip() + '\n'

          index.write_text(i, encoding='utf-8')
          style.write_text(s, encoding='utf-8')
          header.write_text(h, encoding='utf-8')

          # O workflow é temporário e não permanece no projeto.
          Path('.github/workflows/consolidar-home.yml').unlink(missing_ok=True)
          PY

      - name: Commitar consolidação
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidar home publica e premium" || exit 0
          git push

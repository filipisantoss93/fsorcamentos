name: Consolidar home publica e premium
on: push
permissions:
  contents: write
jobs:
  consolidar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Executar consolidação preparada
        run: |
          python3 <<'RUNNER'
          from pathlib import Path
          import subprocess, textwrap
          previous = subprocess.check_output(['git','show','HEAD^:.github/workflows/consolidar-home.yml'], text=True)
          block = previous.split("python3 <<'PY'",1)[1].split("\n          PY",1)[0]
          exec(compile(textwrap.dedent(block), 'consolidar-home.py', 'exec'))
          RUNNER
      - name: Commitar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidar home publica e premium" || exit 0
          git push

name: Redesenhar interface profissional do Efex

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/redesign-efex.yml'

permissions:
  contents: write

jobs:
  redesign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Atualizar layout existente do Efex
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p=Path('efex.html')
          html=p.read_text(encoding='utf-8')
          css=Path('.github/workflows/redesign-efex.yml').read_text(encoding='utf-8').split("CSS_INICIO\n",1)[1].split("\nCSS_FIM",1)[0]
          html,n=re.subn(r'<style>.*?</style>', '<style>\n'+css+'\n  </style>', html, count=1, flags=re.S)
          if n!=1: raise SystemExit('Bloco CSS não encontrado')
          html=html.replace('<meta name="theme-color" content="#082f49">','<meta name="theme-color" content="#030d22">')
          p.write_text(html,encoding='utf-8')
          PY
      - name: Commitar redesign
        shell: bash
        run: |
          rm -f .github/workflows/redesign-efex.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redesenhar Efex com interface profissional e responsiva"
          git push

# O conteúdo abaixo é lido pelo script e removido junto com este workflow.
CSS_INICIO
    :root{--efex-bg:#030d22;--efex-surface:#071934;--efex-card:#0b2148;--efex-card-2:#0e2a59;--efex-border:#294875;--efex-border-strong:#3b628f;--efex-text:#fff;--efex-muted:#c8d5e8;--efex-muted-2:#91a7c2;--efex-yellow:#f6c443;--efex-yellow-2:#ffb900;--efex-green:#22c55e;--efex-danger:#ef4444;--efex-radius:6px;--efex-shadow:0 18px 46px rgba(0,0,0,.28)}
    *{box-sizing:border-box}body{background:var(--efex-bg);color:var(--efex-text)}.efex-page{width:min(1220px,calc(100% - 28px));margin:auto;padding:22px 0 64px;display:grid;gap:18px;color:var(--efex-text)}.efex-card{background:linear-gradient(145deg,var(--efex-card),var(--efex-surface));border:1px solid var(--efex-border);border-radius:var(--efex-radius);box-shadow:var(--efex-shadow);padding:20px;min-width:0}
    .efex-hero{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1fr) 220px;align-items:center;min-height:230px;padding:32px;background:radial-gradient(circle at 92% 10%,rgba(246,196,67,.14),transparent 30%),linear-gradient(135deg,#0c2b59 0%,#06142f 72%);color:#fff;border:1px solid var(--efex-border);border-top:3px solid var(--efex-yellow)}.efex-hero:after{content:"";position:absolute;width:260px;height:260px;border-radius:50%;right:-100px;top:-130px;background:rgba(246,196,67,.12);border:1px solid rgba(246,196,67,.18)}.efex-hero-copy{position:relative;z-index:2;max-width:760px}.efex-tag{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:4px;background:rgba(246,196,67,.14);border:1px solid rgba(246,196,67,.55);color:var(--efex-yellow);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em}.efex-tag:before{content:"◆";font-size:9px}.efex-hero h1{margin:14px 0 9px;color:#fff;font-size:clamp(34px,5vw,54px);line-height:1.02;letter-spacing:-.045em;font-weight:800}.efex-hero p{max-width:700px;margin:0;color:var(--efex-muted);font-size:16px;line-height:1.55}.efex-character{position:relative;z-index:2;align-self:end;justify-self:end;width:100%;max-height:205px;object-fit:contain;object-position:center bottom;filter:drop-shadow(0 16px 20px rgba(0,0,0,.3))}
    .efex-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-top:20px}.efex-metric{padding:11px 12px;border:1px solid rgba(255,255,255,.13);border-radius:4px;background:rgba(255,255,255,.055)}.efex-metric span{display:block;color:var(--efex-muted-2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.045em}.efex-metric strong{display:block;margin-top:5px;color:#fff;font-size:15px;font-weight:750}.efex-badge-ok{color:#86efac!important}.efex-badge-danger{color:#fca5a5!important}
    .efex-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,.78fr);gap:18px;align-items:start}.efex-column{display:grid;gap:16px;min-width:0}.efex-layout>aside{position:sticky;top:92px}.efex-section-head{margin:-20px -20px 18px;padding:16px 20px;background:linear-gradient(135deg,#0d2d5d,#081a3a);border-bottom:1px solid var(--efex-border);border-radius:6px 6px 0 0;color:#fff}.efex-section-head h2{margin:0;color:#fff;font-size:18px;line-height:1.2;font-weight:760}.efex-section-head p{margin:5px 0 0;color:var(--efex-muted);font-size:12.5px;line-height:1.45}
    .efex-specialists{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.efex-specialist{position:relative;display:grid;grid-template-columns:24px 1fr;gap:11px;align-items:start;min-height:96px;padding:14px;border:1px solid var(--efex-border);border-radius:5px;background:var(--efex-card);color:#fff;cursor:pointer;transition:.16s}.efex-specialist:hover{border-color:var(--efex-border-strong);background:var(--efex-card-2);transform:translateY(-1px)}.efex-specialist input{width:20px;height:20px;margin:1px 0 0;accent-color:var(--efex-green)}.efex-specialist strong{display:block;padding-right:42px;color:#fff;font-size:14px;line-height:1.25;font-weight:750}.efex-specialist small{display:block;margin-top:5px;color:var(--efex-muted);font-size:12px;line-height:1.4}.efex-specialist:has(input:checked){border-color:#2f8f5b;background:linear-gradient(145deg,#0d3240,#0a233c);box-shadow:inset 3px 0 0 var(--efex-green)}.efex-specialist.required{border-color:#39749a;background:linear-gradient(145deg,#0d3158,#0b2148);box-shadow:inset 3px 0 0 var(--efex-yellow)}.efex-specialist .efex-chip{position:absolute;right:9px;top:9px;padding:3px 7px;border-radius:4px;background:#18365f;color:var(--efex-muted);border:1px solid var(--efex-border);font-size:9px;font-weight:800}.efex-specialist.required .efex-chip{background:rgba(246,196,67,.14);color:var(--efex-yellow);border-color:rgba(246,196,67,.46)}
    .efex-levels{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.efex-level{position:relative;min-height:150px;padding:15px;border:1px solid var(--efex-border);border-radius:5px;background:var(--efex-card);cursor:pointer;transition:.16s}.efex-level:hover{transform:translateY(-1px);border-color:var(--efex-border-strong)}.efex-level input{position:absolute;opacity:0}.efex-level:has(input:checked){border:1px solid var(--efex-green);background:linear-gradient(145deg,#0d3240,#0a233c);box-shadow:inset 3px 0 0 var(--efex-green)}.efex-level strong{display:block;color:#fff;font-size:14px;font-weight:760}.efex-level small{display:block;margin-top:7px;color:var(--efex-muted);font-size:12px;line-height:1.42}.efex-level em{display:inline-flex;margin-top:12px;padding:4px 7px;border-radius:4px;background:#17355d;color:var(--efex-muted);border:1px solid var(--efex-border);font-size:9px;font-style:normal;font-weight:800;text-transform:uppercase}.efex-level:has(input:checked) em{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.38)}
    .efex-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.efex-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.efex-field{display:grid;gap:6px;min-width:0}.efex-field.full{grid-column:1/-1}.efex-field label{font-size:11px;font-weight:750;color:var(--efex-muted);text-transform:uppercase;letter-spacing:.045em}.efex-field input,.efex-field select,.efex-field textarea{width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--efex-border);border-radius:4px;background:#05142e;color:#fff;font:inherit;outline:none}.efex-field input::placeholder,.efex-field textarea::placeholder{color:#8398b5}.efex-field input:focus,.efex-field select:focus,.efex-field textarea:focus{border-color:var(--efex-yellow);box-shadow:0 0 0 3px rgba(246,196,67,.11)}.efex-field textarea{min-height:118px;resize:vertical;line-height:1.5}.efex-field small,.efex-footnote{color:var(--efex-muted);font-size:11px;line-height:1.45}
    details.efex-details{margin-top:10px!important;border:1px solid var(--efex-border);border-radius:4px;background:#081a3a;overflow:hidden}details.efex-details summary{padding:13px 14px;color:#fff;font-weight:720;cursor:pointer;list-style:none;background:#0b2148}details.efex-details summary::-webkit-details-marker{display:none}details.efex-details summary:before{content:"+";display:inline-grid;place-items:center;width:20px;height:20px;margin-right:8px;border:1px solid var(--efex-border);color:var(--efex-yellow)}details.efex-details[open] summary:before{content:"−"}details.efex-details>div{padding:14px}
    .efex-upload{display:grid;gap:12px;padding:15px;border:1px dashed var(--efex-border-strong);border-radius:4px;background:#071934;color:#fff}.efex-file-input{position:absolute;width:1px;height:1px;opacity:0}.efex-previews{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.efex-preview{position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#0b2148;border:1px solid var(--efex-border)}.efex-preview img{width:100%;height:100%;object-fit:cover}.efex-preview button{position:absolute;right:5px;top:5px;width:28px;height:28px;border:1px solid rgba(255,255,255,.25);border-radius:50%;background:rgba(5,20,46,.9);color:#fff}
    .efex-actions{display:flex;flex-wrap:wrap;gap:9px}.efex-btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 15px;border:1px solid var(--efex-border);border-radius:4px;background:#0b2148;color:#fff;font:inherit;font-weight:750;cursor:pointer;text-decoration:none;transition:.16s}.efex-btn:hover{transform:translateY(-1px);background:#10305f;border-color:var(--efex-border-strong)}.efex-btn.primary{background:var(--efex-yellow);color:#102536;border-color:var(--efex-yellow-2)}.efex-btn.success{background:var(--efex-green);color:#062411;border-color:#4ade80}.efex-btn.danger{background:#351725;color:#fecaca;border-color:#7f1d1d}.efex-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}#efex-analisar{flex:1 1 260px;min-height:52px;font-size:16px}#efex-limpar{flex:0 1 120px}
    .efex-estimate{display:grid;gap:9px;padding:15px;border-radius:4px;background:#071934;border:1px solid var(--efex-border)}.efex-estimate-row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}.efex-estimate-row:last-of-type{border-bottom:0;padding-bottom:0}.efex-estimate span{color:var(--efex-muted)}.efex-estimate strong{color:#fff;text-align:right}.efex-progress{display:none;margin-top:10px;padding:12px;border-radius:4px;background:rgba(246,196,67,.12);border:1px solid rgba(246,196,67,.4);color:var(--efex-yellow);font-weight:750}.efex-progress.ativo{display:block}
    .efex-placeholder{padding:42px 24px;text-align:center;border:1px dashed var(--efex-border-strong);border-radius:4px;background:#071934;color:var(--efex-muted);font-size:15px;line-height:1.5}.efex-placeholder strong{color:#fff}.efex-result{display:none;gap:11px}.efex-result.ativo{display:grid}.efex-result-block{padding:15px;border:1px solid var(--efex-border);border-radius:4px;background:#071934;color:#fff}.efex-result-block h3{margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.09);color:var(--efex-yellow);font-size:15px;font-weight:760}.efex-result-block p{margin:0;color:var(--efex-muted);line-height:1.58;overflow-wrap:anywhere}.efex-result-block ul,.efex-result-block ol{margin:0;padding-left:20px;display:grid;gap:7px;color:var(--efex-muted);overflow-wrap:anywhere}.efex-hypotheses{display:grid;gap:8px}.efex-hypothesis{padding:12px;border-radius:4px;background:#0b2148;border:1px solid var(--efex-border)}.efex-hypothesis-top{display:flex;justify-content:space-between;gap:8px}.efex-confidence{font-size:9px;font-weight:850;text-transform:uppercase;color:#86efac;white-space:nowrap}.efex-table-wrap{overflow:auto;border:1px solid var(--efex-border);border-radius:4px}.efex-table{width:100%;min-width:640px;border-collapse:collapse;background:#071934}.efex-table th{padding:10px;background:#0d2d5d;color:#fff;text-align:left;font-size:10px}.efex-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.09);color:var(--efex-muted);font-size:12px}.efex-price{white-space:nowrap;font-weight:800;color:#fff!important}.efex-source-list a{color:var(--efex-yellow)}.efex-chat-log{display:grid;gap:8px;max-height:320px;overflow:auto;padding:10px;border-radius:4px;background:#05142e;border:1px solid var(--efex-border)}.efex-message{max-width:90%;padding:10px 12px;border-radius:4px;background:#0b2148;border:1px solid var(--efex-border);color:var(--efex-muted);white-space:pre-wrap;overflow-wrap:anywhere}.efex-message.user{justify-self:end;background:#123d2b;border-color:#278b53;color:#fff}.efex-lock{display:none;text-align:center}.efex-lock.ativo{display:grid;gap:10px}.is-hidden{display:none!important}
    @media(max-width:980px){.efex-layout,.efex-hero{grid-template-columns:1fr}.efex-layout>aside{position:static}.efex-character{position:absolute;right:18px;bottom:0;width:170px;max-height:175px;opacity:.38}.efex-hero-copy{padding-right:120px}}
    @media(max-width:650px){.efex-page{width:min(100% - 16px,1220px);padding:10px 0 40px;gap:12px}.efex-card{padding:14px}.efex-hero{min-height:auto;padding:20px 16px 18px}.efex-hero-copy{padding-right:0}.efex-character{display:none}.efex-hero h1{font-size:34px}.efex-hero p{font-size:14px}.efex-metrics{grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.efex-metric:last-child{grid-column:1/-1}.efex-section-head{margin:-14px -14px 14px;padding:14px}.efex-specialists,.efex-levels,.efex-grid,.efex-grid.three{grid-template-columns:1fr}.efex-field.full{grid-column:auto}.efex-specialist,.efex-level{min-height:auto}.efex-previews{grid-template-columns:repeat(2,1fr)}.efex-actions{display:grid;grid-template-columns:1fr}.efex-btn,#efex-analisar,#efex-limpar{width:100%;flex:auto}.efex-table{min-width:560px}.efex-placeholder{padding:30px 18px}}
CSS_FIM

name: Build Android App

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Tipo de build
        required: true
        default: debug_apk
        type: choice
        options:
          - debug_apk
          - release_aab

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verificar arquivos principais
        run: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html

      - name: Instalar dependencias
        run: npm install

      - name: Criar projeto Android se nao existir
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Dar permissao ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar build Android
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release_aab" ]; then
            ./gradlew bundleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Enviar AAB
        if: ${{ github.event.inputs.build_type == 'release_aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: FS-Orcamentos-AAB
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Enviar APK
        if: ${{ github.event.inputs.build_type == 'debug_apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: FS-Orcamentos-APK-Teste
          path: android/app/build/outputs/apk/debug/*.apk

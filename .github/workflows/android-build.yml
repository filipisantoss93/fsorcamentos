name: Build Android App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verificar arquivos principais
        run: |
          echo "Arquivos na raiz:"
          ls -la
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html

      - name: Instalar dependências
        run: npm install

      - name: Criar projeto Android se não existir
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar APK de teste com log completo
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../build-android-log.txt

      - name: Procurar APK gerado
        run: |
          echo "Procurando APKs gerados..."
          find android -name "*.apk" -type f -print

      - name: Enviar log do build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LOG-Build-Android
          path: build-android-log.txt

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: FS-Orcamentos-APK-Teste
          path: |
            android/**/*.apk

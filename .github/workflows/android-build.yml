name: Build Android App

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Tipo de build
        required: true
        default: debug_apk
        type: choice
        options:
          - debug_apk
          - release_aab

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verificar arquivos principais
        run: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html

      - name: Instalar dependencias
        run: npm install

      - name: Criar projeto Android se nao existir
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Aplicar icone do app
        run: |
          if [ -f "assets/android-icon.svg" ]; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            for item in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              dpi=${item%%:*}
              size=${item##*:}
              dir="android/app/src/main/res/mipmap-${dpi}"
              mkdir -p "$dir"
              convert -background none assets/android-icon.svg -resize ${size}x${size} -strip "$dir/ic_launcher.png"
              cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
            done
          fi

      - name: Dar permissao ao Gradle
        run: chmod +x android/gradlew

      - name: Gerar build Android
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release_aab" ]; then
            ./gradlew bundleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Enviar AAB
        if: ${{ github.event.inputs.build_type == 'release_aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: FS-Orcamentos-AAB
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Enviar APK
        if: ${{ github.event.inputs.build_type == 'debug_apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: FS-Orcamentos-APK-Teste
          path: android/app/build/outputs/apk/debug/*.apk

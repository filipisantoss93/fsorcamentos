name: Consolidar paleta existente

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/consolidar-paleta-existente.yml'

permissions:
  contents: write

jobs:
  corrigir-paleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Alterar cores nos códigos existentes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          arquivos = [
              'style.css','index.html','painel.html','planos.html','gerador.html',
              'fs-theme-cinza.css','painel-inline.css','header-clean.css','auth-clean.css',
              'efex.html','dashboard.html','orcamentos.html','fluxo-caixa.html',
              'biblioteca.html','forum.html','sobre.html','contato.html','ver.html'
          ]

          fundos_claros = {
              '#fff':'#081a3a','#ffffff':'#081a3a','#f8fafc':'#0b2148',
              '#f7f9fc':'#0b2148','#f4f8ff':'#06142f','#f5f9ff':'#06142f',
              '#f3f5f8':'#06142f','#f4f6f8':'#06142f','#eaf3ff':'#0c234b',
              '#edf5ff':'#0c234b','#eef4ff':'#0c234b','#e9eef3':'#0c234b',
              '#fff8df':'#172746','#fff7d7':'#282718','#fffaf0':'#172746',
              '#f5f8fc':'#0b2148','#edf2f6':'#0c234b'
          }
          textos_escuros = {
              '#06122f':'#ffffff','#07122f':'#ffffff','#07142f':'#ffffff',
              '#040f2f':'#ffffff','#06142f':'#ffffff','#0f172a':'#ffffff',
              '#111827':'#ffffff','#1f2937':'#ffffff','#243447':'#ffffff',
              '#334155':'#ffffff','#273b63':'#ffffff','#475569':'#c8d5e8',
              '#52627a':'#c8d5e8','#5f6f7f':'#c8d5e8','#64748b':'#c8d5e8',
              '#245eac':'#c8d5e8','#334e68':'#c8d5e8','#7b8da8':'#b9c8dc'
          }
          bordas_claras = {
              '#d8e6ff':'#294875','#d6e7ff':'#294875','#cfd8e6':'#294875',
              '#d6dee6':'#294875','#c8d7ee':'#294875','#d8e2ef':'#294875',
              '#e5e7eb':'#294875','#e6edf6':'#294875','#cfe0ff':'#355783',
              '#cfe1ff':'#355783','#9ec4ff':'#3a6191'
          }

          def troca_tokens(valor, mapa):
              for antigo, novo in sorted(mapa.items(), key=lambda x: -len(x[0])):
                  valor = re.sub(re.escape(antigo), novo, valor, flags=re.I)
              return valor

          def proteger_print(texto):
              protegidos=[]
              padrao=re.compile(r'@media\s+print\s*\{(?:[^{}]|\{[^{}]*\})*\}',re.I|re.S)
              def guarda(m):
                  protegidos.append(m.group(0))
                  return f'__FS_PRINT_{len(protegidos)-1}__'
              return padrao.sub(guarda,texto),protegidos

          def restaurar_print(texto, protegidos):
              for i, bloco in enumerate(protegidos):
                  texto=texto.replace(f'__FS_PRINT_{i}__',bloco)
              return texto

          decl = re.compile(r'(?P<prop>(?:background(?:-color|-image)?|color|border(?:-[a-z-]+)?|outline(?:-color)?))\s*:\s*(?P<val>[^;{}]+)',re.I)

          def ajustar_declaracao(m):
              prop=m.group('prop')
              val=m.group('val')
              p=prop.lower()
              if p.startswith('background'):
                  val=troca_tokens(val,fundos_claros)
              elif p=='color':
                  val=troca_tokens(val,textos_escuros)
              elif p.startswith('border') or p.startswith('outline'):
                  val=troca_tokens(val,bordas_claras)
              return f'{prop}:{val}'

          def ajustar_raios(texto):
              def raio(m):
                  valor=m.group(1).strip()
                  if '%' in valor or 'var(' in valor:
                      return m.group(0)
                  partes=valor.split()
                  novas=[]
                  for parte in partes:
                      mm=re.fullmatch(r'(\d+(?:\.\d+)?)px',parte)
                      if mm and float(mm.group(1))>6:
                          novas.append('6px')
                      else:
                          novas.append(parte)
                  return 'border-radius:'+ ' '.join(novas)
              return re.sub(r'border-radius\s*:\s*([^;{}]+)',raio,texto,flags=re.I)

          for nome in arquivos:
              p=Path(nome)
              if not p.exists():
                  continue
              original=p.read_text(encoding='utf-8')
              texto, prints=proteger_print(original)

              # Variáveis centrais alteradas na própria origem, sem camada de sobrescrita.
              vars_map={
                  '--fs-bg: #f3f5f8':'--fs-bg: #030d22',
                  '--fs-bg:#f3f5f8':'--fs-bg:#030d22',
                  '--fs-card: #ffffff':'--fs-card: #081a3a',
                  '--fs-card:#ffffff':'--fs-card:#081a3a',
                  '--fs-card-soft: #f7f9fc':'--fs-card-soft: #0c234b',
                  '--fs-card-soft:#f7f9fc':'--fs-card-soft:#0c234b',
                  '--fs-border: #cfd8e6':'--fs-border: #294875',
                  '--fs-border:#cfd8e6':'--fs-border:#294875',
                  '--fs-text: #06122f':'--fs-text: #ffffff',
                  '--fs-text:#06122f':'--fs-text:#ffffff',
                  '--fs-muted: #64748b':'--fs-muted: #c8d5e8',
                  '--fs-muted:#64748b':'--fs-muted:#c8d5e8',
                  '--fs-gold: #f5b625':'--fs-gold: #f6c443',
                  '--fs-gold:#f5b625':'--fs-gold:#f6c443',
                  '--fs-success: #16a34a':'--fs-success: #22c55e',
                  '--fs-success:#16a34a':'--fs-success:#22c55e'
              }
              for a,b in vars_map.items(): texto=texto.replace(a,b)

              texto=decl.sub(ajustar_declaracao,texto)
              texto=ajustar_raios(texto)

              # Premium é verde; amarelo permanece somente como destaque editorial.
              texto=re.sub(r'(?is)([^{}]*(?:premium|plano-premium)[^{}]*\{)([^{}]*)(\})',
                  lambda m: m.group(1)+re.sub(r'background(?:-color)?\s*:\s*[^;{}]+', 'background:#123d2b', m.group(2), flags=re.I)
                                   .replace('color:var(--fs-gold)','color:#8ff0b0')
                                   .replace('color:var(--gold)','color:#8ff0b0')
                                   .replace('border-color:var(--fs-gold)','border-color:#278b53')
                                   .replace('border-color:var(--gold)','border-color:#278b53')+m.group(3), texto)

              texto=restaurar_print(texto,prints)
              if texto!=original:
                  p.write_text(texto,encoding='utf-8')

          # Remove a camada de sobrescrita criada anteriormente.
          Path('brand-contrast-fix.css').unlink(missing_ok=True)

          # Remove apenas a injeção dessa camada; mantém os demais CSS existentes.
          js=Path('carregar-menu.js')
          if js.exists():
              t=js.read_text(encoding='utf-8')
              t=t.replace(";fsGarantirCss('fs-brand-contrast-css','/brand-contrast-fix.css?v=20260701-1')",'')
              js.write_text(t,encoding='utf-8')

          # O workflow é temporário e não permanece no projeto.
          Path('.github/workflows/consolidar-paleta-existente.yml').unlink(missing_ok=True)
          PY

      - name: Commitar correções diretas
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária"
            exit 0
          fi
          git commit -m "Corrigir paleta diretamente nos estilos existentes"
          git push

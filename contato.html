    <style>
        /* Mesmos estilos da página de dicas para manter o padrão */
        :root { --bg-dark: #121212; --accent-yellow: #ffd700; --brown-dark: #3e2723; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; }
        header { background: rgba(44, 44, 44, 0.8); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--accent-yellow); }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        .logo { font-weight: bold; font-size: 22px; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-yellow); }
        .menu a { color: #eee; text-decoration: none; margin-left: 15px; text-transform: uppercase; font-size: 13px; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        .contact-card { background: #fff; color: #333; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .logo-nav { font-weight: 800; color: #fff; font-size: 20px; }
.logo-nav span { color: var(--accent-yellow); font-weight: 300; }

/* Esconde o botão do menu por padrão no computador */
.menu-mobile-btn {
    display: none;
    background: none;
    border: 1px solid var(--accent-yellow);
    color: var(--accent-yellow);
    font-size: 24px;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 5px;
}

/* Garante que o menu esteja sempre em linha no computador */
.nav-menu {
    display: flex !important; /* Força o alinhamento em linha */
    list-style: none;
    gap: 20px;
    margin: 0;
    padding: 0;
    flex-direction: row;
}

/* Ajustes exclusivos para Celular */
@media (max-width: 600px) {
    .menu-mobile-btn {
        display: block; /* Mostra o ícone apenas no celular */
    }

    .nav-menu {
        display: none !important; /* Esconde a linha no celular por padrão */
        flex-direction: column;
        position: absolute;
        top: 70px;
        right: 0;
        width: 100%;
        background: rgba(44, 44, 44, 0.98);
        backdrop-filter: blur(10px);
        padding: 20px 25px 20px 20px;
        border-bottom: 2px solid var(--accent-yellow);
        gap: 15px;
        text-align: right;
    }

    /* Quando clicado, o menu aparece no celular */
    .nav-menu.active {
        display: flex !important;
    }
}
.nav-menu a { 
    color: #eee; text-decoration: none; font-size: 14px; font-weight: 500;
    transition: 0.3s; text-transform: uppercase;
}
.nav-menu a:hover { color: var(--accent-yellow); }

/* Sistema de Abas/Páginas */
.app-page { display: none; animation: fadeIn 0.4s ease; }
.app-page.active { display: block; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 600px) {
    .nav-menu { display: none; } /* Aqui você pode criar um menu lateral depois */
}
    </style>
</head>
<body>

<header class="main-header">
    <nav class="nav-container">
        <div class="logo-nav">FS<span>Orçamentos</span></div>
<ul class="nav-menu">
    <li><a href="index.html">Início</a></li>
    <li><a href="sobre.html">Sobre</a></li>
    <li><a href="comunidade.html">Comunidade</a></li>
    <li><a href="dicas.html">Dicas</a></li>
    <li><a href="contato.html">Contato</a></li>
</ul>
        <button class="menu-mobile-btn" onclick="toggleMenuMobile()">☰</button>
    </nav>
</header>

<div class="container">
    <h1>Fale Conosco 💬</h1>
    <div class="contact-card">
        <p>Dúvidas ou sugestões? Mande uma mensagem direta!</p>
        <input type="text" id="nome" placeholder="Seu Nome">
        <select id="assunto">
            <option>Dúvida Técnica</option>
            <option>Sugestão</option>
            <option>Relatar Erro</option>
        </select>
        <textarea id="msg" placeholder="Sua mensagem..."></textarea>
        <button class="btn-wa" onclick="enviarWA()">Enviar via WhatsApp</button>
    </div>
</div>

<script>
    function enviarWA() {
        const n = document.getElementById('nome').value;
        const a = document.getElementById('assunto').value;
        const m = document.getElementById('msg').value;
        const texto = encodeURIComponent(`Olá, meu nome é ${n}. Assunto: ${a}. Mensagem: ${m}`);
        window.open(`https://api.whatsapp.com/send?phone=5518996769589&text=${texto}`, '_blank');
    }

function toggleMenuMobile() {
    const menu = document.querySelector('.nav-menu');
    // Adiciona ou remove a classe 'active' para mostrar/esconder o menu
    menu.classList.toggle('active');
}

// Fecha o menu automaticamente ao clicar em qualquer link (melhora a experiência)
document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('click', () => {
        document.querySelector('.nav-menu').classList.remove('active');
    });
});
</script>

</body>
</html>

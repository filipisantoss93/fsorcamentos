<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07111f">
  <title>Recuperar senha | FS Orçamentos</title>
  <meta name="description" content="Recupere o acesso à sua conta do FS Orçamentos.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    body{min-height:100vh;margin:0;background:#07111f;color:#f5f7fb;font-family:Arial,sans-serif;display:grid;place-items:center;padding:20px;box-sizing:border-box}
    .auth-page{width:min(440px,100%);background:linear-gradient(145deg,#101c30,#0b1628);border:1px solid rgba(255,255,255,.12);border-top:3px solid #f6c443;border-radius:14px;box-shadow:0 18px 48px rgba(0,0,0,.35);overflow:hidden}
    .auth-head{padding:28px 24px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
    .brand{font-size:24px;font-weight:800}.brand strong{color:#f6c443}.auth-head h1{font-size:24px;margin:18px 0 8px}.auth-head p{margin:0;color:#aebbd0;line-height:1.5}
    .auth-body{padding:24px}.campo{display:grid;gap:7px}.campo label{font-weight:700;font-size:14px}.campo input{min-height:46px;border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:0 12px;background:#0b1526;color:#fff;font-size:16px;outline:none}.campo input:focus{border-color:#f6c443}
    button{width:100%;min-height:46px;margin-top:16px;border:0;border-radius:9px;background:#f6c443;color:#14243a;font-weight:800;font-size:15px;cursor:pointer}button:disabled{opacity:.65;cursor:wait}
    .status{display:none;margin-top:16px;padding:12px 14px;border-radius:9px;line-height:1.45;font-size:14px}.status.ok{display:block;background:#123d2b;color:#b9f6ca;border:1px solid #278b53}.status.erro{display:block;background:#451b28;color:#fecaca;border:1px solid #8b3448}
    .voltar{display:block;text-align:center;margin-top:18px;color:#f6c443;text-decoration:none;font-weight:700}.ajuda{margin:16px 0 0;color:#8f9db2;font-size:13px;line-height:1.5}
  </style>
</head>
<body>
  <main class="auth-page">
    <header class="auth-head">
      <div class="brand"><strong>FS</strong> Orçamentos</div>
      <h1>Recupere sua senha</h1>
      <p>Informe o e-mail da sua conta. Enviaremos um link seguro para criar uma nova senha.</p>
    </header>
    <section class="auth-body">
      <form id="form-recuperacao">
        <div class="campo">
          <label for="email">E-mail cadastrado</label>
          <input id="email" type="email" autocomplete="email" placeholder="seu@email.com" required>
        </div>
        <button id="btn-enviar" type="submit">Enviar link de recuperação</button>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <p class="ajuda">Por segurança, o link de recuperação expira. Caso não encontre a mensagem, verifique também a pasta de spam.</p>
      <a class="voltar" href="/index.html?login=1">← Voltar para o login</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script>
    if (!window._supabase) window._supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('form-recuperacao');
    const emailInput = document.getElementById('email');
    const botao = document.getElementById('btn-enviar');
    const statusBox = document.getElementById('status');

    function mostrarStatus(tipo, mensagem) {
      statusBox.className = `status ${tipo}`;
      statusBox.textContent = mensagem;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;

      botao.disabled = true;
      botao.textContent = 'Enviando...';
      statusBox.className = 'status';
      statusBox.textContent = '';

      try {
        const { error } = await _supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${window.location.origin}/redefinir-senha.html`
        });

        if (error) {
          const msg = String(error.message || '').toLowerCase();
          if (msg.includes('rate limit')) {
            mostrarStatus('erro', 'Muitas solicitações foram feitas em pouco tempo. Aguarde alguns minutos e tente novamente.');
          } else {
            console.error('Erro ao solicitar recuperação de senha:', error);
            mostrarStatus('erro', 'Não foi possível enviar o link de recuperação agora. Tente novamente.');
          }
          return;
        }

        mostrarStatus('ok', 'Se este e-mail estiver cadastrado, você receberá um link para redefinir sua senha. Verifique sua caixa de entrada e o spam.');
        form.reset();
      } catch (error) {
        console.error('Erro inesperado na recuperação de senha:', error);
        mostrarStatus('erro', 'Ocorreu um erro inesperado. Tente novamente.');
      } finally {
        botao.disabled = false;
        botao.textContent = 'Enviar link de recuperação';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visualizar Orçamento - FS Orçamentos</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root {
      --ver-cor-primaria: #3e2723;
      --ver-cor-destaque: #ffc400;
      --ver-cor-fundo: #efebe9;
      --ver-cor-texto-topo: #ffffff;
      --ver-cor-pagina: #f1f3f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: var(--ver-cor-pagina);
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      transition: background .25s ease;
    }

    .pagina-ver {
      max-width: 860px;
      margin: 25px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .ver-emissor-topo {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 18px;
      align-items: center;
      background: linear-gradient(135deg, var(--ver-cor-primaria), #2c1b17);
      color: var(--ver-cor-texto-topo);
      border-bottom: 5px solid var(--ver-cor-destaque);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .ver-logo-box {
      width: 120px;
      height: 96px;
      background: #ffffff;
      border-radius: 15px;
      border: 2px solid var(--ver-cor-destaque);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ver-logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #ver-logo-placeholder {
      font-size: 32px;
      font-weight: 900;
      color: var(--ver-cor-primaria);
      background: var(--ver-cor-destaque);
      padding: 8px 12px;
      border-radius: 10px;
    }

    .ver-emissor-info .ver-label {
      display: block;
      color: var(--ver-cor-destaque);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }

    .ver-emissor-info h1 {
      margin: 0;
      color: var(--ver-cor-destaque);
      font-size: 30px;
      line-height: 1.12;
      word-break: break-word;
      text-align: left;
    }

    .ver-emissor-info p {
      margin: 8px 0 12px;
      color: var(--ver-cor-texto-topo);
      font-size: 15px;
      font-weight: 700;
    }

    .ver-emissor-dados {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ver-emissor-dados span {
      display: none;
      background: rgba(255,255,255,0.10);
      border: 1px solid var(--ver-cor-destaque);
      color: var(--ver-cor-texto-topo);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .numero-orcamento {
      text-align: center;
      display: none;
      margin: 0 auto 8px;
      color: var(--ver-cor-primaria);
      font-size: 14px;
      font-weight: 900;
      background: var(--ver-cor-fundo);
      border: 1px solid #e5e5e5;
      border-left: 5px solid var(--ver-cor-destaque);
      border-radius: 999px;
      padding: 8px 14px;
      width: fit-content;
    }

    h1#titulo-orcamento {
      text-align: center;
      font-size: 30px;
      margin: 18px 0 18px;
      color: var(--ver-cor-primaria);
    }

    .linha-divisoria {
      height: 3px;
      background: var(--ver-cor-destaque);
      margin: 0 0 24px;
      border-radius: 20px;
      opacity: .75;
    }

    .box-info {
      background: var(--ver-cor-fundo);
      border: 1px solid #e5e5e5;
      border-left: 6px solid var(--ver-cor-destaque);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 22px;
      font-size: 17px;
      line-height: 1.7;
    }

    .box-info strong {
      color: var(--ver-cor-primaria);
    }

    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-pendente {
      background: #fff3cd;
      color: #856404;
    }

    .status-aprovado {
      background: #d4edda;
      color: #155724;
    }

    .status-recusado {
      background: #f8d7da;
      color: #721c24;
    }

    .status-em_servico {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-finalizado {
      background: #ede9fe;
      color: #5b21b6;
    }

    .tabela-wrapper {
      width: 100%;
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      background: #fff;
    }

    th {
      background: var(--ver-cor-primaria);
      color: var(--ver-cor-texto-topo);
      text-align: left;
      padding: 14px;
      font-size: 15px;
    }

    th:last-child,
    td:last-child {
      text-align: right;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 16px;
    }

    tbody tr:nth-child(even) {
      background: #fafafa;
    }

    .total-box {
      text-align: right;
      font-size: 28px;
      font-weight: 900;
      margin-top: 26px;
      padding: 20px;
      border-top: 4px solid var(--ver-cor-destaque);
      background: var(--ver-cor-fundo);
      color: var(--ver-cor-primaria);
      border-radius: 12px;
    }

    .observacoes-box {
      background: #fffaf0;
      border-left: 6px solid var(--ver-cor-destaque);
      border-radius: 12px;
      padding: 16px;
      margin-top: 22px;
      color: #5d4037;
      line-height: 1.55;
      font-size: 15px;
      display: none;
    }

    .observacoes-box strong {
      display: block;
      color: var(--ver-cor-primaria);
      margin-bottom: 6px;
    }

    .botoes-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 32px;
    }

    .btn-status {
      border: none;
      border-radius: 14px;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
      transition: .2s ease;
    }

    .btn-status:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    .btn-recusar {
      background: #d32f2f;
    }

    .btn-aprovar {
      background: #2e7d32;
    }

    .btn-status:disabled,
    .formas-pagamento-grid button:disabled,
    .btn-cancelar-pagamento:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      margin-top: 20px;
      line-height: 1.5;
    }

    .msg-carregando {
      background: #fff3cd;
      color: #856404;
    }

    .msg-erro {
      background: #f8d7da;
      color: #721c24;
    }

    .msg-sucesso {
      background: #d4edda;
      color: #155724;
    }

    .msg-resposta {
      background: #fff8e1;
      color: #5d4037;
      border-left: 6px solid var(--ver-cor-destaque);
      text-align: left;
    }

    .whatsapp-empresa-box {
      margin-top: 22px;
      text-align: center;
      display: none;
    }

    .btn-whatsapp-empresa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25d366;
      color: #073b1d;
      border: 2px solid #1fb957;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
    }

    .rodape {
      margin-top: 28px;
      text-align: center;
      color: #777;
      font-size: 12px;
      border-top: 1px dashed #ccc;
      padding-top: 16px;
    }

    .rodape strong {
      color: var(--ver-cor-primaria);
    }

    .modal-pagamento-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      padding: 18px;
    }

    .modal-pagamento-card {
      width: min(100%, 430px);
      background: #f4ece1;
      color: #3e2723;
      border-radius: 18px;
      border-top: 6px solid #ffc400;
      padding: 22px;
      box-shadow: 0 20px 55px rgba(0,0,0,0.45);
      text-align: center;
    }

    .modal-pagamento-card h3 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #3e2723;
    }

    .modal-pagamento-card p {
      margin: 0 0 18px;
      color: #6d4c41;
      line-height: 1.45;
    }

    .formas-pagamento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .formas-pagamento-grid button {
      border: 2px solid #3e2723;
      background: #ffc400;
      color: #3e2723;
      border-radius: 14px;
      padding: 15px 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: .2s ease;
    }

    .formas-pagamento-grid button:hover {
      background: #ffffff;
      transform: translateY(-1px);
    }

    .btn-cancelar-pagamento {
      width: 100%;
      margin-top: 14px;
      background: #ffffff;
      color: #3e2723;
      border: 1px solid #d7ccc8;
      border-radius: 12px;
      padding: 12px;
      font-weight: 900;
      cursor: pointer;
    }


    .veiculo-orcamento-box {
      background: #fffaf0;
      border: 1px solid var(--ver-cor-destaque);
      border-left: 6px solid var(--ver-cor-destaque);
      border-radius: 12px;
      padding: 16px;
      margin: 0 0 22px;
      color: #5d4037;
      line-height: 1.55;
      font-size: 15px;
    }

    .veiculo-orcamento-box strong {
      color: var(--ver-cor-primaria);
    }

    .veiculo-orcamento-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      margin-top: 8px;
    }

    .gerar-os-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #fffaf0;
      border: 1px solid var(--ver-cor-destaque);
      border-left: 6px solid var(--ver-cor-destaque);
      color: #5d4037;
    }

    .gerar-os-box strong {
      display: block;
      color: var(--ver-cor-primaria);
      margin-bottom: 6px;
    }

    .btn-gerar-os {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      background: var(--ver-cor-primaria);
      color: var(--ver-cor-destaque);
      border: 2px solid var(--ver-cor-destaque);
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
    }

    .btn-gerar-os:hover {
      background: var(--ver-cor-destaque);
      color: var(--ver-cor-primaria);
    }

    @media (max-width: 650px) {
      body {
        padding: 12px;
      }

      .pagina-ver {
        padding: 20px;
        margin: 15px auto;
      }

      .ver-emissor-topo {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 18px;
      }

      .ver-logo-box {
        margin: 0 auto;
      }

      .ver-emissor-info h1 {
        text-align: center;
        font-size: 24px;
      }

      .ver-emissor-dados {
        justify-content: center;
      }

      h1#titulo-orcamento {
        font-size: 25px;
      }

      .box-info {
        font-size: 16px;
      }

      .botoes-status,
      .formas-pagamento-grid,
      .veiculo-orcamento-grid {
        grid-template-columns: 1fr;
      }

      .total-box {
        font-size: 24px;
        text-align: center;
      }
    }
  </style>

<style id="fs-contrast-fix-final">

/* =========================================================
   FS CONTRAST FIX - textos legíveis no tema claro profissional
   Mantém marrom no header/títulos principais e corrige textos
   que estavam ficando da mesma cor do fundo.
   ========================================================= */
:root {
  --fs-marrom: #3e2723;
  --fs-marrom-2: #5d4037;
  --fs-fundo: #f7f2ea;
  --fs-fundo-2: #efe3d2;
  --fs-card: #ffffff;
  --fs-creme: #fffaf0;
  --fs-amarelo: #ffc400;

<script>
if (!window._supabase) {
  window._supabase = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );
}

const STATUS_CONFIG = {
  pendente: 'Pendente',
  aprovado: 'Aprovado',
  recusado: 'Recusado',
  em_servico: 'Em serviço',
  finalizado: 'Finalizado'
};

const FORMAS_PAGAMENTO = {
  credito: 'Crédito',
  debito: 'Débito',
  cartao_credito: 'Cartão de crédito',
  cartao_debito: 'Cartão de débito',
  pix: 'Pix',
  dinheiro: 'Dinheiro',
  boleto: 'Boleto',
  transferencia: 'Transferência'
};

let orcamentoAtual = null;
let perfilEmissorAtual = null;
let veiculoOrcamentoAtual = null;

document.addEventListener('DOMContentLoaded', carregarOrcamento);

function escaparHtml(valor) {
  return String(valor || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function textoComQuebra(valor) {
  return escaparHtml(valor).replace(/\n/g, '<br>');
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function formatarData(dataValor) {
  if (!dataValor) return '-';

  const data = new Date(dataValor);

  if (isNaN(data.getTime())) return '-';

  return data.toLocaleDateString('pt-BR');
}

function formatarDataHora(dataValor) {
  if (!dataValor) return '-';

  const data = new Date(dataValor);

  if (isNaN(data.getTime())) return '-';

  return data.toLocaleString('pt-BR');
}

function statusLabel(status) {
  return STATUS_CONFIG[status] || status || 'Pendente';
}

function classeStatus(status) {
  return String(status || 'pendente').replace(/[^a-zA-Z0-9_\-]/g, '');
}

function textoFormaPagamento(forma) {
  return FORMAS_PAGAMENTO[forma] || '-';
}

function valorOuVazio(valor) {
  return valor && String(valor).trim() ? String(valor).trim() : '';
}

function obterClienteIdOrcamento(orcamento) {
  return (
    valorOuVazio(orcamento?.cliente_id) ||
    valorOuVazio(orcamento?.cliente_id_cadastrado) ||
    valorOuVazio(orcamento?.id_cliente) ||
    ''
  );
}

function obterVeiculoIdOrcamento(orcamento) {
  return (
    valorOuVazio(orcamento?.veiculo_id) ||
    valorOuVazio(orcamento?.id_veiculo) ||
    valorOuVazio(orcamento?.veiculo_id_cadastrado) ||
    ''
  );
}

function montarVeiculoAPartirDoOrcamento(orcamento) {
  const veiculo = {
    id: obterVeiculoIdOrcamento(orcamento),
    placa: valorOuVazio(orcamento?.veiculo_placa) || valorOuVazio(orcamento?.placa_veiculo) || valorOuVazio(orcamento?.placa),
    chassi: valorOuVazio(orcamento?.veiculo_chassi) || valorOuVazio(orcamento?.chassi_veiculo) || valorOuVazio(orcamento?.chassi),
    marca: valorOuVazio(orcamento?.veiculo_marca) || valorOuVazio(orcamento?.marca_veiculo) || valorOuVazio(orcamento?.marca),
    modelo: valorOuVazio(orcamento?.veiculo_modelo) || valorOuVazio(orcamento?.modelo_veiculo) || valorOuVazio(orcamento?.modelo),
    cor: valorOuVazio(orcamento?.veiculo_cor) || valorOuVazio(orcamento?.cor_veiculo) || valorOuVazio(orcamento?.cor),
    prisma: valorOuVazio(orcamento?.veiculo_prisma) || valorOuVazio(orcamento?.prisma_veiculo) || valorOuVazio(orcamento?.prisma),
    ano: valorOuVazio(orcamento?.veiculo_ano) || valorOuVazio(orcamento?.ano_veiculo) || valorOuVazio(orcamento?.ano),
    observacoes: valorOuVazio(orcamento?.veiculo_observacoes) || valorOuVazio(orcamento?.observacoes_veiculo)
  };

  const temDados = Object.keys(veiculo).some((chave) => chave !== 'id' && valorOuVazio(veiculo[chave]));
  return temDados || veiculo.id ? veiculo : null;
}

async function carregarVeiculoDoOrcamento(orcamento) {
  const veiculoLocal = montarVeiculoAPartirDoOrcamento(orcamento);
  const veiculoId = obterVeiculoIdOrcamento(orcamento);

  if (!veiculoId) {
    return veiculoLocal;
  }

  try {
    const { data, error } = await _supabase
      .from('veiculos')
      .select('id, placa, chassi, marca, modelo, cor, prisma, ano, observacoes')
      .eq('id', veiculoId)
      .maybeSingle();

    if (error) {
      console.warn('Não foi possível carregar o veículo vinculado:', error);
      return veiculoLocal || { id: veiculoId };
    }

    return data || veiculoLocal || { id: veiculoId };
  } catch (error) {
    console.warn('Erro inesperado ao carregar veículo vinculado:', error);
    return veiculoLocal || { id: veiculoId };
  }
}

function montarHTMLVeiculoOrcamento(veiculo) {
  if (!veiculo) return '';

  const dados = [
    ['Placa', veiculo.placa],
    ['Marca', veiculo.marca],
    ['Modelo', veiculo.modelo],
    ['Cor', veiculo.cor],
    ['Prisma', veiculo.prisma],
    ['Ano', veiculo.ano],
    ['Chassi', veiculo.chassi]
  ].filter(([, valor]) => valorOuVazio(valor));

  if (!dados.length && !veiculo.id) return '';

  return `
    <div class="veiculo-orcamento-box">
      <strong>🚗 Veículo vinculado</strong>
      ${
        dados.length
          ? `<div class="veiculo-orcamento-grid">
              ${dados.map(([label, valor]) => `<div><strong>${escaparHtml(label)}:</strong> ${escaparHtml(valor)}</div>`).join('')}
            </div>`
          : '<div>Veículo vinculado ao orçamento.</div>'
      }
      ${veiculo.observacoes ? `<div style="margin-top:8px;"><strong>Observações:</strong> ${textoComQuebra(veiculo.observacoes)}</div>` : ''}
    </div>
  `;
}

function montarLinkGerarOS(orcamento) {
  if (!orcamento?.id) return 'ordens.html';

  const params = new URLSearchParams();
  params.set('orcamento_id', orcamento.id);

  const clienteId = obterClienteIdOrcamento(orcamento);
  const veiculoId = obterVeiculoIdOrcamento(orcamento);

  if (clienteId) params.set('cliente_id', clienteId);
  if (veiculoId) params.set('veiculo_id', veiculoId);

  return `ordens.html?${params.toString()}`;
}

function montarBotaoGerarOS(orcamento) {
  if (!orcamento?.id) return '';

  return `
    <div class="gerar-os-box">
      <strong>Orçamento aprovado</strong>
      O prestador pode gerar uma Ordem de Serviço com cliente${obterVeiculoIdOrcamento(orcamento) ? ', veículo' : ''} e orçamento já preenchidos.
      <br>
      <a class="btn-gerar-os" href="${escaparHtml(montarLinkGerarOS(orcamento))}">
        Gerar OS
      </a>
    </div>
  `;
}


function normalizarTexto(valor) {
  return String(valor || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function normalizarItem(item) {
  const descricao =
    item.descricao ||
    item.desc ||
    item.item ||
    item.nome ||
    '';

  const qtd =
    Number(
      item.qtd ??
      item.quantidade ??
      item.qtde ??
      item.qtd_item ??
      1
    );

  const valor =
    Number(
      item.valor ??
      item.valor_unitario ??
      item.preco ??
      item.unitario ??
      0
    );

  const subtotal =
    Number(
      item.subtotal ??
      item.total ??
      (qtd * valor)
    );

  return {
    descricao,
    qtd,
    valor,
    subtotal
  };
}

function formatarNumeroOrcamento(numero) {
  if (!numero && numero !== 0) return '';

  const somenteNumero = Number(numero);

  if (Number.isFinite(somenteNumero)) {
    return String(somenteNumero).padStart(6, '0');
  }

  return String(numero);
}

function obterTemaDoOrcamento(orcamento) {
  return normalizarTexto(
    orcamento?.tema_pdf ||
    orcamento?.tema ||
    orcamento?.theme ||
    'original'
  );
}

function coresDoTema(tema) {
  const temas = {
    original: {

function aplicarTemaVerHtml(orcamento) {
  const tema = obterTemaDoOrcamento(orcamento);
  const cor = coresDoTema(tema);

  document.documentElement.style.setProperty('--ver-cor-primaria', cor.primaria);
  document.documentElement.style.setProperty('--ver-cor-destaque', cor.destaque);
  document.documentElement.style.setProperty('--ver-cor-fundo', cor.fundo);
  document.documentElement.style.setProperty('--ver-cor-texto-topo', cor.textoTopo);
  document.documentElement.style.setProperty('--ver-cor-pagina', cor.fundoPagina);

  return cor;
}

function obterIdOrcamentoDoLink() {
  const params = new URLSearchParams(window.location.search);
  const idQuery = params.get('id');

  if (idQuery) return idQuery;

  const partes = window.location.pathname.split('/').filter(Boolean);
  const ultimo = partes[partes.length - 1];

  if (ultimo && ultimo !== 'ver.html' && ultimo !== 'ver') {
    return ultimo;
  }

  return null;
}

async function carregarPerfilEmissor(usuarioId) {
  if (!usuarioId) return null;

  try {
    const { data, error } = await _supabase
      .from('perfis')
      .select('nome, nome_empresa, telefone_empresa, endereco_empresa, cnpj_empresa, foto_url')
      .eq('id', usuarioId)
      .maybeSingle();

    if (error) {
      console.warn('Não foi possível carregar perfil do emissor:', error);
      return null;
    }

    return data || null;
  } catch (error) {
    console.warn('Erro inesperado ao carregar perfil do emissor:', error);
    return null;
  }
}

function preencherChipEmissor(elemento, texto) {
  if (!elemento) return;

  if (texto) {
    elemento.innerText = texto;
    elemento.style.display = 'inline-flex';
  } else {
    elemento.innerText = '';
    elemento.style.display = 'none';
  }
}

function configurarWhatsappEmpresa(telefone, nomeEmpresa) {
  const box = document.getElementById('whatsapp-empresa-box');
  const link = document.getElementById('btn-whatsapp-empresa');

  if (!box || !link) return;

  const limpo = String(telefone || '').replace(/\D/g, '');

  if (!limpo) {
    box.style.display = 'none';
    link.href = '#';
    return;
  }

  const numero = limpo.startsWith('55') ? limpo : '55' + limpo;

  const mensagem = `Olá! Estou falando sobre o orçamento recebido de ${nomeEmpresa || 'sua empresa'}.`;

  link.href = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  box.style.display = 'block';
}

function preencherTopoEmpresaVer(orcamento, perfil) {
  const logoImg = document.getElementById('ver-logo-empresa');
  const logoPlaceholder = document.getElementById('ver-logo-placeholder');

  const nomeEmpresaEl = document.getElementById('ver-nome-empresa');
  const consultorEl = document.getElementById('ver-consultor');
  const whatsappEl = document.getElementById('ver-whatsapp-empresa');
  const cnpjEl = document.getElementById('ver-cnpj-empresa');
  const enderecoEl = document.getElementById('ver-endereco-empresa');
  const rodapeEmpresa = document.getElementById('rodape-nome-empresa');

  const nomeEmpresa =
    valorOuVazio(perfil?.nome_empresa) ||
    valorOuVazio(orcamento?.nome_empresa) ||
    valorOuVazio(orcamento?.empresa) ||
    'Empresa';

  const consultor =
    valorOuVazio(orcamento?.consultor) ||
    valorOuVazio(orcamento?.responsavel) ||
    valorOuVazio(perfil?.nome) ||
    'Consultor';

  const telefone =
    valorOuVazio(perfil?.telefone_empresa) ||
    valorOuVazio(orcamento?.telefone_empresa) ||
    valorOuVazio(orcamento?.whatsapp_empresa);

  const cnpj =
    valorOuVazio(perfil?.cnpj_empresa) ||
    valorOuVazio(orcamento?.cnpj_empresa);

  const endereco =
    valorOuVazio(perfil?.endereco_empresa) ||
    valorOuVazio(orcamento?.endereco_empresa);

  const fotoUrl =
    valorOuVazio(perfil?.foto_url) ||
    valorOuVazio(orcamento?.foto_url) ||
    valorOuVazio(orcamento?.logo_url);

  if (nomeEmpresaEl) {
    nomeEmpresaEl.innerText = nomeEmpresa;
  }

  if (consultorEl) {
    consultorEl.innerText = `Consultor: ${consultor}`;
  }

  if (rodapeEmpresa) {
    rodapeEmpresa.innerText = nomeEmpresa;
  }

  preencherChipEmissor(whatsappEl, telefone ? `WhatsApp: ${telefone}` : '');
  preencherChipEmissor(cnpjEl, cnpj ? `CNPJ/CPF: ${cnpj}` : '');
  preencherChipEmissor(enderecoEl, endereco ? `Endereço: ${endereco}` : '');

  configurarWhatsappEmpresa(telefone, nomeEmpresa);

  if (logoImg && logoPlaceholder) {
    if (fotoUrl) {
      logoImg.src = fotoUrl + (fotoUrl.includes('?') ? '&' : '?') + 'v=' + Date.now();
      logoImg.style.display = 'block';
      logoPlaceholder.style.display = 'none';
    } else {
      logoImg.src = '';
      logoImg.style.display = 'none';
      logoPlaceholder.style.display = 'block';
      logoPlaceholder.innerText = nomeEmpresa.substring(0, 2).toUpperCase();
    }
  }

  document.title = `${nomeEmpresa} - ${orcamento?.assunto || 'Orçamento'}`;
}

function preencherNumeroOrcamento(orcamento) {
  const el = document.getElementById('numero-orcamento');

  if (!el) return;

  const numero =
    orcamento?.numero_orcamento ||
    orcamento?.numero ||
    '';

  if (!numero && numero !== 0) {
    el.style.display = 'none';
    el.innerText = '';
    return;
  }

  el.innerText = `Orçamento Nº ${formatarNumeroOrcamento(numero)}`;
  el.style.display = 'block';
}

async function carregarOrcamento() {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  const id = obterIdOrcamentoDoLink();

  if (!id) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não informado no link.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  const { data, error } = await _supabase
    .from('orcamentos')
    .select('*')
    .eq('id', id)
    .maybeSingle();

  if (error) {
    console.error('Erro ao buscar orçamento:', error);

    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Não foi possível carregar este orçamento.
        <br>
        Verifique se o link está correto.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  if (!data) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não encontrado.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  orcamentoAtual = data;
  aplicarTemaVerHtml(data);

  perfilEmissorAtual = await carregarPerfilEmissor(data.usuario_id);
  veiculoOrcamentoAtual = await carregarVeiculoDoOrcamento(data);

  preencherTopoEmpresaVer(data, perfilEmissorAtual);
  preencherNumeroOrcamento(data);
  renderizarOrcamento(data);
}

function renderizarOrcamento(orcamento) {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  aplicarTemaVerHtml(orcamento);
  preencherNumeroOrcamento(orcamento);

  const assunto = orcamento.assunto || 'Orçamento';
  const cliente = orcamento.cliente_nome || 'Não informado';
  const contato = orcamento.cliente_whatsapp || 'Não informado';
  const status = orcamento.status || 'pendente';
  const total = Number(orcamento.total || 0);
  const dataCriacao = orcamento.criado_em || orcamento.created_at || '';
  const observacoes = orcamento.observacoes || '';
  const formaPagamento = orcamento.forma_pagamento_cliente || '';
  const respostaClienteEm = orcamento.resposta_cliente_em || '';
  const veiculoHTML = montarHTMLVeiculoOrcamento(veiculoOrcamentoAtual || montarVeiculoAPartirDoOrcamento(orcamento));

  titulo.innerText = assunto;

  const itens = Array.isArray(orcamento.itens)
    ? orcamento.itens.map(normalizarItem)
    : [];

  let linhasItens = '';

  if (itens.length) {
    itens.forEach(item => {
      linhasItens += `
        <tr>
          <td>${escaparHtml(item.descricao)}</td>
          <td>${escaparHtml(item.qtd)}</td>
          <td>${formatarMoeda(item.valor)}</td>
          <td>${formatarMoeda(item.subtotal)}</td>
        </tr>
      `;
    });
  } else {
    linhasItens = `
      <tr>
        <td colspan="4">Nenhum item encontrado.</td>
      </tr>
    `;
  }

  const podeResponder = status === 'pendente';

  let mensagemResposta = '';

  if (status === 'aprovado') {
    mensagemResposta = `
      <div class="msg msg-resposta">
        <strong>✅ Orçamento aprovado.</strong><br>
        ${
          formaPagamento
            ? `<strong>Forma de pagamento escolhida:</strong> ${escaparHtml(textoFormaPagamento(formaPagamento))}<br>`
            : ''
        }
        ${
          respostaClienteEm
            ? `<strong>Resposta enviada em:</strong> ${escaparHtml(formatarDataHora(respostaClienteEm))}`
            : ''
        }
        ${montarBotaoGerarOS(orcamento)}
      </div>
    `;
  } else if (status === 'recusado') {
    mensagemResposta = `
      <div class="msg msg-resposta">
        <strong>❌ Orçamento recusado.</strong><br>
        ${
          respostaClienteEm
            ? `<strong>Resposta enviada em:</strong> ${escaparHtml(formatarDataHora(respostaClienteEm))}`
            : 'Sua resposta já foi registrada.'
        }
      </div>
    `;
  } else if (!podeResponder) {
    mensagemResposta = `
      <div class="msg msg-sucesso">
        Este orçamento já está com status: ${escaparHtml(statusLabel(status))}.
      </div>
    `;
  }

  container.innerHTML = `
    <div class="box-info">
      <div><strong>Cliente:</strong> ${escaparHtml(cliente)}</div>
      <div><strong>Contato:</strong> ${escaparHtml(contato)}</div>
      <div><strong>Data:</strong> ${formatarData(dataCriacao)}</div>
      <div>
        <strong>Status:</strong>
        <span class="status status-${classeStatus(status)}">
          ${escaparHtml(statusLabel(status))}
        </span>
      </div>
    </div>

    ${veiculoHTML}

    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Qtd</th>
            <th>Valor unit.</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody>
          ${linhasItens}
        </tbody>
      </table>
    </div>

    <div class="total-box">
      Total: ${formatarMoeda(total)}
    </div>

    ${
      observacoes
        ? `
          <div class="observacoes-box" style="display:block;">
            <strong>Observações:</strong>
            ${textoComQuebra(observacoes)}
          </div>
        `
        : ''
    }

    ${
      podeResponder
        ? `
          <div class="botoes-status">
            <button type="button" class="btn-status btn-recusar" onclick="recusarOrcamento()">
              Recusar orçamento
            </button>

            <button type="button" class="btn-status btn-aprovar" onclick="aprovarOrcamento()">
              Aprovar orçamento
            </button>
          </div>
        `
        : mensagemResposta
    }
  `;
}

function abrirModalFormaPagamento() {
  const modal = document.getElementById('modal-forma-pagamento');

  if (modal) {
    modal.style.display = 'flex';
  }
}

function fecharModalFormaPagamento() {
  const modal = document.getElementById('modal-forma-pagamento');

  if (modal) {
    modal.style.display = 'none';
  }
}

function orcamentoJaRespondido() {
  const status = orcamentoAtual?.status || 'pendente';
  return status !== 'pendente';
}

function setBotoesRespostaDesabilitados(desabilitado) {
  const botoes = document.querySelectorAll(
    '.btn-status, .formas-pagamento-grid button, .btn-cancelar-pagamento'
  );

  botoes.forEach(btn => {
    btn.disabled = desabilitado;
  });
}

async function aprovarOrcamento() {
  if (!orcamentoAtual?.id) {
    alert('Orçamento não carregado.');
    return;
  }

  if (orcamentoJaRespondido()) {
    alert('Este orçamento já foi respondido.');
    return;
  }

  abrirModalFormaPagamento();
}

async function selecionarFormaPagamento(formaPagamento) {
  if (!orcamentoAtual?.id) {
    alert('Orçamento não carregado.');
    return;
  }

  if (orcamentoJaRespondido()) {
    fecharModalFormaPagamento();
    alert('Este orçamento já foi respondido.');
    return;
  }

  const labelForma = textoFormaPagamento(formaPagamento);

  const confirmar = confirm(
    `Confirmar aprovação do orçamento com pagamento em ${labelForma}?`
  );

  if (!confirmar) return;

  setBotoesRespostaDesabilitados(true);

  const payload = {
    status: 'aprovado',
    forma_pagamento_cliente: formaPagamento,
    resposta_cliente_em: new Date().toISOString()
  };

  const { data, error } = await _supabase
    .from('orcamentos')
    .update(payload)
    .eq('id', orcamentoAtual.id)
    .eq('status', 'pendente')
    .select()
    .maybeSingle();

  if (error) {
    console.error('Erro ao aprovar orçamento:', error);

    alert(
      'Não foi possível aprovar o orçamento. Verifique se a permissão pública de atualização está configurada no Supabase.'
    );

    setBotoesRespostaDesabilitados(false);
    return;
  }

  if (!data) {
    alert('Este orçamento já foi respondido ou não está mais pendente.');
    window.location.reload();
    return;
  }

  orcamentoAtual = data;
  veiculoOrcamentoAtual = await carregarVeiculoDoOrcamento(data);

  fecharModalFormaPagamento();
  preencherNumeroOrcamento(data);
  renderizarOrcamento(data);

  alert('Orçamento aprovado com sucesso!');
}

async function recusarOrcamento() {
  if (!orcamentoAtual?.id) {
    alert('Orçamento não carregado.');
    return;
  }

  if (orcamentoJaRespondido()) {
    alert('Este orçamento já foi respondido.');
    return;
  }

  const confirmar = confirm('Deseja realmente recusar este orçamento?');

  if (!confirmar) return;

  setBotoesRespostaDesabilitados(true);

  const payload = {
    status: 'recusado',
    forma_pagamento_cliente: null,
    resposta_cliente_em: new Date().toISOString()
  };

  const { data, error } = await _supabase
    .from('orcamentos')
    .update(payload)
    .eq('id', orcamentoAtual.id)
    .eq('status', 'pendente')
    .select()
    .maybeSingle();

  if (error) {
    console.error('Erro ao recusar orçamento:', error);

    alert(
      'Não foi possível recusar o orçamento. Verifique se a permissão pública de atualização está configurada no Supabase.'
    );

    setBotoesRespostaDesabilitados(false);
    return;
  }

  if (!data) {
    alert('Este orçamento já foi respondido ou não está mais pendente.');
    window.location.reload();
    return;
  }

  orcamentoAtual = data;
  veiculoOrcamentoAtual = await carregarVeiculoDoOrcamento(data);

  preencherNumeroOrcamento(data);
  renderizarOrcamento(data);

  alert('Resposta enviada com sucesso.');
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    fecharModalFormaPagamento();
  }
});

document.addEventListener('click', function(event) {
  const modal = document.getElementById('modal-forma-pagamento');

  if (event.target === modal) {
    fecharModalFormaPagamento();
  }
});
</script>

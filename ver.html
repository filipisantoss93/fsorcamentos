<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visualizar Orçamento - FS Orçamentos</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root {
      --ver-cor-primaria: #3e2723;
      --ver-cor-destaque: #ffc400;
      --ver-cor-fundo: #efebe9;
      --ver-cor-texto-topo: #ffffff;
      --ver-cor-pagina: #f1f3f6;
    }

    body {
      margin: 0;
      padding: 18px;
      background: var(--ver-cor-pagina);
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      transition: background .25s ease;
    }

    .pagina-ver {
      max-width: 860px;
      margin: 25px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .ver-emissor-topo {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 18px;
      align-items: center;
      background: linear-gradient(135deg, var(--ver-cor-primaria), #2c1b17);
      color: var(--ver-cor-texto-topo);
      border-bottom: 5px solid var(--ver-cor-destaque);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .ver-logo-box {
      width: 120px;
      height: 96px;
      background: #ffffff;
      border-radius: 15px;
      border: 2px solid var(--ver-cor-destaque);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-sizing: border-box;
    }

    .ver-logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #ver-logo-placeholder {
      font-size: 32px;
      font-weight: 900;
      color: var(--ver-cor-primaria);
      background: var(--ver-cor-destaque);
      padding: 8px 12px;
      border-radius: 10px;
    }

    .ver-emissor-info .ver-label {
      display: block;
      color: var(--ver-cor-destaque);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }

    .ver-emissor-info h1 {
      margin: 0;
      color: var(--ver-cor-destaque);
      font-size: 30px;
      line-height: 1.12;
      word-break: break-word;
      text-align: left;
    }

    .ver-emissor-info p {
      margin: 8px 0 12px;
      color: var(--ver-cor-texto-topo);
      font-size: 15px;
      font-weight: 700;
    }

    .ver-emissor-dados {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ver-emissor-dados span {
      display: none;
      background: rgba(255,255,255,0.10);
      border: 1px solid var(--ver-cor-destaque);
      color: var(--ver-cor-texto-topo);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    h1#titulo-orcamento {
      text-align: center;
      font-size: 30px;
      margin: 18px 0 18px;
      color: var(--ver-cor-primaria);
    }

    .linha-divisoria {
      height: 3px;
      background: var(--ver-cor-destaque);
      margin: 0 0 24px;
      border-radius: 20px;
      opacity: .75;
    }

    .box-info {
      background: var(--ver-cor-fundo);
      border: 1px solid #e5e5e5;
      border-left: 6px solid var(--ver-cor-destaque);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 22px;
      font-size: 17px;
      line-height: 1.7;
    }

    .box-info strong {
      color: var(--ver-cor-primaria);
    }

    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-pendente {
      background: #fff3cd;
      color: #856404;
    }

    .status-aprovado {
      background: #d4edda;
      color: #155724;
    }

    .status-recusado {
      background: #f8d7da;
      color: #721c24;
    }

    .status-em_servico {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-finalizado {
      background: #ede9fe;
      color: #5b21b6;
    }

    .tabela-wrapper {
      width: 100%;
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      background: #fff;
    }

    th {
      background: var(--ver-cor-primaria);
      color: var(--ver-cor-texto-topo);
      text-align: left;
      padding: 14px;
      font-size: 15px;
    }

    th:last-child,
    td:last-child {
      text-align: right;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 16px;
    }

    tbody tr:nth-child(even) {
      background: #fafafa;
    }

    .total-box {
      text-align: right;
      font-size: 28px;
      font-weight: 900;
      margin-top: 26px;
      padding: 20px;
      border-top: 4px solid var(--ver-cor-destaque);
      background: var(--ver-cor-fundo);
      color: var(--ver-cor-primaria);
      border-radius: 12px;
    }

    .botoes-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 32px;
    }

    .btn-status {
      border: none;
      border-radius: 14px;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
      transition: .2s ease;
    }

    .btn-status:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
    }

    .btn-recusar {
      background: #d32f2f;
    }

    .btn-aprovar {
      background: #2e7d32;
    }

    .btn-status:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      margin-top: 20px;
    }

    .msg-carregando {
      background: #fff3cd;
      color: #856404;
    }

    .msg-erro {
      background: #f8d7da;
      color: #721c24;
    }

    .msg-sucesso {
      background: #d4edda;
      color: #155724;
    }

    .rodape {
      margin-top: 28px;
      text-align: center;
      color: #777;
      font-size: 12px;
      border-top: 1px dashed #ccc;
      padding-top: 16px;
    }

    .rodape strong {
      color: var(--ver-cor-primaria);
    }

    @media (max-width: 650px) {
      body {
        padding: 12px;
      }

      .pagina-ver {
        padding: 20px;
        margin: 15px auto;
      }

      .ver-emissor-topo {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 18px;
      }

      .ver-logo-box {
        margin: 0 auto;
      }

      .ver-emissor-info h1 {
        text-align: center;
        font-size: 24px;
      }

      .ver-emissor-dados {
        justify-content: center;
      }

      h1#titulo-orcamento {
        font-size: 25px;
      }

      .box-info {
        font-size: 16px;
      }

      .botoes-status {
        grid-template-columns: 1fr;
      }

      .total-box {
        font-size: 24px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

<div class="pagina-ver">

  <div class="ver-emissor-topo">
    <div class="ver-logo-box">
      <img id="ver-logo-empresa" src="" alt="Logo da empresa">
      <div id="ver-logo-placeholder">FS</div>
    </div>

    <div class="ver-emissor-info">
      <span class="ver-label">Orçamento emitido por</span>
      <h1 id="ver-nome-empresa">Carregando empresa...</h1>
      <p id="ver-consultor">Consultor: -</p>

      <div class="ver-emissor-dados">
        <span id="ver-whatsapp-empresa"></span>
        <span id="ver-cnpj-empresa"></span>
        <span id="ver-endereco-empresa"></span>
      </div>
    </div>
  </div>

  <h1 id="titulo-orcamento">Carregando...</h1>
  <div class="linha-divisoria"></div>

  <div id="conteudo-orcamento">
    <div class="msg msg-carregando">Carregando orçamento...</div>
  </div>

  <div class="rodape">
    Orçamento gerado por <strong id="rodape-nome-empresa">FS Orçamentos</strong>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
window._supabase = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const STATUS_CONFIG = {
  pendente: 'Pendente',
  aprovado: 'Aprovado',
  recusado: 'Recusado',
  em_servico: 'Em serviço',
  finalizado: 'Finalizado'
};

let orcamentoAtual = null;
let perfilEmissorAtual = null;

document.addEventListener('DOMContentLoaded', carregarOrcamento);

function escaparHtml(valor) {
  return String(valor || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function formatarData(dataValor) {
  if (!dataValor) return '-';

  const data = new Date(dataValor);

  if (isNaN(data.getTime())) return '-';

  return data.toLocaleDateString('pt-BR');
}

function statusLabel(status) {
  return STATUS_CONFIG[status] || status || 'Pendente';
}

function classeStatus(status) {
  return String(status || 'pendente').replace(/[^a-zA-Z0-9_\-]/g, '');
}

function valorOuVazio(valor) {
  return valor && String(valor).trim() ? String(valor).trim() : '';
}

function normalizarTexto(valor) {
  return String(valor || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function normalizarItem(item) {
  const descricao =
    item.descricao ||
    item.desc ||
    item.item ||
    item.nome ||
    '';

  const qtd =
    Number(
      item.qtd ??
      item.quantidade ??
      item.qtde ??
      item.qtd_item ??
      1
    );

  const valor =
    Number(
      item.valor ??
      item.valor_unitario ??
      item.preco ??
      item.unitario ??
      0
    );

  const subtotal =
    Number(
      item.subtotal ??
      item.total ??
      (qtd * valor)
    );

  return {
    descricao,
    qtd,
    valor,
    subtotal
  };
}

/* ==================== TEMA DO ORÇAMENTO ==================== */

function obterTemaDoOrcamento(orcamento) {
  return normalizarTexto(
    orcamento?.tema_pdf ||
    orcamento?.tema ||
    orcamento?.theme ||
    'original'
  );
}

function coresDoTema(tema) {
  const temas = {
    original: {
      primaria: '#3e2723',
      destaque: '#ffc400',
      fundo: '#efebe9',
      textoTopo: '#ffffff',
      fundoPagina: '#f1f3f6'
    },
    bw: {
      primaria: '#111111',
      destaque: '#000000',
      fundo: '#f5f5f5',
      textoTopo: '#ffffff',
      fundoPagina: '#eeeeee'
    },
    preto: {
      primaria: '#111111',
      destaque: '#000000',
      fundo: '#f5f5f5',
      textoTopo: '#ffffff',
      fundoPagina: '#eeeeee'
    },
    blue: {
      primaria: '#0056b3',
      destaque: '#00aaff',
      fundo: '#e3f2fd',
      textoTopo: '#ffffff',
      fundoPagina: '#eef6ff'
    },
    azul: {
      primaria: '#0056b3',
      destaque: '#00aaff',
      fundo: '#e3f2fd',
      textoTopo: '#ffffff',
      fundoPagina: '#eef6ff'
    },
    green: {
      primaria: '#2e7d32',
      destaque: '#81c784',
      fundo: '#e8f5e9',
      textoTopo: '#ffffff',
      fundoPagina: '#f0faf1'
    },
    verde: {
      primaria: '#2e7d32',
      destaque: '#81c784',
      fundo: '#e8f5e9',
      textoTopo: '#ffffff',
      fundoPagina: '#f0faf1'
    },
    yellow: {
      primaria: '#f9a825',
      destaque: '#ffc400',
      fundo: '#fff8e1',
      textoTopo: '#3e2723',
      fundoPagina: '#fffaf0'
    },
    amarelo: {
      primaria: '#f9a825',
      destaque: '#ffc400',
      fundo: '#fff8e1',
      textoTopo: '#3e2723',
      fundoPagina: '#fffaf0'
    },
    red: {
      primaria: '#8b0000',
      destaque: '#ff1717',
      fundo: '#ffebee',
      textoTopo: '#ffffff',
      fundoPagina: '#fff1f1'
    },
    vermelho: {
      primaria: '#8b0000',
      destaque: '#ff1717',
      fundo: '#ffebee',
      textoTopo: '#ffffff',
      fundoPagina: '#fff1f1'
    }
  };

  return temas[tema] || temas.original;
}

function aplicarTemaVerHtml(orcamento) {
  const tema = obterTemaDoOrcamento(orcamento);
  const cor = coresDoTema(tema);

  document.documentElement.style.setProperty('--ver-cor-primaria', cor.primaria);
  document.documentElement.style.setProperty('--ver-cor-destaque', cor.destaque);
  document.documentElement.style.setProperty('--ver-cor-fundo', cor.fundo);
  document.documentElement.style.setProperty('--ver-cor-texto-topo', cor.textoTopo);
  document.documentElement.style.setProperty('--ver-cor-pagina', cor.fundoPagina);

  return cor;
}

/* ==================== CARREGAMENTO ==================== */

function obterIdOrcamentoDoLink() {
  const params = new URLSearchParams(window.location.search);
  const idQuery = params.get('id');

  if (idQuery) return idQuery;

  const partes = window.location.pathname.split('/').filter(Boolean);
  const ultimo = partes[partes.length - 1];

  if (ultimo && ultimo !== 'ver.html' && ultimo !== 'ver') {
    return ultimo;
  }

  return null;
}

async function carregarPerfilEmissor(usuarioId) {
  if (!usuarioId) return null;

  try {
    const { data, error } = await _supabase
      .from('perfis')
      .select('nome, nome_empresa, telefone_empresa, endereco_empresa, cnpj_empresa, foto_url')
      .eq('id', usuarioId)
      .maybeSingle();

    if (error) {
      console.warn('Não foi possível carregar perfil do emissor:', error);
      return null;
    }

    return data || null;
  } catch (error) {
    console.warn('Erro inesperado ao carregar perfil do emissor:', error);
    return null;
  }
}

function preencherChipEmissor(elemento, texto) {
  if (!elemento) return;

  if (texto) {
    elemento.innerText = texto;
    elemento.style.display = 'inline-flex';
  } else {
    elemento.innerText = '';
    elemento.style.display = 'none';
  }
}

function preencherTopoEmpresaVer(orcamento, perfil) {
  const logoImg = document.getElementById('ver-logo-empresa');
  const logoPlaceholder = document.getElementById('ver-logo-placeholder');

  const nomeEmpresaEl = document.getElementById('ver-nome-empresa');
  const consultorEl = document.getElementById('ver-consultor');
  const whatsappEl = document.getElementById('ver-whatsapp-empresa');
  const cnpjEl = document.getElementById('ver-cnpj-empresa');
  const enderecoEl = document.getElementById('ver-endereco-empresa');
  const rodapeEmpresa = document.getElementById('rodape-nome-empresa');

  const nomeEmpresa =
    valorOuVazio(perfil?.nome_empresa) ||
    valorOuVazio(orcamento?.nome_empresa) ||
    valorOuVazio(orcamento?.empresa) ||
    'Empresa';

  const consultor =
    valorOuVazio(orcamento?.consultor) ||
    valorOuVazio(orcamento?.responsavel) ||
    valorOuVazio(perfil?.nome) ||
    'Consultor';

  const telefone =
    valorOuVazio(perfil?.telefone_empresa) ||
    valorOuVazio(orcamento?.telefone_empresa) ||
    valorOuVazio(orcamento?.whatsapp_empresa);

  const cnpj =
    valorOuVazio(perfil?.cnpj_empresa) ||
    valorOuVazio(orcamento?.cnpj_empresa);

  const endereco =
    valorOuVazio(perfil?.endereco_empresa) ||
    valorOuVazio(orcamento?.endereco_empresa);

  const fotoUrl =
    valorOuVazio(perfil?.foto_url) ||
    valorOuVazio(orcamento?.foto_url) ||
    valorOuVazio(orcamento?.logo_url);

  if (nomeEmpresaEl) {
    nomeEmpresaEl.innerText = nomeEmpresa;
  }

  if (consultorEl) {
    consultorEl.innerText = `Responsável: ${consultor}`;
  }

  if (rodapeEmpresa) {
    rodapeEmpresa.innerText = nomeEmpresa;
  }

  preencherChipEmissor(whatsappEl, telefone ? `WhatsApp: ${telefone}` : '');
  preencherChipEmissor(cnpjEl, cnpj ? `CNPJ/CPF: ${cnpj}` : '');
  preencherChipEmissor(enderecoEl, endereco ? `Endereço: ${endereco}` : '');

  if (logoImg && logoPlaceholder) {
    if (fotoUrl) {
      logoImg.src = fotoUrl + (fotoUrl.includes('?') ? '&' : '?') + 'v=' + Date.now();
      logoImg.style.display = 'block';
      logoPlaceholder.style.display = 'none';
    } else {
      logoImg.src = '';
      logoImg.style.display = 'none';
      logoPlaceholder.style.display = 'block';
      logoPlaceholder.innerText = nomeEmpresa.substring(0, 2).toUpperCase();
    }
  }

  document.title = `${nomeEmpresa} - ${orcamento?.assunto || 'Orçamento'}`;
}

async function carregarOrcamento() {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  const id = obterIdOrcamentoDoLink();

  if (!id) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não informado no link.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  const { data, error } = await _supabase
    .from('orcamentos')
    .select('*')
    .eq('id', id)
    .maybeSingle();

  if (error) {
    console.error('Erro ao buscar orçamento:', error);

    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Não foi possível carregar este orçamento.
        <br>
        Verifique se o link está correto.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  if (!data) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não encontrado.
      </div>
    `;

    preencherTopoEmpresaVer({}, null);
    return;
  }

  orcamentoAtual = data;
  aplicarTemaVerHtml(data);

  perfilEmissorAtual = await carregarPerfilEmissor(data.usuario_id);

  preencherTopoEmpresaVer(data, perfilEmissorAtual);
  renderizarOrcamento(data);
}

/* ==================== RENDERIZAÇÃO ==================== */

function renderizarOrcamento(orcamento) {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  aplicarTemaVerHtml(orcamento);

  const assunto = orcamento.assunto || 'Orçamento';

  const emissor =
    orcamento.consultor ||
    orcamento.responsavel ||
    perfilEmissorAtual?.nome ||
    'Não informado';

  const cliente = orcamento.cliente_nome || 'Não informado';
  const contato = orcamento.cliente_whatsapp || 'Não informado';
  const status = orcamento.status || 'pendente';
  const total = Number(orcamento.total || 0);
  const dataCriacao = orcamento.criado_em || '';

  titulo.innerText = assunto;

  const itens = Array.isArray(orcamento.itens)
    ? orcamento.itens.map(normalizarItem)
    : [];

  let linhasItens = '';

  if (itens.length) {
    itens.forEach(item => {
      linhasItens += `
        <tr>
          <td>${escaparHtml(item.descricao)}</td>
          <td>${escaparHtml(item.qtd)}</td>
          <td>${formatarMoeda(item.valor)}</td>
          <td>${formatarMoeda(item.subtotal)}</td>
        </tr>
      `;
    });
  } else {
    linhasItens = `
      <tr>
        <td colspan="4">Nenhum item encontrado.</td>
      </tr>
    `;
  }

  const botoesVisiveis =
    status === 'pendente' || status === 'em_servico';

  container.innerHTML = `
    <div class="box-info">
      <div><strong>Cliente:</strong> ${escaparHtml(cliente)}</div>
      <div><strong>Contato:</strong> ${escaparHtml(contato)}</div>
      <div><strong>Data:</strong> ${formatarData(dataCriacao)}</div>
      <div>
        <strong>Status:</strong>
        <span class="status status-${classeStatus(status)}">
          ${escaparHtml(statusLabel(status))}
        </span>
      </div>
    </div>

    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Qtd</th>
            <th>Valor unit.</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody>
          ${linhasItens}
        </tbody>
      </table>
    </div>

    <div class="total-box">
      Total: ${formatarMoeda(total)}
    </div>

    ${
      botoesVisiveis
        ? `
          <div class="botoes-status">
            <button type="button" class="btn-status btn-recusar" onclick="responderOrcamento('recusado')">
              Recusar orçamento
            </button>

            <button type="button" class="btn-status btn-aprovar" onclick="responderOrcamento('aprovado')">
              Aprovar orçamento
            </button>
          </div>
        `
        : `
          <div class="msg msg-sucesso">
            Este orçamento já está com status: ${escaparHtml(statusLabel(status))}.
          </div>
        `
    }
  `;
}

/* ==================== RESPOSTA DO CLIENTE ==================== */

async function responderOrcamento(novoStatus) {
  if (!orcamentoAtual?.id) {
    alert('Orçamento não carregado.');
    return;
  }

  const textoStatus = statusLabel(novoStatus);

  const confirmar = confirm(
    `Deseja realmente marcar este orçamento como "${textoStatus}"?`
  );

  if (!confirmar) return;

  const botoes = document.querySelectorAll('.btn-status');

  botoes.forEach(btn => {
    btn.disabled = true;
  });

  const { error } = await _supabase
    .from('orcamentos')
    .update({
      status: novoStatus
    })
    .eq('id', orcamentoAtual.id);

  if (error) {
    console.error('Erro ao atualizar status:', error);
    alert('Não foi possível atualizar o status do orçamento.');

    botoes.forEach(btn => {
      btn.disabled = false;
    });

    return;
  }

  orcamentoAtual.status = novoStatus;
  renderizarOrcamento(orcamentoAtual);

  alert(`Orçamento marcado como "${textoStatus}".`);
}
</script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visualizar Orçamento - FS Orçamentos</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      margin: 0;
      padding: 18px;
      background: #f1f3f6;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    .pagina-ver {
      max-width: 820px;
      margin: 25px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .topo-logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-fs {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .logo-fs strong {
      background: #ffc400;
      color: #3e2723;
      padding: 5px 12px;
      border-radius: 7px;
      font-weight: 900;
    }

    .logo-fs span {
      color: #3e2723;
      font-weight: 300;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin: 18px 0 18px;
      color: #222;
    }

    .linha-divisoria {
      height: 3px;
      background: #eeeeee;
      margin: 0 0 24px;
      border-radius: 20px;
    }

    .box-info {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-left: 6px solid #0d6efd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 22px;
      font-size: 18px;
      line-height: 1.7;
    }

    .box-info strong {
      color: #2b2b2b;
    }

    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-pendente {
      background: #fff3cd;
      color: #856404;
    }

    .status-aprovado {
      background: #d4edda;
      color: #155724;
    }

    .status-recusado {
      background: #f8d7da;
      color: #721c24;
    }

    .status-em_servico {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-finalizado {
      background: #ede9fe;
      color: #5b21b6;
    }

    .tabela-wrapper {
      width: 100%;
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      background: #fff;
    }

    th {
      background: #eef2f3;
      color: #222;
      text-align: left;
      padding: 14px;
      font-size: 17px;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 16px;
    }

    .total-box {
      text-align: right;
      font-size: 28px;
      font-weight: 900;
      margin-top: 26px;
      padding-top: 20px;
      border-top: 3px solid #eeeeee;
    }

    .botoes-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 32px;
    }

    .btn-status {
      border: none;
      border-radius: 10px;
      padding: 18px 12px;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-recusar {
      background: #d32f2f;
    }

    .btn-aprovar {
      background: #2e7d32;
    }

    .btn-status:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg {
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      margin-top: 20px;
    }

    .msg-carregando {
      background: #fff3cd;
      color: #856404;
    }

    .msg-erro {
      background: #f8d7da;
      color: #721c24;
    }

    .msg-sucesso {
      background: #d4edda;
      color: #155724;
    }

    .rodape {
      margin-top: 28px;
      text-align: center;
      color: #777;
      font-size: 12px;
      border-top: 1px dashed #ccc;
      padding-top: 16px;
    }

    @media (max-width: 650px) {
      body {
        padding: 12px;
      }

      .pagina-ver {
        padding: 20px;
        margin: 15px auto;
      }

      h1 {
        font-size: 26px;
      }

      .box-info {
        font-size: 16px;
      }

      .botoes-status {
        grid-template-columns: 1fr;
      }

      .total-box {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

<div class="pagina-ver">
  <div class="topo-logo">
    <div class="logo-fs">
      <strong>FS</strong><span>Orçamentos</span>
    </div>
  </div>

  <h1 id="titulo-orcamento">Carregando...</h1>
  <div class="linha-divisoria"></div>

  <div id="conteudo-orcamento">
    <div class="msg msg-carregando">Carregando orçamento...</div>
  </div>

  <div class="rodape">
    Orçamento gerado por <strong>FS Orçamentos</strong>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
window._supabase = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const STATUS_CONFIG = {
  pendente: 'Pendente',
  aprovado: 'Aprovado',
  recusado: 'Recusado',
  em_servico: 'Em serviço',
  finalizado: 'Finalizado'
};

let orcamentoAtual = null;

document.addEventListener('DOMContentLoaded', carregarOrcamento);

function escaparHtml(valor) {
  return String(valor || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function formatarData(dataValor) {
  if (!dataValor) return '-';

  const data = new Date(dataValor);

  if (isNaN(data.getTime())) return '-';

  return data.toLocaleDateString('pt-BR');
}

function statusLabel(status) {
  return STATUS_CONFIG[status] || status || 'Pendente';
}

function classeStatus(status) {
  return String(status || 'pendente').replace(/[^a-zA-Z0-9_\-]/g, '');
}

function normalizarItem(item) {
  const descricao = item.descricao || item.desc || item.item || '';
  const qtd = Number(item.qtd || item.quantidade || 0);
  const valor = Number(item.valor || item.valor_unitario || 0);
  const subtotal = Number(item.subtotal || (qtd * valor) || 0);

  return {
    descricao,
    qtd,
    valor,
    subtotal
  };
}

async function carregarOrcamento() {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não informado no link.
      </div>
    `;

    return;
  }

  const { data, error } = await _supabase
    .from('orcamentos')
    .select('*')
    .eq('id', id)
    .maybeSingle();

  if (error) {
    console.error('Erro ao buscar orçamento:', error);

    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Não foi possível carregar este orçamento.
        <br>
        Verifique se o link está correto.
      </div>
    `;

    return;
  }

  if (!data) {
    titulo.innerText = 'Aviso';

    container.innerHTML = `
      <div class="msg msg-erro">
        Orçamento não encontrado.
      </div>
    `;

    return;
  }

  orcamentoAtual = data;
  renderizarOrcamento(data);
}

function renderizarOrcamento(orcamento) {
  const container = document.getElementById('conteudo-orcamento');
  const titulo = document.getElementById('titulo-orcamento');

  const assunto = orcamento.assunto || 'Orçamento';
  const emissor = orcamento.consultor || 'Não informado';
  const cliente = orcamento.cliente_nome || 'Não informado';
  const contato = orcamento.cliente_whatsapp || 'Não informado';
  const status = orcamento.status || 'pendente';
  const total = Number(orcamento.total || 0);
  const dataCriacao = orcamento.criado_em || '';

  titulo.innerText = assunto;

  const itens = Array.isArray(orcamento.itens)
    ? orcamento.itens.map(normalizarItem)
    : [];

  let linhasItens = '';

  if (itens.length) {
    itens.forEach(item => {
      linhasItens += `
        <tr>
          <td>${escaparHtml(item.descricao)}</td>
          <td>${escaparHtml(item.qtd)}</td>
          <td>${formatarMoeda(item.subtotal)}</td>
        </tr>
      `;
    });
  } else {
    linhasItens = `
      <tr>
        <td colspan="3">Nenhum item encontrado.</td>
      </tr>
    `;
  }

  const botoesVisiveis =
    status === 'pendente' || status === 'em_servico';

  container.innerHTML = `
    <div class="box-info">
      <div><strong>Emissor:</strong> ${escaparHtml(emissor)}</div>
      <div><strong>Cliente:</strong> ${escaparHtml(cliente)}</div>
      <div><strong>Contato:</strong> ${escaparHtml(contato)}</div>
      <div><strong>Data:</strong> ${formatarData(dataCriacao)}</div>
      <div>
        <strong>Status:</strong>
        <span class="status status-${classeStatus(status)}">
          ${escaparHtml(statusLabel(status))}
        </span>
      </div>
    </div>

    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Qtd</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${linhasItens}
        </tbody>
      </table>
    </div>

    <div class="total-box">
      Total: ${formatarMoeda(total)}
    </div>

    ${
      botoesVisiveis
        ? `
          <div class="botoes-status">
            <button type="button" class="btn-status btn-recusar" onclick="responderOrcamento('recusado')">
              Recusar orçamento
            </button>

            <button type="button" class="btn-status btn-aprovar" onclick="responderOrcamento('aprovado')">
              Aprovar orçamento
            </button>
          </div>
        `
        : `
          <div class="msg msg-sucesso">
            Este orçamento já está com status: ${escaparHtml(statusLabel(status))}.
          </div>
        `
    }
  `;
}

async function responderOrcamento(novoStatus) {
  if (!orcamentoAtual?.id) {
    alert('Orçamento não carregado.');
    return;
  }

  const textoStatus = statusLabel(novoStatus);

  const confirmar = confirm(
    `Deseja realmente marcar este orçamento como "${textoStatus}"?`
  );

  if (!confirmar) return;

  const botoes = document.querySelectorAll('.btn-status');

  botoes.forEach(btn => {
    btn.disabled = true;
  });

  const { error } = await _supabase
    .from('orcamentos')
    .update({
      status: novoStatus
    })
    .eq('id', orcamentoAtual.id);

  if (error) {
    console.error('Erro ao atualizar status:', error);
    alert('Não foi possível atualizar o status do orçamento.');
    botoes.forEach(btn => btn.disabled = false);
    return;
  }

  orcamentoAtual.status = novoStatus;
  renderizarOrcamento(orcamentoAtual);

  alert(`Orçamento marcado como "${textoStatus}".`);
}
</script>

</body>
</html>

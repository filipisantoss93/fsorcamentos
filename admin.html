<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Administração | FS Orçamentos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
  <style>
    :root{--a:#0f5fb8;--n:#07111f;--y:#f6b500;--b:#d7e3ef;--bg:#f4f8fc;--t:#102033;--m:#52677d;--r:#b91c1c}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--n) 0,#0b1c31 250px,var(--bg) 250px);color:var(--t)}button,input,select,a{font:inherit}
    .admin{width:min(1240px,calc(100% - 24px));margin:auto;padding:24px 0 60px;display:grid;gap:16px}.card{background:#fff;border:1px solid var(--b);border-radius:18px;box-shadow:0 14px 34px rgba(7,17,31,.08);overflow:hidden}
    .hero{padding:clamp(22px,4vw,32px);background:linear-gradient(135deg,#fff,#edf5ff 58%,#fff7d6);border-top:5px solid var(--y)}.hero h1{margin:0 0 7px;font-size:clamp(30px,5vw,46px);line-height:1.05;letter-spacing:-.045em}.hero p{max-width:760px;margin:0;color:#3f5e7b;font-weight:700;line-height:1.5}
    .toolbar{padding:15px;display:grid;grid-template-columns:minmax(220px,1fr) auto auto;gap:9px;align-items:end}.search-field{display:grid;gap:6px}.search-field label,.field label{font-size:12px;font-weight:900;color:#334e68}.toolbar input,.field input,.field select{width:100%;min-height:44px;border:1px solid #b8cada;border-radius:11px;padding:10px 12px;background:#fff;color:var(--t)}.toolbar input::placeholder,.field input::placeholder{color:#71849a}
    .btn{min-height:42px;padding:10px 14px;border:1px solid var(--a);border-radius:11px;background:var(--a);color:#fff;font-weight:900;text-decoration:none;text-align:center;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease}.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,95,184,.18)}.btn:disabled{cursor:wait;opacity:.62}.btn.alt{background:#fff;color:#0b559f;border-color:#9ebbd6}.btn.gold{background:var(--y);border-color:#d89d00;color:#172033}.btn.danger{background:#fff1f2;color:#991b1b;border-color:#fda4af}:where(button,input,select,a):focus-visible{outline:3px solid var(--y);outline-offset:2px}
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.metric{padding:17px;border-left:5px solid var(--a);min-height:92px}.metric:nth-child(2n){border-left-color:var(--y)}.metric span{display:block;color:var(--m);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.metric strong{display:block;margin-top:4px;font-size:clamp(24px,4vw,29px);line-height:1.15;overflow-wrap:anywhere}
    .tabs{display:flex;gap:7px;flex-wrap:wrap;padding:13px}.tab{background:#fff;color:var(--n);border-color:#aebfd0}.tab.ativo{background:var(--n);color:#fff;border-color:var(--n)}.painel{display:none}.painel.ativo{display:block}.head{padding:14px 16px;background:var(--n);color:#fff;display:flex;justify-content:space-between;align-items:center;gap:12px}.body{padding:15px}
    .table-wrap{overflow:auto;border:1px solid var(--b);border-radius:12px;background:#fff}.table{width:100%;border-collapse:separate;border-spacing:0;min-width:980px}.table th{position:sticky;top:0;z-index:1;background:#e9f1f8;color:#233f5b;padding:11px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.035em}.table td{padding:11px 10px;border-bottom:1px solid var(--b);font-size:13px;vertical-align:middle}.table tbody tr:last-child td{border-bottom:0}.table tbody tr:hover{background:#f8fbfe}.table small{color:var(--m);overflow-wrap:anywhere}
    .badge{display:inline-flex;padding:5px 8px;border-radius:999px;background:#e9eef4;color:#34495e;font-size:10px;font-weight:950;text-transform:uppercase;white-space:nowrap}.badge.ativo,.badge.pago,.badge.confirmado{background:#dcfce7;color:#166534}.badge.pendente{background:#fef3c7;color:#854d0e}.badge.expirado,.badge.cancelado{background:#ffe4e6;color:#9f1239}.empty{padding:28px 20px;text-align:center;color:var(--m);font-weight:800}.loading{position:relative;overflow:hidden}.loading::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);transform:translateX(-100%);animation:shimmer 1.3s infinite}
    .modal{position:fixed;inset:0;z-index:50000;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(7,17,31,.82)}.modal.ativo{display:flex}.modal-box{width:min(520px,100%);max-height:calc(100vh - 36px);overflow:auto;padding:22px;border-radius:18px;background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.32)}.modal-box h2{margin:0 0 6px}.modal-box>p{margin:0 0 14px;color:var(--m);font-weight:700}.field{display:grid;gap:6px;margin:12px 0}.acoes{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:18px}.row-actions{display:flex;gap:6px;flex-wrap:wrap}.row-actions .btn{min-height:34px;padding:7px 9px;font-size:11px}
    .toast{position:fixed;right:16px;bottom:16px;z-index:60000;width:min(390px,calc(100% - 32px));padding:13px 15px;border-radius:12px;background:var(--n);color:#fff;font-weight:800;box-shadow:0 14px 38px rgba(7,17,31,.28);opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s ease}.toast.ativo{opacity:1;transform:translateY(0)}.toast.erro{background:#991b1b}.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    @keyframes shimmer{to{transform:translateX(100%)}}@media(max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.search-field{grid-column:1/-1}}@media(max-width:560px){.admin{width:min(100% - 16px,1240px);padding-top:14px}.toolbar{grid-template-columns:1fr}.search-field{grid-column:auto}.toolbar .btn{width:100%}.tabs{display:grid;grid-template-columns:1fr 1fr}.tab{width:100%}.body{padding:10px}.acoes{display:grid;grid-template-columns:1fr}.acoes .btn{width:100%}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div id="header-container"></div>
  <main class="admin" id="admin-app" aria-busy="true">
    <section class="card hero"><h1>Painel Administrativo</h1><p>Usuários, assinaturas, pagamentos, créditos e auditoria do FS Orçamentos.</p></section>
    <section class="card toolbar" aria-label="Ferramentas administrativas">
      <div class="search-field"><label for="admin-busca">Localizar usuário ou registro</label><input id="admin-busca" type="search" autocomplete="off" maxlength="120" placeholder="Nome, empresa, e-mail, telefone ou UUID"></div>
      <button class="btn" type="button" id="admin-buscar">Buscar</button><a class="btn alt" href="/admin-financeiro.html">Dashboard financeiro</a>
    </section>
    <section id="admin-metricas" class="metrics" aria-label="Resumo administrativo"><article class="card metric loading"><span>Carregando</span><strong>—</strong></article></section>
    <section class="card"><div class="tabs" role="tablist" aria-label="Seções administrativas">
      <button class="btn tab ativo" type="button" role="tab" aria-selected="true" aria-controls="painel-usuarios" id="tab-usuarios" data-tab="usuarios">Usuários</button>
      <button class="btn tab" type="button" role="tab" aria-selected="false" aria-controls="painel-assinaturas" id="tab-assinaturas" data-tab="assinaturas">Assinaturas</button>
      <button class="btn tab" type="button" role="tab" aria-selected="false" aria-controls="painel-pagamentos" id="tab-pagamentos" data-tab="pagamentos">Pagamentos</button>
      <button class="btn tab" type="button" role="tab" aria-selected="false" aria-controls="painel-auditoria" id="tab-auditoria" data-tab="auditoria">Auditoria</button>
    </div></section>
    <section id="painel-usuarios" class="card painel ativo" role="tabpanel" aria-labelledby="tab-usuarios"><div class="head"><strong>Usuários</strong></div><div class="body"><div id="lista-usuarios" class="table-wrap"><div class="empty">Carregando...</div></div></div></section>
    <section id="painel-assinaturas" class="card painel" role="tabpanel" aria-labelledby="tab-assinaturas" hidden><div class="head"><strong>Assinaturas</strong></div><div class="body"><div id="lista-assinaturas" class="table-wrap"><div class="empty">Carregando...</div></div></div></section>
    <section id="painel-pagamentos" class="card painel" role="tabpanel" aria-labelledby="tab-pagamentos" hidden><div class="head"><strong>Pagamentos Pix</strong></div><div class="body"><div id="lista-pagamentos" class="table-wrap"><div class="empty">Carregando...</div></div></div></section>
    <section id="painel-auditoria" class="card painel" role="tabpanel" aria-labelledby="tab-auditoria" hidden><div class="head"><strong>Auditoria</strong></div><div class="body"><div id="lista-auditoria" class="table-wrap"><div class="empty">Carregando...</div></div></div></section>
  </main>
  <div id="modal-creditos" class="modal" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-creditos" aria-hidden="true"><div class="modal-box" tabindex="-1"><h2 id="titulo-modal-creditos">Ajustar créditos Efex</h2><p id="credito-usuario"></p><div class="field"><label for="credito-delta">Quantidade</label><input id="credito-delta" type="number" step="1" inputmode="numeric" placeholder="Ex.: 20 ou -10"></div><div class="field"><label for="credito-motivo">Motivo</label><input id="credito-motivo" maxlength="200" autocomplete="off" placeholder="Motivo obrigatório"></div><div class="acoes"><button class="btn alt" type="button" id="credito-cancelar">Cancelar</button><button class="btn gold" type="button" id="credito-confirmar">Aplicar ajuste</button></div></div></div>
  <div id="modal-assinatura" class="modal" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-assinatura" aria-hidden="true"><div class="modal-box" tabindex="-1"><h2 id="titulo-modal-assinatura">Gerenciar assinatura</h2><p id="assinatura-usuario"></p><div class="field"><label for="assinatura-acao">Ação</label><select id="assinatura-acao"><option value="alterar_nivel">Alterar nível</option><option value="adicionar_dias">Adicionar dias</option><option value="reativar">Reativar assinatura</option><option value="cancelar">Cancelar assinatura</option></select></div><div class="field" id="campo-assinatura-nivel"><label for="assinatura-nivel">Nível</label><select id="assinatura-nivel"><option value="essencial">Premium Essencial</option><option value="pro">Premium PRO</option></select></div><div class="field" id="campo-assinatura-dias"><label for="assinatura-dias">Dias</label><input id="assinatura-dias" type="number" min="1" max="365" step="1" inputmode="numeric" value="30"></div><div class="field"><label for="assinatura-motivo">Motivo</label><input id="assinatura-motivo" maxlength="200" autocomplete="off" placeholder="Motivo obrigatório"></div><div class="acoes"><button class="btn alt" type="button" id="assinatura-cancelar">Fechar</button><button class="btn gold" type="button" id="assinatura-confirmar">Aplicar alteração</button></div></div></div>
  <div id="admin-toast" class="toast" role="status" aria-live="polite"></div><p id="admin-status" class="sr-only" aria-live="polite"></p>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script defer src="config.js"></script><script defer src="auth.js"></script><script defer src="carregar-menu.js"></script><script defer src="admin.js"></script>
</body>
</html>

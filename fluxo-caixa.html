<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Fluxo de Caixa - FS Orçamentos</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="style.css"><link rel="icon" type="image/png" href="favicon.png"><style>:root{--m:#475569;--m2:#334155;--a:#94a3b8;--b:#dbe3ee;--t:#1f2937;--s:#64748b}body{background:#f8fafc!important;color:var(--t)!important}.cx{width:min(1180px,calc(100% - 16px));margin:10px auto 28px;display:grid;gap:10px}.card{background:#fff;border:1px solid var(--b);border-radius:8px;box-shadow:0 4px 14px rgba(51,65,85,.08);overflow:hidden}.hero{padding:13px;display:grid;grid-template-columns:1fr auto;gap:10px}.tag{display:inline-flex;padding:4px 7px;border-radius:4px;background:#e2e8f0;border:1px solid #cbd5e1;color:var(--m2);font-size:10px;font-weight:950;text-transform:uppercase;margin-bottom:7px}.hero h1{margin:0 0 4px;color:var(--m2);font-size:30px}.hero p{margin:0;color:var(--s);font-size:13px;font-weight:720}.acoes{display:flex;gap:7px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 11px;border-radius:4px;border:1px solid #cbd5e1;background:#fff;color:var(--m2);font-size:12px;font-weight:950;cursor:pointer;text-decoration:none}.btnp{background:var(--m2)!important;color:#fff!important;border-color:var(--m2)!important}.mets{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.met{background:#fff;border:1px solid var(--b);border-left:4px solid var(--a);border-radius:7px;padding:10px}.met.e{border-left-color:#64748b}.met.s{border-left-color:#64748b}.met.sd{border-left-color:#64748b}.met span{display:block;color:var(--s);font-size:10px;font-weight:950;text-transform:uppercase;margin-bottom:5px}.met strong{display:block;color:var(--m2);font-size:22px;font-weight:950}.head{display:flex;justify-content:space-between;gap:10px;background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:10px 12px}.head h2{margin:0;color:var(--m2);font-size:18px}.head p{margin:3px 0 0;color:var(--s);font-size:12px;font-weight:700}.body{padding:10px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-items:end}.campo{display:grid;gap:4px}.campo label{font-size:10px;text-transform:uppercase;font-weight:950;color:var(--m2)}.campo input,.campo select,.campo textarea{border:1px solid #cbd5e1;border-radius:4px;padding:8px;color:var(--t);font-size:12.5px;background:#fff;box-sizing:border-box;width:100%}.full{grid-column:1/-1}.twrap{overflow:auto;border:1px solid var(--b);border-radius:7px}.tab{width:100%;border-collapse:collapse;min-width:760px}.tab th{background:#e2e8f0;color:var(--t);font-size:10px;text-transform:uppercase;text-align:left;padding:8px;font-weight:950}.tab td{padding:8px;border-bottom:1px solid #e5e7eb;color:var(--t);font-size:12px}.tab tbody tr:nth-child(even){background:#f8fafc}.tipo{display:inline-flex;padding:3px 7px;border-radius:999px;font-size:10px;font-weight:950;text-transform:uppercase}.tipo.entrada{background:#f1f5f9;color:#334155}.tipo.saida{background:#f1f5f9;color:#334155}.vazio{padding:16px;text-align:center;color:var(--s);font-size:13px;font-weight:780}.msg{display:none;padding:9px;border-radius:6px;font-size:12px;font-weight:850}.msg.ok{display:block;background:#f1f5f9;color:#334155}.msg.erro{display:block;background:#fee2e2;color:#991b1b}@media(max-width:900px){.hero{grid-template-columns:1fr}.mets{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr 1fr}.full{grid-column:1/-1}}@media(max-width:560px){.cx{width:min(100% - 10px,1180px)}.mets,.grid{grid-template-columns:1fr}.btn{width:100%}}</style></head><body><div id="header-container"></div><main class="cx"><section class="card hero"><div><span class="tag">Financeiro</span><h1>Fluxo de caixa</h1><p>Controle entradas, saídas, saldo do período, despesas e recebimentos manuais.</p></div><div class="acoes"><a href="dashboard.html" class="btn">Dashboard</a><button class="btn btnp" onclick="mostrarFormularioCaixa()">Novo lançamento</button></div></section><section class="mets"><div class="met e"><span>Entradas</span><strong id="cx-entradas">R$ 0,00</strong></div><div class="met s"><span>Saídas</span><strong id="cx-saidas">R$ 0,00</strong></div><div class="met sd"><span>Saldo</span><strong id="cx-saldo">R$ 0,00</strong></div><div class="met"><span>Lançamentos</span><strong id="cx-total">0</strong></div><div class="met"><span>Ticket entrada</span><strong id="cx-ticket">R$ 0,00</strong></div></section><section id="card-form-caixa" class="card" style="display:none"><div class="head"><div><h2>Novo lançamento</h2><p>Registre entrada ou saída manual.</p></div></div><div class="body"><div id="cx-msg" class="msg"></div><form id="form-caixa" class="grid"><div class="campo"><label>Tipo</label><select id="cx-tipo"><option value="entrada">Entrada</option><option value="saida">Saída</option></select></div><div class="campo"><label>Data</label><input id="cx-data" type="date"></div><div class="campo"><label>Valor</label><input id="cx-valor" type="number" step="0.01" min="0"></div><div class="campo"><label>Forma</label><select id="cx-forma"><option value="pix">Pix</option><option value="dinheiro">Dinheiro</option><option value="cartao_credito">Cartão crédito</option><option value="cartao_debito">Cartão débito</option><option value="outro">Outro</option></select></div><div class="campo"><label>Categoria</label><input id="cx-categoria" placeholder="Peças, aluguel, OS"></div><div class="campo full"><label>Descrição</label><input id="cx-descricao" placeholder="Descrição do lançamento"></div><div class="campo full"><label>Observações</label><textarea id="cx-observacoes"></textarea></div><div class="full acoes"><button type="submit" class="btn btnp">Salvar</button><button type="button" class="btn" onclick="ocultarFormularioCaixa()">Cancelar</button></div></form></div></section><section class="card"><div class="head"><div><h2>Período</h2><p>Filtre os lançamentos.</p></div><div class="grid"><div class="campo"><label>De</label><input id="cx-inicio" type="date"></div><div class="campo"><label>Até</label><input id="cx-fim" type="date"></div><div class="campo"><label>Tipo</label><select id="cx-filtro-tipo"><option value="">Todos</option><option value="entrada">Entradas</option><option value="saida">Saídas</option></select></div><button class="btn btnp" onclick="carregarFluxoCaixa()">Atualizar</button></div></div><div class="body"><div id="cx-lista" class="twrap"><div class="vazio">Carregando...</div></div></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="auth.js"></script><script src="planos.js"></script><script src="carregar-menu.js"></script><script src="notificacoes.js"></script><script src="fluxo-caixa.js"></script></body></html>

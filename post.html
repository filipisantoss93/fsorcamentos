<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#07142f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicação do Fórum | FS Orçamentos</title>
  <meta name="description" content="Visualização de publicação do Fórum FS Orçamentos com comentários e ações da comunidade.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="forum-actions-menu.css?v=20260705-post">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
  <div id="header-container"></div>

  <main id="post-page" class="forum-page post-page" style="display:none;">
    <section class="post-toolbar">
      <a class="forum-btn-secundario post-voltar" href="/forum.html">← Voltar ao feed</a>
      <span class="forum-tag">👥 Fórum FS</span>
    </section>

    <div id="post-alerta" class="forum-alerta"></div>

    <article id="post-card" class="forum-card branco post-card">
      <div class="forum-vazio">Carregando publicação...</div>
    </article>

    <section class="forum-card branco post-comentarios-card">
      <div class="forum-card-topo post-card-topo">
        <div>
          <h2>Comentários</h2>
          <p>Continue a conversa com informações úteis para resolver a dúvida.</p>
        </div>
      </div>
      <div id="post-lista-respostas" class="forum-lista" style="margin-top:12px;"></div>
    </section>

    <section class="forum-card branco post-comentar-card">
      <h2>Comentar</h2>
      <form class="forum-form" onsubmit="postCriarResposta(event)">
        <label>
          Sua resposta
          <textarea id="post-resposta-texto" maxlength="4000" placeholder="Compartilhe sua orientação, experiência ou solução." required></textarea>
        </label>
        <button id="post-btn-responder" type="submit" class="forum-btn">Enviar comentário</button>
      </form>
    </section>
  </main>

  <footer class="forum-footer">
    <span>© 2026 FS Orçamentos</span>
    <span> | </span><a href="/privacidade.html">Privacidade</a>
    <span> | </span><a href="/termos.html">Termos</a>
    <span> | </span><a href="/contato.html">Contato</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    (function () {
      'use strict';

      const params = new URLSearchParams(window.location.search || '');
      const postId = params.get('id') || params.get('topico') || '';
      const estado = {
        sessao: null,
        perfil: null,
        topico: null,
        respostas: [],
        curtidasTopicos: new Set(),
        curtidasRespostas: new Set()
      };

      function esc(valor) {
        return String(valor || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escJs(valor) {
        return String(valor || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
      }

      function normalizar(valor) {
        return String(valor || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
      }

      function textoLimpo(valor) {
        return String(valor || '').replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n').replace(/\r\n/g, '\n');
      }

      function textoHtml(valor) {
        const texto = textoLimpo(valor).trim();
        if (!texto) return '';
        return texto.split(/\n{2,}/).map(bloco => {
          const linhas = bloco.split('\n').map(linha => esc(linha)).join('<br>');
          return `<p>${linhas}</p>`;
        }).join('');
      }

      function formatarData(valor) {
        if (!valor) return '';
        const data = new Date(valor);
        if (Number.isNaN(data.getTime())) return '';
        return data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }

      function mostrarPagina() {
        const page = document.getElementById('post-page');
        if (page) page.style.display = 'block';
      }

      function alerta(texto, tipo = 'info') {
        const box = document.getElementById('post-alerta');
        if (!box) return;
        if (!texto) {
          box.style.display = 'none';
          box.textContent = '';
          return;
        }
        box.style.display = 'block';
        box.textContent = texto;
        box.style.borderLeftColor = tipo === 'erro' ? '#dc2626' : tipo === 'ok' ? '#16a34a' : '#ffc400';
      }

      function setBotao(id, texto, disabled = false) {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.textContent = texto;
        btn.disabled = disabled;
      }

      function statusTopico(topico) {
        return topico?.resolvido ? 'resolvido' : (topico?.status || 'aberto');
      }

      function statusClasse(status) {
        const s = normalizar(status);
        if (s === 'resolvido') return 'verde';
        if (s === 'fechado') return 'vermelho';
        if (s === 'respondido') return 'azul';
        return '';
      }

      function ehDonoTopico() {
        return !!(estado.topico?.usuario_id && estado.sessao?.user?.id === estado.topico.usuario_id);
      }

      function nomeAutor(registro, usarVoce = true) {
        const usuarioId = registro?.usuario_id || registro?.user_id || '';
        const ehAtual = estado.sessao?.user?.id && usuarioId === estado.sessao.user.id;
        let nome = String(registro?.autor_nome || '').trim();
        const empresa = String(registro?.autor_empresa || '').trim();
        if (!nome) nome = ehAtual ? (estado.perfil?.nome || localStorage.getItem('usuario_nome') || 'Você') : 'Membro da comunidade';
        if (ehAtual && usarVoce) nome = 'Você';
        return empresa ? `${nome} - ${empresa}` : nome;
      }

      function iniciaisAutor(registro) {
        const nome = String(registro?.autor_nome || nomeAutor(registro, false) || 'FS').trim();
        return nome.split(/\s+/).slice(0, 2).map(p => p[0] || '').join('').toUpperCase() || 'FS';
      }

      function planoFinal(valor) {
        const plano = normalizar(valor || 'gratis');
        if (['premium', 'pro', 'profissional', 'gestao', 'gestão'].includes(plano)) return 'premium';
        if (['basico', 'básico'].includes(plano)) return 'basico';
        return 'gratis';
      }

      function seloPlanoHtml(registro) {
        const plano = planoFinal(registro?.autor_plano || registro?.plano || 'gratis');
        const label = plano === 'premium' ? 'Premium' : plano === 'basico' ? 'Básico' : 'Grátis';
        return `<span class="forum-plano-selo ${plano}">${esc(label)}</span>`;
      }

      function avatarHtml(registro) {
        const foto = String(registro?.autor_foto_url || '').trim();
        if (foto) return `<span class="forum-avatar"><img src="${esc(foto)}" alt="Foto do autor" loading="lazy"></span>`;
        return `<span class="forum-avatar-placeholder">${esc(iniciaisAutor(registro))}</span>`;
      }

      function autorLinhaHtml(registro, subtitulo = '') {
        const usuarioId = registro?.usuario_id || registro?.user_id || '';
        return `
          <div class="forum-autor-linha" data-usuario-id="${esc(usuarioId)}" onclick="postAbrirPerfilAutor('${escJs(usuarioId)}', event)" role="link" tabindex="0" title="Ver perfil">
            ${avatarHtml(registro)}
            <div class="forum-autor-texto">
              <strong>${esc(nomeAutor(registro))} ${seloPlanoHtml(registro)}</strong>
              ${subtitulo ? `<small>${esc(subtitulo)}</small>` : ''}
            </div>
          </div>
        `;
      }

      function fotosHtml(topico) {
        const fotos = [topico?.foto_1_url, topico?.foto_2_url].filter(Boolean);
        if (!fotos.length) return '';
        return `<div class="forum-fotos-grid post-fotos-grid">${fotos.map(url => `
          <a href="${esc(url)}" target="_blank" rel="noopener">
            <img class="forum-foto" src="${esc(url)}" alt="Foto anexada à publicação" loading="lazy">
          </a>
        `).join('')}</div>`;
      }

      function autorAtualPayload() {
        const email = estado.sessao?.user?.email || '';
        const nomeFallback = email ? email.split('@')[0] : 'Membro da comunidade';
        return {
          autor_nome: String(estado.perfil?.nome || localStorage.getItem('usuario_nome') || nomeFallback).trim(),
          autor_empresa: String(estado.perfil?.nome_empresa || localStorage.getItem('nome_empresa') || '').trim(),
          autor_foto_url: String(estado.perfil?.foto_url || localStorage.getItem('usuario_foto_url') || '').trim()
        };
      }

      async function executarRPC(nomeFuncao, parametros) {
        try {
          if (!window._supabase || !nomeFuncao) return;
          const { error } = await _supabase.rpc(nomeFuncao, parametros || {});
          if (error) console.warn(`Notificação do fórum não criada (${nomeFuncao}):`, error);
        } catch (error) {
          console.warn(`Erro ao criar notificação do fórum (${nomeFuncao}):`, error);
        }
      }

      async function carregarSessao() {
        const { data, error } = await _supabase.auth.getSession();
        if (error) throw error;
        estado.sessao = data?.session || null;
        if (!estado.sessao?.user?.id) {
          try { localStorage.setItem('fs_destino_apos_login', `/post.html?id=${postId}`); } catch (_) {}
          window.location.href = '/index.html?login=1&dest=' + encodeURIComponent(`/post.html?id=${postId}`);
          return false;
        }
        return true;
      }

      async function carregarPerfil() {
        if (!estado.sessao?.user?.id) return;
        const { data, error } = await _supabase.from('perfis').select('nome, nome_empresa, plano, foto_url').eq('id', estado.sessao.user.id).maybeSingle();
        if (error) console.warn('Não foi possível carregar perfil no post:', error);
        estado.perfil = data || null;
        if (estado.perfil?.nome) localStorage.setItem('usuario_nome', estado.perfil.nome);
        if (estado.perfil?.nome_empresa) localStorage.setItem('nome_empresa', estado.perfil.nome_empresa);
        if (estado.perfil?.foto_url) localStorage.setItem('usuario_foto_url', estado.perfil.foto_url);
      }

      async function carregarCurtidas() {
        estado.curtidasTopicos = new Set();
        estado.curtidasRespostas = new Set();
        if (!estado.sessao?.user?.id) return;
        const { data, error } = await _supabase.from('forum_curtidas').select('topico_id, resposta_id').eq('usuario_id', estado.sessao.user.id).limit(1000);
        if (error) {
          console.warn('Não foi possível carregar curtidas:', error);
          return;
        }
        (data || []).forEach(curtida => {
          if (curtida.topico_id) estado.curtidasTopicos.add(curtida.topico_id);
          if (curtida.resposta_id) estado.curtidasRespostas.add(curtida.resposta_id);
        });
      }

      async function carregarPublicacao() {
        if (!postId) throw new Error('Publicação não informada.');
        const { data, error } = await _supabase.from('forum_topicos').select('*').eq('id', postId).maybeSingle();
        if (error) throw error;
        if (!data) throw new Error('Publicação não encontrada.');
        estado.topico = data;
      }

      async function carregarRespostas() {
        const lista = document.getElementById('post-lista-respostas');
        if (lista) lista.innerHTML = '<div class="forum-vazio">Carregando comentários...</div>';
        const { data, error } = await _supabase.from('forum_respostas').select('*').eq('topico_id', postId).order('marcada_como_solucao', { ascending: false }).order('criado_em', { ascending: true });
        if (error) throw error;
        estado.respostas = Array.isArray(data) ? data : [];
        renderizarRespostas();
      }

      function botaoCurtirTopico() {
        const curtido = estado.curtidasTopicos.has(estado.topico.id);
        const total = Number(estado.topico.total_curtidas || estado.topico.curtidas || 0);
        return `<button type="button" class="forum-like-btn ${curtido ? 'curtido' : ''}" onclick="postCurtirTopico()">${total} 👍</button>`;
      }

      function botaoCurtirResposta(resposta) {
        const curtido = estado.curtidasRespostas.has(resposta.id);
        const total = Number(resposta.total_curtidas || 0);
        return `<button type="button" class="forum-like-btn ${curtido ? 'curtido' : ''}" onclick="postCurtirResposta('${escJs(resposta.id)}')">${total} 👍</button>`;
      }

      function renderizarPublicacao() {
        const card = document.getElementById('post-card');
        if (!card || !estado.topico) return;
        const status = statusTopico(estado.topico);
        const dono = ehDonoTopico();
        card.innerHTML = `
          <div class="post-topo-publicacao">
            ${autorLinhaHtml(estado.topico, formatarData(estado.topico.criado_em))}
            <div class="post-badges">
              <span class="forum-badge">Categoria: ${esc(estado.topico.categoria || 'Categoria')}</span>
              <span class="forum-badge ${statusClasse(status)}">${esc(status)}</span>
              <span class="forum-badge azul">${Number(estado.topico.total_respostas || estado.respostas.length || 0)} comentários</span>
            </div>
          </div>
          <h1 class="post-titulo">${esc(estado.topico.titulo || 'Publicação')}</h1>
          <div class="post-descricao forum-descricao">${textoHtml(estado.topico.descricao || '')}</div>
          ${fotosHtml(estado.topico)}
          <div class="post-acoes forum-topico-acoes">
            ${botaoCurtirTopico()}
            ${dono && status !== 'resolvido' ? '<button type="button" class="forum-link-btn" onclick="postMarcarResolvido()">Marcar como resolvido</button>' : ''}
            ${dono ? '<button type="button" class="forum-link-btn" onclick="postEditarPublicacao()">Editar</button><button type="button" class="forum-link-btn perigo" onclick="postExcluirPublicacao()">Excluir</button>' : ''}
            <button type="button" class="forum-link-btn" onclick="postDenunciarTopico()">Denunciar</button>
          </div>
        `;
      }

      function renderizarRespostas() {
        const lista = document.getElementById('post-lista-respostas');
        if (!lista) return;
        if (!estado.respostas.length) {
          lista.innerHTML = '<div class="forum-vazio">Ainda não há comentários. Seja o primeiro a ajudar.</div>';
          renderizarPublicacao();
          return;
        }
        const donoTopico = ehDonoTopico();
        lista.innerHTML = estado.respostas.map(resposta => {
          const donoResposta = estado.sessao?.user?.id === resposta.usuario_id;
          return `<article class="forum-resposta post-resposta ${resposta.marcada_como_solucao ? 'solucao' : ''}">
            <div class="forum-resposta-topo"><span>${resposta.marcada_como_solucao ? '✓ Solução marcada' : 'Comentário'}</span><span>${formatarData(resposta.criado_em)}</span></div>
            ${autorLinhaHtml(resposta)}
            <div class="post-resposta-texto">${textoHtml(resposta.resposta)}</div>
            <div class="forum-resposta-acoes">
              ${botaoCurtirResposta(resposta)}
              ${donoTopico && !resposta.marcada_como_solucao ? `<button type="button" class="forum-link-btn" onclick="postMarcarRespostaSolucao('${escJs(resposta.id)}')">Marcar solução</button>` : ''}
              ${donoResposta ? `<button type="button" class="forum-link-btn" onclick="postEditarResposta('${escJs(resposta.id)}')">Editar</button><button type="button" class="forum-link-btn perigo" onclick="postExcluirResposta('${escJs(resposta.id)}')">Excluir</button>` : ''}
              <button type="button" class="forum-link-btn" onclick="postDenunciarResposta('${escJs(resposta.id)}')">Denunciar</button>
            </div>
          </article>`;
        }).join('');
        renderizarPublicacao();
      }

      window.postAbrirPerfilAutor = function postAbrirPerfilAutor(usuarioId, event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        if (usuarioId) window.location.href = `/perfil.html?id=${encodeURIComponent(usuarioId)}`;
      };

      window.postCurtirTopico = async function postCurtirTopico() {
        if (!estado.sessao?.user?.id || !estado.topico?.id || estado.curtidasTopicos.has(estado.topico.id)) return;
        try {
          const { error } = await _supabase.from('forum_curtidas').insert({ usuario_id: estado.sessao.user.id, topico_id: estado.topico.id });
          if (error && error.code !== '23505') throw error;
          if (error?.code === '23505') return;
          await executarRPC('fs_forum_notificar_curtida_topico', { p_topico_id: estado.topico.id });
          estado.curtidasTopicos.add(estado.topico.id);
          estado.topico.total_curtidas = Number(estado.topico.total_curtidas || 0) + 1;
          renderizarPublicacao();
        } catch (error) {
          console.error('Erro ao curtir publicação:', error);
          alert('Não foi possível curtir.');
        }
      };

      window.postCurtirResposta = async function postCurtirResposta(respostaId) {
        if (!estado.sessao?.user?.id || !respostaId || estado.curtidasRespostas.has(respostaId)) return;
        try {
          const { error } = await _supabase.from('forum_curtidas').insert({ usuario_id: estado.sessao.user.id, resposta_id: respostaId });
          if (error && error.code !== '23505') throw error;
          if (error?.code === '23505') return;
          await executarRPC('fs_forum_notificar_curtida_resposta', { p_resposta_id: respostaId });
          estado.curtidasRespostas.add(respostaId);
          const resposta = estado.respostas.find(r => r.id === respostaId);
          if (resposta) resposta.total_curtidas = Number(resposta.total_curtidas || 0) + 1;
          renderizarRespostas();
        } catch (error) {
          console.error('Erro ao curtir comentário:', error);
          alert('Não foi possível curtir.');
        }
      };

      window.postCriarResposta = async function postCriarResposta(event) {
        event.preventDefault();
        const texto = document.getElementById('post-resposta-texto')?.value?.trim();
        if (!texto || texto.length < 8) return alert('Escreva um comentário mais completo.');
        setBotao('post-btn-responder', 'Enviando...', true);
        try {
          const autor = autorAtualPayload();
          const { data, error } = await _supabase.from('forum_respostas').insert({
            topico_id: estado.topico.id,
            usuario_id: estado.sessao.user.id,
            autor_nome: autor.autor_nome,
            autor_empresa: autor.autor_empresa,
            autor_foto_url: autor.autor_foto_url,
            resposta: texto
          }).select('id').single();
          if (error) throw error;
          await executarRPC('fs_forum_notificar_resposta', { p_topico_id: estado.topico.id, p_resposta_id: data?.id });
          document.getElementById('post-resposta-texto').value = '';
          await carregarPublicacao();
          await carregarRespostas();
          alerta('Comentário enviado com sucesso.', 'ok');
        } catch (error) {
          console.error('Erro ao comentar:', error);
          alert('Não foi possível enviar o comentário.');
        } finally {
          setBotao('post-btn-responder', 'Enviar comentário', false);
        }
      };

      window.postEditarPublicacao = async function postEditarPublicacao() {
        if (!ehDonoTopico()) return;
        const titulo = prompt('Editar título da publicação:', estado.topico.titulo || '');
        if (titulo === null) return;
        const descricao = prompt('Editar descrição da publicação:', textoLimpo(estado.topico.descricao || ''));
        if (descricao === null) return;
        const novoTitulo = titulo.trim();
        const novaDescricao = descricao.trim();
        if (novoTitulo.length < 8) return alert('O título precisa ter pelo menos 8 caracteres.');
        if (novaDescricao.length < 20) return alert('A descrição precisa ter pelo menos 20 caracteres.');
        try {
          const { error } = await _supabase.from('forum_topicos').update({ titulo: novoTitulo, descricao: novaDescricao }).eq('id', estado.topico.id).eq('usuario_id', estado.sessao.user.id);
          if (error) throw error;
          estado.topico.titulo = novoTitulo;
          estado.topico.descricao = novaDescricao;
          renderizarPublicacao();
          alerta('Publicação atualizada com sucesso.', 'ok');
        } catch (error) {
          console.error('Erro ao editar publicação:', error);
          alert('Não foi possível editar a publicação.');
        }
      };

      window.postExcluirPublicacao = async function postExcluirPublicacao() {
        if (!ehDonoTopico()) return;
        if (!confirm('Excluir esta publicação e todos os comentários?')) return;
        try {
          const { error } = await _supabase.from('forum_topicos').delete().eq('id', estado.topico.id).eq('usuario_id', estado.sessao.user.id);
          if (error) throw error;
          window.location.href = '/forum.html';
        } catch (error) {
          console.error('Erro ao excluir publicação:', error);
          alert('Não foi possível excluir a publicação.');
        }
      };

      window.postMarcarResolvido = async function postMarcarResolvido() {
        if (!ehDonoTopico()) return;
        if (!confirm('Marcar esta publicação como resolvida?')) return;
        try {
          const { error } = await _supabase.from('forum_topicos').update({ resolvido: true, status: 'resolvido' }).eq('id', estado.topico.id).eq('usuario_id', estado.sessao.user.id);
          if (error) throw error;
          estado.topico.resolvido = true;
          estado.topico.status = 'resolvido';
          renderizarPublicacao();
          alerta('Publicação marcada como resolvida.', 'ok');
        } catch (error) {
          console.error('Erro ao marcar resolvido:', error);
          alert('Não foi possível marcar como resolvido.');
        }
      };

      window.postEditarResposta = async function postEditarResposta(respostaId) {
        const resposta = estado.respostas.find(r => r.id === respostaId);
        if (!resposta || estado.sessao?.user?.id !== resposta.usuario_id) return;
        const novoTexto = prompt('Editar comentário:', textoLimpo(resposta.resposta || ''));
        if (novoTexto === null) return;
        const texto = novoTexto.trim();
        if (texto.length < 8) return alert('O comentário precisa ter pelo menos 8 caracteres.');
        try {
          const { error } = await _supabase.from('forum_respostas').update({ resposta: texto }).eq('id', respostaId).eq('usuario_id', estado.sessao.user.id);
          if (error) throw error;
          resposta.resposta = texto;
          renderizarRespostas();
          alerta('Comentário atualizado com sucesso.', 'ok');
        } catch (error) {
          console.error('Erro ao editar comentário:', error);
          alert('Não foi possível editar o comentário.');
        }
      };

      window.postExcluirResposta = async function postExcluirResposta(respostaId) {
        if (!respostaId) return;
        if (!confirm('Excluir este comentário?')) return;
        try {
          const { error } = await _supabase.from('forum_respostas').delete().eq('id', respostaId).eq('usuario_id', estado.sessao.user.id);
          if (error) throw error;
          await carregarPublicacao();
          await carregarRespostas();
        } catch (error) {
          console.error('Erro ao excluir comentário:', error);
          alert('Não foi possível excluir o comentário.');
        }
      };

      window.postMarcarRespostaSolucao = async function postMarcarRespostaSolucao(respostaId) {
        if (!ehDonoTopico()) return alert('Apenas o autor da publicação pode marcar solução.');
        if (!confirm('Marcar este comentário como solução?')) return;
        try {
          await _supabase.from('forum_respostas').update({ marcada_como_solucao: false }).eq('topico_id', estado.topico.id);
          const { error } = await _supabase.from('forum_respostas').update({ marcada_como_solucao: true }).eq('id', respostaId).eq('topico_id', estado.topico.id);
          if (error) throw error;
          await _supabase.from('forum_topicos').update({ resolvido: true, status: 'resolvido' }).eq('id', estado.topico.id).eq('usuario_id', estado.sessao.user.id);
          await carregarPublicacao();
          await carregarRespostas();
        } catch (error) {
          console.error('Erro ao marcar solução:', error);
          alert('Não foi possível marcar a solução.');
        }
      };

      window.postDenunciarTopico = async function postDenunciarTopico() {
        const motivo = prompt('Informe o motivo da denúncia:');
        if (!motivo?.trim()) return;
        try {
          const { error } = await _supabase.from('forum_denuncias').insert({ usuario_id: estado.sessao.user.id, topico_id: estado.topico.id, motivo: motivo.trim() });
          if (error) throw error;
          alert('Denúncia registrada para análise.');
        } catch (error) {
          console.error('Erro ao denunciar publicação:', error);
          alert('Não foi possível registrar a denúncia.');
        }
      };

      window.postDenunciarResposta = async function postDenunciarResposta(respostaId) {
        const motivo = prompt('Informe o motivo da denúncia:');
        if (!motivo?.trim()) return;
        try {
          const { error } = await _supabase.from('forum_denuncias').insert({ usuario_id: estado.sessao.user.id, resposta_id: respostaId, motivo: motivo.trim() });
          if (error) throw error;
          alert('Denúncia registrada para análise.');
        } catch (error) {
          console.error('Erro ao denunciar comentário:', error);
          alert('Não foi possível registrar a denúncia.');
        }
      };

      async function iniciar() {
        mostrarPagina();
        try {
          if (!window._supabase) throw new Error('Supabase não carregado.');
          const autenticado = await carregarSessao();
          if (!autenticado) return;
          await carregarPerfil();
          await carregarCurtidas();
          await carregarPublicacao();
          await carregarRespostas();
          alerta('', 'info');
        } catch (error) {
          console.error('Erro ao carregar publicação:', error);
          const card = document.getElementById('post-card');
          if (card) card.innerHTML = `<div class="forum-vazio">${esc(error.message || 'Não foi possível carregar a publicação.')}</div>`;
          alerta(error.message || 'Não foi possível carregar a publicação.', 'erro');
        }
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciar);
      else iniciar();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#242424" />
  <title>Offline - FS Orçamentos</title>
  <style>
    :root{--principal:#242424;--principal2:#202020;--amarelo:#ffc400;--creme:#f4ece1;--texto:#262626;}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--creme),#fffaf0);font-family:Arial,Helvetica,sans-serif;color:var(--texto);padding:18px}.card{width:min(480px,100%);background:#fff;border:1px solid #e6d8cc;border-radius:16px;box-shadow:0 14px 36px rgba(32,32,32,.14);padding:24px;text-align:center}.logo{width:78px;height:78px;border-radius:18px;background:var(--amarelo);color:var(--principal2);display:grid;place-items:center;font-weight:950;font-size:34px;margin:0 auto 16px}h1{margin:0;color:var(--principal);font-size:28px}p{color:#5f5f5f;font-weight:700;line-height:1.5}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 16px;border-radius:10px;background:var(--principal);color:var(--amarelo);text-decoration:none;font-weight:950;margin-top:8px}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">FS</div>
    <h1>Você está offline</h1>
    <p>Não foi possível carregar a página agora. Verifique sua conexão e tente novamente.</p>
    <a class="btn" href="/index.html">Tentar novamente</a>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/fs-theme-cinza.css?v=20260622-iframe-1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 55%, #eef2f7 100%) !important;
      color: #111827 !important;
      overflow-x: hidden !important;
    }

    .gestao-page {
      width: min(1180px, calc(100% - 16px));
      margin: 0 auto;
      padding: 12px 0 56px;
    }

    .gestao-tabs-wrap {
      position: sticky;
      top: var(--fs-header-offset, 84px);
      z-index: 40;
      background: rgba(255, 255, 255, .96);
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, .08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 10px;
    }

    .gestao-tabs {
      min-width: 720px;
      width: 100%;
      border-collapse: separate;
      border-spacing: 6px;
      table-layout: fixed;
      margin: 0;
    }

    .gestao-tabs td {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .gestao-tab {
      width: 100%;
      min-height: 40px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #1f2937;
      border-radius: 7px;
      font-weight: 950;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
      box-shadow: none;
    }

    .gestao-tab.ativo {
      background: #64748b;
      color: #ffffff;
      border-color: #64748b;
    }

    .gestao-frame-box {
      position: relative;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .08);
      overflow: hidden;
      min-height: 640px;
    }

    #gestao-frame {
      width: 100%;
      height: 1500px;
      min-height: 640px;
      border: 0;
      display: block;
      background: #f8fafc;
    }

    .gestao-loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 8px 12px;
      color: #374151;
      font-size: 13px;
      font-weight: 900;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
      display: none;
      pointer-events: none;
    }

    .gestao-loading.ativo { display: block; }
    body > footer { display: none !important; }

    @media (max-width: 760px) {
      .gestao-page { width: min(100% - 8px, 1180px); padding-top: 8px; }
      .gestao-tabs-wrap { top: var(--fs-header-offset, 78px); border-radius: 8px; padding: 4px; }
      .gestao-tabs { min-width: 690px; border-spacing: 4px; }
      .gestao-tab { min-height: 34px; font-size: 12px; padding: 7px 8px; }
      .gestao-frame-box { border-radius: 10px; min-height: 700px; }
      #gestao-frame { min-height: 700px; }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="gestao-page">
    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs">
        <tr>
          <td><button class="gestao-tab ativo" type="button" data-src="clientes.html?embed=1">Clientes</button></td>
          <td><button class="gestao-tab" type="button" data-src="veiculos.html?embed=1">Veículos</button></td>
          <td><button class="gestao-tab" type="button" data-src="ordens.html?embed=1">OS</button></td>
          <td><button class="gestao-tab" type="button" data-src="estoque.html?embed=1">Estoque</button></td>
          <td><button class="gestao-tab" type="button" data-src="agenda.html?embed=1">Agenda</button></td>
          <td><button class="gestao-tab" type="button" data-src="relatorios.html?embed=1">Relatórios</button></td>
          <td><button class="gestao-tab" type="button" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
        </tr>
      </table>
    </section>

    <section class="gestao-frame-box">
      <div id="gestao-loading" class="gestao-loading">Carregando módulo...</div>
      <iframe id="gestao-frame" title="Módulo de gestão" src="about:blank"></iframe>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    const frame = document.getElementById('gestao-frame');
    const loading = document.getElementById('gestao-loading');
    const tabs = Array.from(document.querySelectorAll('.gestao-tab'));
    const FS_GESTAO_TEMA_CINZA_URL = '/fs-theme-cinza.css?v=20260622-iframe-1';
    let fsGestaoSrcAtual = '';
    let fsGestaoLoadingTimer = null;

    function ocultarLoadingGestao() {
      loading.classList.remove('ativo');
      if (fsGestaoLoadingTimer) clearTimeout(fsGestaoLoadingTimer);
      fsGestaoLoadingTimer = null;
    }

    function aplicarTemaCinzaNoFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow?.document;
        if (!doc?.head || doc.location?.href === 'about:blank') return;
        doc.documentElement.classList.add('fs-embed', 'fs-gestao-tema-cinza');
        doc.body?.classList.add('fs-gestao-tema-cinza');

        let link = doc.getElementById('fs-gestao-tema-cinza-css');
        if (!link) {
          link = doc.createElement('link');
          link.id = 'fs-gestao-tema-cinza-css';
          link.rel = 'stylesheet';
          doc.head.appendChild(link);
        }
        link.href = FS_GESTAO_TEMA_CINZA_URL;
      } catch (_) {}
    }

    function ajustarAlturaFrame(alturaRecebida) {
      const altura = Number(alturaRecebida) || 0;
      const final = Math.max(700, Math.min(altura + 24, 4200));
      frame.style.height = `${final}px`;
    }

    function abrirModuloGestao(src, push = true) {
      if (!src) return;
      tabs.forEach(btn => btn.classList.toggle('ativo', btn.dataset.src === src));

      if (fsGestaoSrcAtual === src) {
        ocultarLoadingGestao();
        return;
      }

      fsGestaoSrcAtual = src;
      loading.classList.add('ativo');
      frame.style.height = '1500px';
      frame.src = src;

      if (fsGestaoLoadingTimer) clearTimeout(fsGestaoLoadingTimer);
      fsGestaoLoadingTimer = setTimeout(ocultarLoadingGestao, 3500);

      if (push) {
        const nome = src.split('.html')[0].replace('/', '');
        history.replaceState(null, '', `#${nome}`);
      }
    }

    tabs.forEach(btn => btn.addEventListener('click', () => abrirModuloGestao(btn.dataset.src)));

    frame.addEventListener('load', () => {
      aplicarTemaCinzaNoFrame();
      ocultarLoadingGestao();
      setTimeout(() => {
        try {
          const doc = frame.contentDocument || frame.contentWindow?.document;
          const altura = Math.max(doc.body?.scrollHeight || 0, doc.documentElement?.scrollHeight || 0);
          ajustarAlturaFrame(altura);
        } catch (_) {}
      }, 150);
    });

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      if (event.data?.tipo === 'fs-ajustar-iframe' || event.data?.tipo === 'fs-modulo-pronto') {
        aplicarTemaCinzaNoFrame();
        ajustarAlturaFrame(event.data.altura);
        ocultarLoadingGestao();
      }
    });

    const hashInicial = String(location.hash || '').replace('#', '');
    const tabInicial = tabs.find(btn => btn.dataset.src && btn.dataset.src.startsWith(hashInicial + '.html')) || tabs[0];
    abrirModuloGestao(tabInicial.dataset.src, false);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com gerador, clientes, veículos, ordens de serviço, estoque, agenda, fluxo de caixa, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/fs-theme-cinza.css?v=20260623-sem-marrom-1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root{--fs-header-offset:104px;--gestao-tabs-h:58px}html,body{min-height:100%;margin:0;background:linear-gradient(180deg,#fff 0%,#f8fafc 55%,#eef2f7 100%)!important;color:#111827!important;overflow-x:hidden!important}body{padding-top:0!important}body>footer{display:none!important}#btn-flutuante-gerador-global{display:none!important;visibility:hidden!important;pointer-events:none!important}.gestao-page{width:min(1180px,calc(100% - 16px));margin:0 auto;padding:calc(var(--fs-header-offset) + var(--gestao-tabs-h) + 8px) 0 56px}.gestao-tabs-wrap{position:fixed;top:var(--fs-header-offset);left:50%;transform:translateX(-50%);z-index:990;width:min(1180px,calc(100% - 16px));background:rgba(255,255,255,.98);border:1px solid #d1d5db;border-radius:12px;padding:6px;box-shadow:0 6px 16px rgba(15,23,42,.10);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;margin:0}.gestao-tabs{min-width:940px;width:100%;border-collapse:separate;border-spacing:6px;table-layout:fixed;margin:0}.gestao-tabs td{padding:0;border:0;background:transparent}.gestao-tab{width:100%;min-height:40px;border:1px solid #d1d5db;background:#fff;color:#1f2937;border-radius:7px;font-weight:950;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:8px 9px;line-height:1.05;text-align:center;white-space:nowrap;box-shadow:none}.gestao-tab.ativo{background:#64748b;color:#fff;border-color:#64748b}.gestao-frame-box{position:relative;width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 8px 22px rgba(15,23,42,.08);overflow:hidden;min-height:640px}#gestao-frame{width:100%;height:1500px;min-height:640px;border:0;display:block;background:#f8fafc;transition:opacity .16s ease}.gestao-frame-box.carregando #gestao-frame{opacity:.18;pointer-events:none}.gestao-loading{position:absolute;top:0;left:0;right:0;z-index:2;padding:8px 12px;color:#374151;font-size:13px;font-weight:900;background:#f3f4f6;border-bottom:1px solid #d1d5db;display:none;pointer-events:none}.gestao-loading.ativo{display:block}@media(max-width:760px){:root{--fs-header-offset:112px;--gestao-tabs-h:48px}.gestao-page{width:min(100% - 8px,1180px);padding-top:calc(var(--fs-header-offset) + var(--gestao-tabs-h) + 6px)}.gestao-tabs-wrap{width:min(100% - 8px,1180px);border-radius:8px;padding:4px}.gestao-tabs{min-width:900px;border-spacing:4px}.gestao-tab{min-height:34px;font-size:11.5px;padding:7px 8px}.gestao-frame-box{border-radius:10px;min-height:700px}#gestao-frame{min-height:700px}}
  </style>
</head>
<body>
  <div id="header-container"></div>
  <main class="gestao-page">
    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs"><tr>
        <td><button class="gestao-tab" type="button" data-modulo="gerador" data-src="gerador.html?embed=1">Gerar</button></td>
        <td><button class="gestao-tab ativo" type="button" data-modulo="clientes" data-src="clientes.html?embed=1">Clientes</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="veiculos" data-src="veiculos.html?embed=1">Veículos</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="ordens" data-src="ordens.html?embed=1">OS</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="estoque" data-src="estoque.html?embed=1">Estoque</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="agenda" data-src="agenda.html?embed=1">Agenda</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="fluxo-caixa" data-src="fluxo-caixa.html?embed=1">Caixa</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="relatorios" data-src="relatorios.html?embed=1">Relatórios</button></td>
        <td><button class="gestao-tab" type="button" data-modulo="recorrentes" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
      </tr></table>
    </section>
    <section class="gestao-frame-box" id="gestao-frame-box"><div id="gestao-loading" class="gestao-loading">Carregando módulo...</div><iframe id="gestao-frame" title="Módulo de gestão" src="about:blank"></iframe></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    const frame=document.getElementById('gestao-frame'),frameBox=document.getElementById('gestao-frame-box'),loading=document.getElementById('gestao-loading'),tabs=Array.from(document.querySelectorAll('.gestao-tab')),tabsWrap=document.querySelector('.gestao-tabs-wrap'),headerContainer=document.getElementById('header-container'),FS_GESTAO_TEMA_CINZA_URL='/fs-theme-cinza.css?v=20260623-sem-marrom-1';let fsGestaoSrcAtual='',fsGestaoLoadingTimer=null,fsGestaoLimpezaTimer=null;
    function moduloDeSrcGestao(src){return String(src||'').split('?')[0].replace(/^\//,'').replace('.html','')}
    function medirHeaderGestao(){const c=[headerContainer,headerContainer?.firstElementChild,document.querySelector('#header-container header'),document.querySelector('#header-container .main-header'),document.querySelector('#header-container .header'),document.querySelector('#header-container .topbar')].filter(Boolean);let h=0;c.forEach(el=>{const r=el.getBoundingClientRect?.(),a=Math.ceil(Math.max(r?.height||0,el.offsetHeight||0,el.scrollHeight||0));if(a>h)h=a});if(!h||h<64)h=window.innerWidth<=760?112:104;const t=Math.ceil(tabsWrap?.getBoundingClientRect?.().height||tabsWrap?.offsetHeight||(window.innerWidth<=760?48:58));document.documentElement.style.setProperty('--fs-header-offset',h+'px');document.documentElement.style.setProperty('--gestao-tabs-h',t+'px')}
    function limparElementosGlobaisGestao(){document.getElementById('btn-flutuante-gerador-global')?.remove();document.body.classList.remove('gerador-aberto')}
    function ocultarLoadingGestao(){loading.classList.remove('ativo');frameBox.classList.remove('carregando');if(fsGestaoLoadingTimer)clearTimeout(fsGestaoLoadingTimer);fsGestaoLoadingTimer=null;limparElementosGlobaisGestao()}
    function limparFrameGestao(){try{const doc=frame.contentDocument||frame.contentWindow?.document;if(!doc?.body||doc.location?.href==='about:blank')return;doc.documentElement.classList.add('fs-embed','modo-embed-gestao','fs-gestao-tema-cinza');doc.body.classList.add('modo-embed-gestao','fs-gestao-tema-cinza');doc.querySelectorAll('#header-container, header.main-header, .main-header, footer, .footer, .site-footer, .forum-footer, #btn-flutuante-gerador-global, .btn-flutuante-gerador-global, script#fs-pr8-gestao-estoque-js').forEach(el=>el.remove());doc.body.classList.remove('gerador-aberto');let style=doc.getElementById('fs-gestao-limpeza-embed-css');if(!style){style=doc.createElement('style');style.id='fs-gestao-limpeza-embed-css';doc.head.appendChild(style)}style.textContent='html,body{padding-top:0!important;margin-top:0!important;overflow-x:hidden!important}.modo-embed-gestao #header-container,.modo-embed-gestao header,.modo-embed-gestao footer,.modo-embed-gestao .footer,.modo-embed-gestao .site-footer,.modo-embed-gestao .forum-footer,#btn-flutuante-gerador-global,.btn-flutuante-gerador-global{display:none!important;visibility:hidden!important;pointer-events:none!important}.container,.page-container,main{max-width:100%!important}';let link=doc.getElementById('fs-gestao-tema-cinza-css');if(!link){link=doc.createElement('link');link.id='fs-gestao-tema-cinza-css';link.rel='stylesheet';doc.head.appendChild(link)}link.href=FS_GESTAO_TEMA_CINZA_URL}catch(_){} }
    function aplicarTemaCinzaNoFrame(){limparFrameGestao()}
    function ajustarAlturaFrame(a){const n=Number(a)||0;frame.style.height=Math.max(700,Math.min(n+24,4200))+'px'}
    function construirSrcGestao(modulo, parametrosExtras={}){const tab=tabs.find(b=>b.dataset.modulo===modulo)||tabs.find(b=>moduloDeSrcGestao(b.dataset.src)===modulo)||tabs[1]||tabs[0];const base=tab?.dataset.src||'clientes.html?embed=1';const url=new URL(base,window.location.origin);url.searchParams.set('embed','1');Object.entries(parametrosExtras).forEach(([k,v])=>{if(!k||['modulo','embed','iframe'].includes(k))return;if(v!==null&&v!==undefined&&String(v)!=='')url.searchParams.set(k,v)});return `${url.pathname.replace(/^\//,'')}${url.search}`}
    function srcInicialGestao(){const params=new URLSearchParams(location.search||''),hash=String(location.hash||'').replace('#','').trim();let modulo=String(params.get('modulo')||hash||'clientes').toLowerCase();const extras={};params.forEach((v,k)=>extras[k]=v);return construirSrcGestao(modulo,extras)}
    function abrirModuloGestao(src,push=true){if(!src)return;const modulo=moduloDeSrcGestao(src);tabs.forEach(b=>b.classList.toggle('ativo',b.dataset.modulo===modulo||moduloDeSrcGestao(b.dataset.src)===modulo));if(fsGestaoSrcAtual===src){ocultarLoadingGestao();return}fsGestaoSrcAtual=src;limparElementosGlobaisGestao();loading.classList.add('ativo');frameBox.classList.add('carregando');frame.style.height='1500px';frame.src=src;if(fsGestaoLoadingTimer)clearTimeout(fsGestaoLoadingTimer);fsGestaoLoadingTimer=setTimeout(ocultarLoadingGestao,3500);if(push){history.replaceState(null,'','#'+modulo)}}
    tabs.forEach(b=>b.addEventListener('click',()=>abrirModuloGestao(b.dataset.src)));
    frame.addEventListener('load',()=>{aplicarTemaCinzaNoFrame();ocultarLoadingGestao();[80,180,400,900,1600,2600].forEach(t=>setTimeout(()=>{aplicarTemaCinzaNoFrame();try{const doc=frame.contentDocument||frame.contentWindow?.document;ajustarAlturaFrame(Math.max(doc.body?.scrollHeight||0,doc.documentElement?.scrollHeight||0))}catch(_){}},t))});
    window.addEventListener('message',e=>{if(e.origin!==window.location.origin)return;if(e.data?.tipo==='fs-ajustar-iframe'||e.data?.tipo==='fs-modulo-pronto'){aplicarTemaCinzaNoFrame();ajustarAlturaFrame(e.data.altura);ocultarLoadingGestao()}});
    window.addEventListener('resize',()=>setTimeout(medirHeaderGestao,80));window.addEventListener('orientationchange',()=>setTimeout(medirHeaderGestao,250));if(window.ResizeObserver&&headerContainer)new ResizeObserver(medirHeaderGestao).observe(headerContainer);if(window.ResizeObserver&&tabsWrap)new ResizeObserver(medirHeaderGestao).observe(tabsWrap);medirHeaderGestao();setTimeout(medirHeaderGestao,120);setTimeout(medirHeaderGestao,500);setTimeout(medirHeaderGestao,1200);fsGestaoLimpezaTimer=setInterval(limparElementosGlobaisGestao,900);window.addEventListener('beforeunload',()=>{if(fsGestaoLimpezaTimer)clearInterval(fsGestaoLimpezaTimer)});abrirModuloGestao(srcInicialGestao(),false);
  </script>
</body>
</html>

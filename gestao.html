<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/fs-theme-cinza.css?v=20260621-gestao-cinza-1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root {
      --gestao-header-h: 118px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden !important;
      background: #f8fafc;
    }

    body {
      position: fixed;
      inset: 0;
      display: block;
    }

    #header-container {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1000 !important;
      margin: 0 !important;
      padding: 0 !important;
      background: #ffffff !important;
    }

    .gestao-page {
      position: fixed;
      top: var(--gestao-header-h);
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      overflow: hidden;
      box-sizing: border-box;
      z-index: 10;
    }

    .gestao-topo {
      display: none !important;
    }

    .gestao-tabs-wrap {
      flex: 0 0 auto;
      position: relative;
      z-index: 20;
      width: 100%;
      background: #ffffff;
      border: 0;
      border-top: 0;
      border-bottom: 1px solid #d1d5db;
      border-radius: 0;
      padding: 4px 6px;
      box-shadow: 0 2px 8px rgba(51, 65, 85, .08);
      margin: 0;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }

    .gestao-tabs {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
      margin: 0;
    }

    .gestao-tabs td {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .gestao-tab {
      width: 100%;
      min-height: 32px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      border-radius: 4px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 7px;
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
      box-shadow: none;
    }

    .gestao-tab.ativo {
      background: #64748b;
      color: #ffffff;
      border-color: #64748b;
    }

    .gestao-frame-box {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: #ffffff;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      margin: 0;
      position: relative;
    }

    #gestao-frame {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      display: block;
      background: #f8fafc;
    }

    .gestao-loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 7px 10px;
      color: #374151;
      font-size: 12px;
      font-weight: 900;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
      display: none;
    }

    .gestao-loading.ativo {
      display: block;
    }

    body > footer {
      display: none !important;
    }

    @media (max-width: 760px) {
      :root {
        --gestao-header-h: 128px;
      }

      .gestao-tabs-wrap {
        padding: 3px 4px;
      }

      .gestao-tabs {
        min-width: 620px;
        border-spacing: 4px;
      }

      .gestao-tab {
        min-height: 30px;
        font-size: 11px;
        padding: 5px 6px;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="gestao-page">
    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs">
        <tr>
          <td><button class="gestao-tab ativo" type="button" data-src="clientes.html?embed=1">Clientes</button></td>
          <td><button class="gestao-tab" type="button" data-src="veiculos.html?embed=1">Veículos</button></td>
          <td><button class="gestao-tab" type="button" data-src="ordens.html?embed=1">OS</button></td>
          <td><button class="gestao-tab" type="button" data-src="estoque.html?embed=1">Estoque</button></td>
          <td><button class="gestao-tab" type="button" data-src="agenda.html?embed=1">Agenda</button></td>
          <td><button class="gestao-tab" type="button" data-src="relatorios.html?embed=1">Relatórios</button></td>
          <td><button class="gestao-tab" type="button" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
        </tr>
      </table>
    </section>

    <section class="gestao-frame-box">
      <div id="gestao-loading" class="gestao-loading">Carregando módulo...</div>
      <iframe id="gestao-frame" title="Módulo de gestão" src="about:blank"></iframe>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    const frame = document.getElementById('gestao-frame');
    const loading = document.getElementById('gestao-loading');
    const tabs = Array.from(document.querySelectorAll('.gestao-tab'));
    const headerContainer = document.getElementById('header-container');
    const FS_GESTAO_TEMA_CINZA_URL = '/fs-theme-cinza.css?v=20260621-gestao-cinza-1';
    let fsGestaoSrcAtual = '';

    function medirHeaderGestao() {
      const candidatos = [
        headerContainer,
        headerContainer?.firstElementChild,
        document.querySelector('#header-container header'),
        document.querySelector('#header-container .main-header'),
        document.querySelector('#header-container .header'),
        document.querySelector('#header-container .topbar')
      ].filter(Boolean);

      let altura = 0;

      candidatos.forEach(el => {
        const rect = el.getBoundingClientRect?.();
        const h = Math.ceil(Math.max(rect?.height || 0, el.scrollHeight || 0, el.offsetHeight || 0));
        if (h > altura) altura = h;
      });

      if (!altura || altura < 64) {
        altura = window.innerWidth <= 760 ? 128 : 118;
      }

      document.documentElement.style.setProperty('--gestao-header-h', `${altura}px`);
    }

    function aplicarTemaCinzaNoFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow?.document;
        if (!doc?.head || doc.location?.href === 'about:blank') return;

        doc.documentElement.classList.add('fs-embed', 'fs-gestao-tema-cinza');
        doc.body?.classList.add('fs-gestao-tema-cinza');

        let link = doc.getElementById('fs-gestao-tema-cinza-css');
        if (!link) {
          link = doc.createElement('link');
          link.id = 'fs-gestao-tema-cinza-css';
          link.rel = 'stylesheet';
          doc.head.appendChild(link);
        }
        if (link.href !== new URL(FS_GESTAO_TEMA_CINZA_URL, location.origin).href) {
          link.href = FS_GESTAO_TEMA_CINZA_URL;
        }
      } catch (error) {
        console.warn('Não foi possível aplicar o tema cinza no módulo da gestão.', error);
      }
    }

    function abrirModuloGestao(src, push = true) {
      if (!src || fsGestaoSrcAtual === src) return;
      fsGestaoSrcAtual = src;
      tabs.forEach(btn => btn.classList.toggle('ativo', btn.dataset.src === src));
      loading.classList.add('ativo');
      frame.src = src;
      if (push) {
        const nome = src.split('.html')[0].replace('/', '');
        history.replaceState(null, '', `#${nome}`);
      }
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => abrirModuloGestao(btn.dataset.src));
    });

    frame.addEventListener('load', () => {
      aplicarTemaCinzaNoFrame();
      loading.classList.remove('ativo');
    });
    window.addEventListener('resize', () => setTimeout(medirHeaderGestao, 80));
    window.addEventListener('orientationchange', () => setTimeout(medirHeaderGestao, 250));

    if (window.ResizeObserver && headerContainer) {
      new ResizeObserver(medirHeaderGestao).observe(headerContainer);
    }

    medirHeaderGestao();
    setTimeout(medirHeaderGestao, 120);
    setTimeout(medirHeaderGestao, 500);
    setTimeout(medirHeaderGestao, 1200);

    const hashInicial = String(location.hash || '').replace('#', '');
    const tabInicial = tabs.find(btn => btn.dataset.src.startsWith(hashInicial + '.html')) || tabs[0];
    abrirModuloGestao(tabInicial.dataset.src, false);
  </script>
</body>
</html>

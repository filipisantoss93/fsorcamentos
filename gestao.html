<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/fs-theme-cinza.css?v=20260622-iframe-2">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root { --fs-header-offset: 104px; --gestao-tabs-h: 58px; }
    html, body { min-height: 100%; margin: 0; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 55%, #eef2f7 100%) !important; color: #111827 !important; overflow-x: hidden !important; }
    body { padding-top: 0 !important; }
    body > footer { display: none !important; }
    .gestao-page { width: min(1180px, calc(100% - 16px)); margin: 0 auto; padding: calc(var(--fs-header-offset) + var(--gestao-tabs-h) + 8px) 0 56px; }
    .gestao-tabs-wrap { position: fixed; top: var(--fs-header-offset); left: 50%; transform: translateX(-50%); z-index: 990; width: min(1180px, calc(100% - 16px)); background: rgba(255, 255, 255, .98); border: 1px solid #d1d5db; border-radius: 12px; padding: 6px; box-shadow: 0 6px 16px rgba(15, 23, 42, .10); overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; margin: 0; }
    .gestao-tabs { min-width: 720px; width: 100%; border-collapse: separate; border-spacing: 6px; table-layout: fixed; margin: 0; }
    .gestao-tabs td { padding: 0; border: 0; background: transparent; }
    .gestao-tab { width: 100%; min-height: 40px; border: 1px solid #d1d5db; background: #ffffff; color: #1f2937; border-radius: 7px; font-weight: 950; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 8px 10px; line-height: 1.05; text-align: center; white-space: nowrap; box-shadow: none; }
    .gestao-tab.ativo { background: #64748b; color: #ffffff; border-color: #64748b; }
    .gestao-frame-box { position: relative; width: 100%; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 8px 22px rgba(15, 23, 42, .08); overflow: hidden; min-height: 640px; }
    #gestao-frame { width: 100%; height: 1500px; min-height: 640px; border: 0; display: block; background: #f8fafc; }
    .gestao-loading { position: absolute; top: 0; left: 0; right: 0; z-index: 2; padding: 8px 12px; color: #374151; font-size: 13px; font-weight: 900; background: #f3f4f6; border-bottom: 1px solid #d1d5db; display: none; pointer-events: none; }
    .gestao-loading.ativo { display: block; }
    @media (max-width: 760px) { :root { --fs-header-offset: 112px; --gestao-tabs-h: 48px; } .gestao-page { width: min(100% - 8px, 1180px); padding-top: calc(var(--fs-header-offset) + var(--gestao-tabs-h) + 6px); } .gestao-tabs-wrap { width: min(100% - 8px, 1180px); border-radius: 8px; padding: 4px; } .gestao-tabs { min-width: 690px; border-spacing: 4px; } .gestao-tab { min-height: 34px; font-size: 12px; padding: 7px 8px; } .gestao-frame-box { border-radius: 10px; min-height: 700px; } #gestao-frame { min-height: 700px; } }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <main class="gestao-page">
    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs"><tr>
        <td><button class="gestao-tab ativo" type="button" data-src="clientes.html?embed=1">Clientes</button></td>
        <td><button class="gestao-tab" type="button" data-src="veiculos.html?embed=1">Veículos</button></td>
        <td><button class="gestao-tab" type="button" data-src="ordens.html?embed=1">OS</button></td>
        <td><button class="gestao-tab" type="button" data-src="estoque.html?embed=1">Estoque</button></td>
        <td><button class="gestao-tab" type="button" data-src="agenda.html?embed=1">Agenda</button></td>
        <td><button class="gestao-tab" type="button" data-src="relatorios.html?embed=1">Relatórios</button></td>
        <td><button class="gestao-tab" type="button" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
      </tr></table>
    </section>
    <section class="gestao-frame-box"><div id="gestao-loading" class="gestao-loading">Carregando módulo...</div><iframe id="gestao-frame" title="Módulo de gestão" src="about:blank"></iframe></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script><script src="auth.js"></script><script src="planos.js"></script><script src="carregar-menu.js"></script><script src="notificacoes.js"></script>
  <script>
    const frame = document.getElementById('gestao-frame');
    const loading = document.getElementById('gestao-loading');
    const tabs = Array.from(document.querySelectorAll('.gestao-tab'));
    const tabsWrap = document.querySelector('.gestao-tabs-wrap');
    const headerContainer = document.getElementById('header-container');
    const FS_GESTAO_TEMA_CINZA_URL = '/fs-theme-cinza.css?v=20260622-iframe-2';
    let fsGestaoSrcAtual = ''; let fsGestaoLoadingTimer = null;
    const FS_DASHBOARDS_GESTAO = {
      clientes: { seletor: '.clientes-resumo', antes: '.clientes-grid', titulo: 'Dashboard de clientes', texto: 'Resumo rápido da carteira de clientes para acompanhar relacionamento, status e recorrência.' },
      veiculos: { seletor: '.veiculos-resumo', antes: '.veiculos-grid', titulo: 'Dashboard de veículos', texto: 'Resumo rápido da frota cadastrada para acompanhar veículos ativos, vínculos e histórico.' },
      ordens: { seletor: '.ordens-resumo', antes: '.ordens-grid', titulo: 'Dashboard de ordens', texto: 'Resumo rápido das OSs para acompanhar execução, conclusão e pagamentos.', html: '<div class="card-resumo"><span>Total de OS</span><strong id="resumo-total-ordens">0</strong><small>Ordens cadastradas</small></div><div class="card-resumo"><span>Abertas</span><strong id="resumo-ordens-abertas">0</strong><small>Aguardando início</small></div><div class="card-resumo"><span>Em execução</span><strong id="resumo-ordens-execucao">0</strong><small>Serviços ativos</small></div><div class="card-resumo"><span>Concluídas</span><strong id="resumo-ordens-concluidas">0</strong><small>Serviços finalizados</small></div><div class="card-resumo destaque"><span>Faturamento</span><strong id="resumo-valor-total-ordens">R$ 0,00</strong><small>OS pagas/concluídas</small></div><div class="card-resumo"><span>A receber</span><strong id="resumo-valor-pendente-ordens">R$ 0,00</strong><small>Pagamentos pendentes</small></div><div class="card-resumo"><span>Ticket médio</span><strong id="resumo-ticket-medio-ordens">R$ 0,00</strong><small>Média por OS</small></div><div class="card-resumo"><span>Pend. pagamento</span><strong id="resumo-ordens-pendentes-pagamento">0</strong><small>OS sem baixa</small></div>' },
      estoque: { seletor: '.estoque-resumo', antes: '.estoque-grid', titulo: 'Dashboard de estoque', texto: 'Resumo rápido dos produtos para acompanhar disponibilidade, estoque mínimo e valor em venda.' },
      agenda: { seletor: '.agenda-resumo', antes: '.agenda-grid', titulo: 'Dashboard de agenda', texto: 'Resumo rápido dos agendamentos para acompanhar serviços do dia, atrasos e próximos atendimentos.' },
      relatorios: { seletor: '.relatorios-resumo, .relatorios-dashboard, .dashboard-relatorios', antes: '.relatorios-grid, .relatorios-card', titulo: 'Dashboard de relatórios', texto: 'Resumo rápido dos indicadores para acompanhar desempenho, faturamento e produtividade.' },
      recorrentes: { seletor: '.recorrentes-resumo, .recorrentes-dashboard', antes: '.recorrentes-grid, .recorrentes-card', titulo: 'Dashboard de recorrentes', texto: 'Resumo rápido dos serviços recorrentes para acompanhar contratos, próximas cobranças e clientes ativos.' }
    };
    function medirHeaderGestao(){const candidatos=[headerContainer,headerContainer?.firstElementChild,document.querySelector('#header-container header'),document.querySelector('#header-container .main-header'),document.querySelector('#header-container .header'),document.querySelector('#header-container .topbar')].filter(Boolean);let alturaHeader=0;candidatos.forEach(el=>{const rect=el.getBoundingClientRect?.();const altura=Math.ceil(Math.max(rect?.height||0,el.offsetHeight||0,el.scrollHeight||0));if(altura>alturaHeader)alturaHeader=altura;});if(!alturaHeader||alturaHeader<64)alturaHeader=window.innerWidth<=760?112:104;const alturaTabs=Math.ceil(tabsWrap?.getBoundingClientRect?.().height||tabsWrap?.offsetHeight||(window.innerWidth<=760?48:58));document.documentElement.style.setProperty('--fs-header-offset',`${alturaHeader}px`);document.documentElement.style.setProperty('--gestao-tabs-h',`${alturaTabs}px`);}
    function ocultarLoadingGestao(){loading.classList.remove('ativo');if(fsGestaoLoadingTimer)clearTimeout(fsGestaoLoadingTimer);fsGestaoLoadingTimer=null;}
    function docFrame(){try{return frame.contentDocument||frame.contentWindow?.document||null;}catch(_){return null;}}
    function moduloAtualDoFrame(doc){const path=String(doc?.location?.pathname||'').toLowerCase();return path.split('/').pop().replace('.html','')||String(fsGestaoSrcAtual||'').split('.html')[0].replace('/','').replace('?embed=1','');}
    function cssDashboardGestao(){return 'body.fs-gestao-tema-cinza .clientes-hero,body.fs-gestao-tema-cinza .veiculos-hero,body.fs-gestao-tema-cinza .ordens-hero,body.fs-gestao-tema-cinza .estoque-hero,body.fs-gestao-tema-cinza .agenda-hero,body.fs-gestao-tema-cinza .relatorios-hero,body.fs-gestao-tema-cinza .recorrentes-hero{display:none!important}.fs-dashboard-gestao-bloco,.clientes-resumo,.veiculos-resumo,.ordens-resumo,.estoque-resumo,.agenda-resumo,.relatorios-resumo,.relatorios-dashboard,.dashboard-relatorios,.recorrentes-resumo,.recorrentes-dashboard{display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:12px!important;width:100%!important;margin:0 0 18px!important;padding:16px!important;background:#fff!important;border:1px solid #d1d5db!important;border-radius:14px!important;box-shadow:0 8px 22px rgba(15,23,42,.08)!important}.fs-dashboard-gestao-cabecalho{grid-column:1/-1!important;margin:0 0 4px!important}.fs-dashboard-gestao-cabecalho h2{margin:0!important;color:#111827!important;font-size:22px!important;line-height:1.15!important;font-weight:950!important}.fs-dashboard-gestao-cabecalho p{margin:6px 0 0!important;color:#64748b!important;font-size:14px!important;line-height:1.35!important;font-weight:800!important}.fs-dashboard-gestao-bloco .card-resumo,.clientes-resumo .card-resumo,.veiculos-resumo .card-resumo,.ordens-resumo .card-resumo,.estoque-resumo .card-resumo,.agenda-resumo .card-resumo,.relatorios-resumo .card-resumo,.recorrentes-resumo .card-resumo{min-height:84px!important;padding:13px!important;background:#fff!important;color:#111827!important;border:1px solid #d1d5db!important;border-radius:10px!important;box-shadow:0 3px 10px rgba(15,23,42,.05)!important;display:flex!important;flex-direction:column!important;justify-content:center!important;gap:4px!important}.fs-dashboard-gestao-bloco .card-resumo.destaque,.ordens-resumo .card-resumo.destaque{background:#475569!important;border-color:#475569!important;color:#fff!important}.fs-dashboard-gestao-bloco .card-resumo span,.clientes-resumo .card-resumo span,.veiculos-resumo .card-resumo span,.ordens-resumo .card-resumo span,.estoque-resumo .card-resumo span,.agenda-resumo .card-resumo span,.relatorios-resumo .card-resumo span,.recorrentes-resumo .card-resumo span{color:#64748b!important;font-size:11px!important;font-weight:950!important;text-transform:uppercase!important;letter-spacing:.25px!important}.fs-dashboard-gestao-bloco .card-resumo strong,.clientes-resumo .card-resumo strong,.veiculos-resumo .card-resumo strong,.ordens-resumo .card-resumo strong,.estoque-resumo .card-resumo strong,.agenda-resumo .card-resumo strong,.relatorios-resumo .card-resumo strong,.recorrentes-resumo .card-resumo strong{color:#1f2937!important;font-size:22px!important;line-height:1.1!important;font-weight:950!important}.fs-dashboard-gestao-bloco .card-resumo small,.clientes-resumo .card-resumo small,.veiculos-resumo .card-resumo small,.ordens-resumo .card-resumo small,.estoque-resumo .card-resumo small,.agenda-resumo .card-resumo small,.relatorios-resumo .card-resumo small,.recorrentes-resumo .card-resumo small{color:#64748b!important;font-size:11px!important;font-weight:800!important;line-height:1.2!important}.card-resumo.destaque span,.card-resumo.destaque strong,.card-resumo.destaque small{color:#fff!important}@media(max-width:760px){.fs-dashboard-gestao-bloco,.clientes-resumo,.veiculos-resumo,.ordens-resumo,.estoque-resumo,.agenda-resumo,.relatorios-resumo,.relatorios-dashboard,.dashboard-relatorios,.recorrentes-resumo,.recorrentes-dashboard{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:10px!important;padding:14px!important;margin-bottom:16px!important;border-radius:12px!important}.fs-dashboard-gestao-cabecalho h2{font-size:21px!important}.fs-dashboard-gestao-cabecalho p{font-size:13px!important}.card-resumo{min-height:82px!important;padding:12px!important}}';}
    function aplicarDashboardGestaoNoFrame(doc){const modulo=moduloAtualDoFrame(doc);const config=FS_DASHBOARDS_GESTAO[modulo];if(!config||!doc?.body)return;let style=doc.getElementById('fs-gestao-dashboard-blocos-css');if(!style){style=doc.createElement('style');style.id='fs-gestao-dashboard-blocos-css';doc.head.appendChild(style);}style.textContent=cssDashboardGestao();let secao=doc.querySelector(config.seletor);if(!secao&&config.html){secao=doc.createElement('section');secao.className=`${modulo}-resumo fs-dashboard-gestao-bloco`;secao.innerHTML=config.html;const ref=doc.querySelector(config.antes)||doc.querySelector('main')?.firstElementChild;if(ref?.parentNode)ref.parentNode.insertBefore(secao,ref);else doc.querySelector('main')?.prepend(secao);}if(!secao)return;secao.classList.add('fs-dashboard-gestao-bloco');if(!secao.querySelector('.fs-dashboard-gestao-cabecalho')){const header=doc.createElement('div');header.className='fs-dashboard-gestao-cabecalho';header.innerHTML=`<h2>${config.titulo}</h2><p>${config.texto}</p>`;secao.prepend(header);}}
    function escaparHTML(valor){return String(valor??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
    function aplicarAjustesEstoqueNoFrame(doc){const modulo=moduloAtualDoFrame(doc);if(modulo!=='estoque'||!doc?.body)return;const win=frame.contentWindow;if(!win||!win._supabase)return;const campoNome=doc.getElementById('produto-nome');const labelNome=doc.querySelector('label[for="produto-nome"]');if(labelNome)labelNome.textContent='Descrição do produto *';if(campoNome)campoNome.placeholder='Ex: Correia dentada, Palheta, Disco de freio';const descricaoAntiga=doc.getElementById('produto-descricao')?.closest('.campo');if(descricaoAntiga)descricaoAntiga.style.display='none';const labelMarcaVeiculo=doc.querySelector('label[for="produto-marca-veiculo"]');if(labelMarcaVeiculo)labelMarcaVeiculo.textContent='Marca do veículo compatível';const busca=doc.getElementById('busca-produtos');if(busca)busca.placeholder='Descrição, fabricante, código, marca, modelo, categoria ou subcategoria';if(!doc.getElementById('produto-fabricante')&&campoNome?.closest('.campo')){const campo=doc.createElement('div');campo.className='campo';campo.innerHTML='<label for="produto-fabricante">Fabricante / marca da peça</label><input type="text" id="produto-fabricante" placeholder="Ex: Bosch, Cofap, Nakata, Gates" autocomplete="off"><small>Marca/fabricante da peça. Não é a marca do veículo.</small>';campoNome.closest('.campo').insertAdjacentElement('afterend',campo);} }
    function aplicarTemaCinzaNoFrame(){try{const doc=docFrame();if(!doc?.head||doc.location?.href==='about:blank')return;doc.documentElement.classList.add('fs-embed','fs-gestao-tema-cinza');doc.body?.classList.add('fs-gestao-tema-cinza');let link=doc.getElementById('fs-gestao-tema-cinza-css');if(!link){link=doc.createElement('link');link.id='fs-gestao-tema-cinza-css';link.rel='stylesheet';doc.head.appendChild(link);}link.href=FS_GESTAO_TEMA_CINZA_URL;aplicarDashboardGestaoNoFrame(doc);aplicarAjustesEstoqueNoFrame(doc);}catch(_){} }
    function ajustarAlturaFrame(alturaRecebida){const altura=Number(alturaRecebida)||0;const final=Math.max(700,Math.min(altura+24,4200));frame.style.height=`${final}px`;}
    function abrirModuloGestao(src,push=true){if(!src)return;tabs.forEach(btn=>btn.classList.toggle('ativo',btn.dataset.src===src));if(fsGestaoSrcAtual===src){ocultarLoadingGestao();return;}fsGestaoSrcAtual=src;loading.classList.add('ativo');frame.style.height='1500px';frame.src=src;if(fsGestaoLoadingTimer)clearTimeout(fsGestaoLoadingTimer);fsGestaoLoadingTimer=setTimeout(ocultarLoadingGestao,3500);if(push){const nome=src.split('.html')[0].replace('/','');history.replaceState(null,'',`#${nome}`);}}
    tabs.forEach(btn=>btn.addEventListener('click',()=>abrirModuloGestao(btn.dataset.src)));
    frame.addEventListener('load',()=>{aplicarTemaCinzaNoFrame();ocultarLoadingGestao();[150,500,1200,2200].forEach(tempo=>setTimeout(()=>{aplicarTemaCinzaNoFrame();try{const doc=docFrame();const altura=Math.max(doc.body?.scrollHeight||0,doc.documentElement?.scrollHeight||0);ajustarAlturaFrame(altura);}catch(_){}},tempo));});
    window.addEventListener('message',(event)=>{if(event.origin!==window.location.origin)return;if(event.data?.tipo==='fs-ajustar-iframe'||event.data?.tipo==='fs-modulo-pronto'){aplicarTemaCinzaNoFrame();ajustarAlturaFrame(event.data.altura);ocultarLoadingGestao();}});
    window.addEventListener('resize',()=>setTimeout(medirHeaderGestao,80));window.addEventListener('orientationchange',()=>setTimeout(medirHeaderGestao,250));if(window.ResizeObserver&&headerContainer)new ResizeObserver(medirHeaderGestao).observe(headerContainer);if(window.ResizeObserver&&tabsWrap)new ResizeObserver(medirHeaderGestao).observe(tabsWrap);medirHeaderGestao();setTimeout(medirHeaderGestao,120);setTimeout(medirHeaderGestao,500);setTimeout(medirHeaderGestao,1200);const hashInicial=String(location.hash||'').replace('#','');const tabInicial=tabs.find(btn=>btn.dataset.src&&btn.dataset.src.startsWith(hashInicial+'.html'))||tabs[0];abrirModuloGestao(tabInicial.dataset.src,false);
  </script>
</body>
</html>

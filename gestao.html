<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3e2723">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    .gestao-page {
      width: min(1180px, calc(100% - 16px));
      margin: 0 auto;
      padding: 16px 0 24px;
    }

    .gestao-topo {
      background: linear-gradient(135deg, #fff7df, #f7f2ea);
      border: 1px solid #e0d6c8;
      border-top: 5px solid #ffc400;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(62, 39, 35, 0.08);
      margin-bottom: 12px;
    }

    .gestao-topo h1 {
      margin: 0;
      color: #3e2723;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
    }

    .gestao-topo p {
      margin: 6px 0 0;
      color: #6d4c41;
      font-weight: 700;
    }

    .gestao-tabs-wrap {
      background: #ffffff;
      border: 1px solid #e0d6c8;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 6px 18px rgba(62, 39, 35, 0.08);
      margin-bottom: 12px;
      position: sticky;
      top: 78px;
      z-index: 50;
    }

    .gestao-tabs {
      width: 100%;
      border-collapse: separate;
      border-spacing: 6px;
      table-layout: fixed;
    }

    .gestao-tabs td {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .gestao-tab {
      width: 100%;
      min-height: 38px;
      border: 1px solid #d7ccc8;
      background: #fffaf0;
      color: #3e2723;
      border-radius: 8px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 7px;
      line-height: 1.1;
      text-align: center;
    }

    .gestao-tab.ativo {
      background: #3e2723;
      color: #ffc400;
      border-color: #ffc400;
    }

    .gestao-frame-box {
      background: #ffffff;
      border: 1px solid #e0d6c8;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(62, 39, 35, 0.08);
      overflow: hidden;
      min-height: 70vh;
    }

    #gestao-frame {
      width: 100%;
      height: calc(100vh - 230px);
      min-height: 680px;
      border: 0;
      display: block;
      background: #f7f2ea;
    }

    .gestao-loading {
      padding: 12px;
      color: #6d4c41;
      font-weight: 800;
      background: #fff8e1;
      border-bottom: 1px solid #e0d6c8;
      display: none;
    }

    .gestao-loading.ativo {
      display: block;
    }

    @media (max-width: 760px) {
      .gestao-page {
        width: min(100% - 10px, 1180px);
        padding-top: 10px;
      }

      .gestao-topo {
        padding: 12px;
        margin-bottom: 8px;
      }

      .gestao-topo p {
        font-size: 13px;
      }

      .gestao-tabs-wrap {
        top: 72px;
        padding: 6px;
        margin-bottom: 8px;
        overflow-x: auto;
      }

      .gestao-tabs {
        min-width: 620px;
        border-spacing: 5px;
      }

      .gestao-tab {
        min-height: 34px;
        font-size: 11px;
        padding: 6px 5px;
      }

      #gestao-frame {
        height: calc(100vh - 190px);
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="gestao-page">
    <section class="gestao-topo">
      <h1>Central de Gestão</h1>
      <p>Acesse clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes em um só lugar.</p>
    </section>

    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs">
        <tr>
          <td><button class="gestao-tab ativo" type="button" data-src="clientes.html?embed=1">Clientes</button></td>
          <td><button class="gestao-tab" type="button" data-src="veiculos.html?embed=1">Veículos</button></td>
          <td><button class="gestao-tab" type="button" data-src="ordens.html?embed=1">OS</button></td>
          <td><button class="gestao-tab" type="button" data-src="estoque.html?embed=1">Estoque</button></td>
          <td><button class="gestao-tab" type="button" data-src="agenda.html?embed=1">Agenda</button></td>
          <td><button class="gestao-tab" type="button" data-src="relatorios.html?embed=1">Relatórios</button></td>
          <td><button class="gestao-tab" type="button" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
        </tr>
      </table>
    </section>

    <section class="gestao-frame-box">
      <div id="gestao-loading" class="gestao-loading">Carregando módulo...</div>
      <iframe id="gestao-frame" title="Módulo de gestão" src="clientes.html?embed=1"></iframe>
    </section>
  </main>

  <footer>
    <span>© 2026 FS Orçamentos</span>
    <span> | </span><a href="/privacidade.html">Privacidade</a>
    <span> | </span><a href="/termos.html">Termos</a>
    <span> | </span><a href="/contato.html">Contato</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    const frame = document.getElementById('gestao-frame');
    const loading = document.getElementById('gestao-loading');
    const tabs = Array.from(document.querySelectorAll('.gestao-tab'));

    function abrirModuloGestao(src, push = true) {
      tabs.forEach(btn => btn.classList.toggle('ativo', btn.dataset.src === src));
      loading.classList.add('ativo');
      frame.src = src;
      if (push) {
        const nome = src.split('.html')[0].replace('/', '');
        history.replaceState(null, '', `#${nome}`);
      }
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => abrirModuloGestao(btn.dataset.src));
    });

    frame.addEventListener('load', () => loading.classList.remove('ativo'));

    const hashInicial = String(location.hash || '').replace('#', '');
    const tabInicial = tabs.find(btn => btn.dataset.src.startsWith(hashInicial + '.html'));
    if (tabInicial) abrirModuloGestao(tabInicial.dataset.src, false);
  </script>
</body>
</html>

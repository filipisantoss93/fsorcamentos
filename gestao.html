<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FS Orçamentos">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão - FS Orçamentos</title>
  <meta name="description" content="Central de gestão do FS Orçamentos com clientes, veículos, ordens de serviço, estoque, agenda, relatórios e recorrentes.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background: #f8fafc;
      color: #111827;
      scroll-padding-top: calc(var(--fs-header-real-mobile, 112px) + 54px);
    }

    body { display: block; }

    #header-container {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #ffffff;
    }

    .gestao-page {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #f8fafc;
      box-sizing: border-box;
    }

    .gestao-topo { display: none !important; }

    .gestao-tabs-wrap {
      position: sticky;
      top: var(--fs-header-real-desktop, 74px);
      z-index: 900;
      width: 100%;
      background: #ffffff;
      border: 0;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #d1d5db;
      border-radius: 0;
      padding: 5px 6px;
      box-shadow: 0 2px 8px rgba(51, 65, 85, .08);
      margin: 0;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }

    .gestao-tabs {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
    }

    .gestao-tabs td { padding: 0; border: 0; background: transparent; }

    .gestao-tab {
      width: 100%;
      min-height: 36px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
      border-radius: 6px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 7px 8px;
      line-height: 1.05;
      text-align: center;
      white-space: nowrap;
      box-shadow: none;
    }

    .gestao-tab.ativo { background: #64748b; color: #ffffff; border-color: #64748b; }

    .gestao-frame-box {
      width: 100%;
      background: #ffffff;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
      margin: 0;
      position: relative;
    }

    #gestao-frame {
      width: 100%;
      min-height: 900px;
      border: 0;
      display: block;
      background: #f8fafc;
      overflow: hidden;
    }

    .gestao-loading {
      position: sticky;
      top: calc(var(--fs-header-real-desktop, 74px) + 48px);
      left: 0;
      right: 0;
      z-index: 920;
      padding: 7px 10px;
      color: #374151;
      font-size: 12px;
      font-weight: 900;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
      display: none;
    }

    .gestao-loading.ativo { display: block; }
    body > footer { display: none !important; }

    @media (max-width: 760px) {
      html,
      body { scroll-padding-top: calc(var(--fs-header-real-mobile, 104px) + 56px); }

      .gestao-tabs-wrap {
        top: var(--fs-header-real-mobile, 104px);
        padding: 4px;
      }

      .gestao-tabs { min-width: 620px; border-spacing: 4px; }

      .gestao-tab {
        min-height: 34px;
        font-size: 12px;
        padding: 6px 7px;
      }

      .gestao-loading { top: calc(var(--fs-header-real-mobile, 104px) + 44px); }
      #gestao-frame { min-height: 980px; }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="gestao-page">
    <section class="gestao-tabs-wrap" aria-label="Menu da gestão">
      <table class="gestao-tabs">
        <tr>
          <td><button class="gestao-tab ativo" type="button" data-src="clientes.html?embed=1">Clientes</button></td>
          <td><button class="gestao-tab" type="button" data-src="veiculos.html?embed=1">Veículos</button></td>
          <td><button class="gestao-tab" type="button" data-src="ordens.html?embed=1">OS</button></td>
          <td><button class="gestao-tab" type="button" data-src="estoque.html?embed=1">Estoque</button></td>
          <td><button class="gestao-tab" type="button" data-src="agenda.html?embed=1">Agenda</button></td>
          <td><button class="gestao-tab" type="button" data-src="relatorios.html?embed=1">Relatórios</button></td>
          <td><button class="gestao-tab" type="button" data-src="recorrentes.html?embed=1">Recorrentes</button></td>
        </tr>
      </table>
    </section>

    <section class="gestao-frame-box">
      <div id="gestao-loading" class="gestao-loading">Carregando módulo...</div>
      <iframe id="gestao-frame" title="Módulo de gestão" src="clientes.html?embed=1" scrolling="no"></iframe>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="planos.js"></script>
  <script src="carregar-menu.js"></script>
  <script src="notificacoes.js"></script>
  <script>
    const frame = document.getElementById('gestao-frame');
    const loading = document.getElementById('gestao-loading');
    const tabs = Array.from(document.querySelectorAll('.gestao-tab'));

    function normalizarModuloGestao(src) {
      return String(src || '').split('.html')[0].replace('/', '');
    }

    function ajustarAlturaFrame() {
      try {
        if (!frame?.contentWindow?.document) return;
        const doc = frame.contentWindow.document;
        const altura = Math.max(
          900,
          doc.documentElement?.scrollHeight || 0,
          doc.body?.scrollHeight || 0,
          doc.documentElement?.offsetHeight || 0,
          doc.body?.offsetHeight || 0
        );
        frame.style.height = `${altura + 24}px`;
      } catch (erro) {
        frame.style.height = '1200px';
      }
    }

    function abrirModuloGestao(src, push = true) {
      tabs.forEach(btn => btn.classList.toggle('ativo', btn.dataset.src === src));
      loading.classList.add('ativo');
      frame.style.height = '980px';
      frame.src = src;
      if (push) history.replaceState(null, '', `#${normalizarModuloGestao(src)}`);
      document.querySelector('.gestao-tabs-wrap')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => abrirModuloGestao(btn.dataset.src));
    });

    frame.addEventListener('load', () => {
      loading.classList.remove('ativo');
      ajustarAlturaFrame();
      setTimeout(ajustarAlturaFrame, 250);
      setTimeout(ajustarAlturaFrame, 900);
      setTimeout(ajustarAlturaFrame, 1800);
    });

    window.addEventListener('message', event => {
      if (event.origin !== window.location.origin) return;
      if (event.data?.tipo === 'fs-ajustar-iframe') setTimeout(ajustarAlturaFrame, 60);
    });

    window.addEventListener('resize', () => setTimeout(ajustarAlturaFrame, 120));

    const hashInicial = String(location.hash || '').replace('#', '');
    const tabInicial = tabs.find(btn => btn.dataset.src.startsWith(hashInicial + '.html'));
    if (tabInicial) abrirModuloGestao(tabInicial.dataset.src, false);
  </script>
</body>
</html>
